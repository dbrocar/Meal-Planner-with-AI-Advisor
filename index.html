<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mya's Meal Planner 🐾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:linear-gradient(180deg,#dfeaf1,#cfe0ea);background-attachment:fixed;color:#2c4a5e;font-family:'Baloo 2',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.header{background:#ffffff;padding:14px 20px 0;border-bottom:1px solid rgba(200,147,58,0.25);position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:12px;}
.pet-photo-box{flex-shrink:0;width:76px;height:76px;border-radius:16px;background:#ffffff;border:1px solid rgba(200,147,58,0.35);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
.pet-photo-box input[type="file"]{display:none;}
.pet-photo-placeholder{font-size:30px;opacity:0.5;}
.pet-photo-box img{width:100%;height:100%;object-fit:cover;}
.app-title{font-size:32px;font-weight:700;color:#c8933a;line-height:1.15;margin-bottom:6px;}
.version-tag{font-size:10px;font-weight:400;color:#7a95a8;vertical-align:middle;}
.pet-info-box{background:#eaf4fa;border:1px solid rgba(200,147,58,0.25);border-radius:12px;padding:8px 12px 6px;margin-bottom:2px;}
.pet-name-input{display:block;width:100%;background:transparent;border:none;border-bottom:1px solid rgba(200,147,58,0.3);color:#c8933a;font-size:13px;font-weight:600;padding:3px 0 5px;margin-bottom:4px;}
.pet-name-input::placeholder{color:#7a95a8;opacity:0.7;}
.app-sub{font-size:10px;color:#7a95a8;margin-bottom:2px;}
.tabs{display:flex;background:#f5f8fa;border-radius:12px;padding:3px;margin-top:6px;}
.tab{flex:1;padding:8px 2px;font-size:10px;font-weight:600;color:#7a95a8;background:transparent;border:none;border-radius:9px;cursor:pointer;transition:all 0.2s;}
.tab.active{background:#c8933a;color:#0f1720;box-shadow:0 2px 8px rgba(200,147,58,0.3);}
.page{padding:12px;padding-bottom:80px;display:none;max-width:600px;margin:0 auto;}
.page.active{display:block;}
.card{background:#ffffff;border-radius:16px;padding:14px;margin-bottom:12px;box-shadow:0 2px 8px rgba(0,0,0,0.06);}
.card-title{font-size:14px;font-weight:700;color:#c8933a;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.card-title .icon{font-size:18px;}
.card-sub{font-size:11px;color:#7a95a8;margin-bottom:8px;line-height:1.5;}
.section-label{font-size:10px;font-weight:700;color:#4a6a7d;letter-spacing:0.5px;text-transform:uppercase;margin:12px 0 6px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.option-box{background:#eaf4fa;border-radius:10px;padding:10px 8px;text-align:center;border:2px solid transparent;cursor:pointer;transition:all 0.2s;}
.option-box:hover{transform:scale(1.02);}
.option-box.active{border-color:#c8933a;background:rgba(200,147,58,0.08);}
.option-box .icon{font-size:22px;display:block;margin-bottom:3px;}
.option-box .label{font-size:11px;font-weight:600;color:#2c4a5e;}
.option-box .sub{font-size:9px;color:#7a95a8;}
.option-box.disabled{opacity:0.4;cursor:not-allowed;transform:none !important;}
.toggle-section{background:#f5f8fa;border-radius:12px;margin-bottom:8px;overflow:hidden;}
.toggle-header{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;font-weight:600;font-size:13px;color:#2c4a5e;transition:background 0.2s;}
.toggle-header:hover{background:rgba(200,147,58,0.05);}
.toggle-header .arrow{transition:transform 0.3s;font-size:12px;color:#7a95a8;}
.toggle-header.open .arrow{transform:rotate(180deg);}
.toggle-body{padding:0 14px 14px;display:none;}
.toggle-body.open{display:block;}
.aafco-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;}
.aafco-cell{background:#f5f8fa;border-radius:6px;padding:6px 8px;}
.aafco-cell-name{font-size:9px;color:#7a95a8;}
.aafco-cell-val{font-size:11px;font-weight:700;color:#2c4a5e;}
.rotation-week{background:#f5f8fa;border-radius:10px;padding:10px;margin-bottom:8px;}
.rotation-week-title{font-size:12px;font-weight:700;color:#2c4a5e;margin-bottom:6px;}
.rotation-row{display:flex;gap:4px;overflow-x:auto;}
.day-cell{flex-shrink:0;width:38px;border-radius:6px;padding:4px 2px;text-align:center;background:#eef4f8;}
.day-cell.fish{background:rgba(33,150,243,0.12);border:1px solid rgba(100,181,246,0.25);}
.day-cell-name{font-size:7px;font-weight:700;color:#7a95a8;}
.day-cell-am{font-size:8px;color:#2c4a5e;line-height:1.2;}
.day-cell-pm{font-size:7px;color:#7a95a8;line-height:1.2;}
.date-nav{display:flex;align-items:center;justify-content:space-between;background:#f5f8fa;border-radius:12px;padding:10px 12px;margin-bottom:10px;}
.nav-btn{background:rgba(200,147,58,0.12);border:1px solid rgba(200,147,58,0.2);color:#c8933a;border-radius:8px;padding:4px 14px;font-size:18px;cursor:pointer;line-height:1.4;}
.date-main{font-size:14px;font-weight:700;text-align:center;}
.date-sub{font-size:9px;color:#7a95a8;}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.meal-card{background:#f5f8fa;border-radius:12px;padding:10px;border:1px solid transparent;}
.meal-card.fed{background:#e3f5e6;border-color:rgba(76,175,80,0.3);}
.slot-label{font-size:8px;font-weight:700;color:#7a95a8;letter-spacing:0.5px;text-transform:uppercase;}
.meal-protein{font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.meal-detail{font-size:9px;color:#6f8ea0;line-height:1.6;}
.recipe-line{font-size:9px;color:#6f8ea0;display:flex;justify-content:space-between;padding:1px 0;}
.amt-tag{cursor:pointer;border-bottom:1px dotted #c8933a;color:#c8933a;}
.fed-btn{width:100%;margin-top:6px;padding:6px 0;border:none;border-radius:8px;font-size:10px;font-weight:700;cursor:pointer;background:#c8933a;color:#0f1720;}
.fed-btn.active{background:#4caf50;color:#fff;}
.addins-btn{width:100%;margin-top:4px;padding:4px 0;background:transparent;border:1px solid rgba(200,147,58,0.25);color:#c8933a;border-radius:6px;font-size:9px;cursor:pointer;}
.n-card{background:#f5f8fa;border-radius:8px;padding:8px 10px;margin-bottom:5px;cursor:pointer;}
.n-head{display:flex;justify-content:space-between;align-items:center;}
.n-name{font-size:11px;font-weight:700;}
.n-val{font-size:9px;}
.n-pill{display:inline-block;padding:1px 6px;border-radius:99px;font-size:8px;font-weight:700;margin-left:4px;}
.bar-bg{height:4px;background:#e7f1f7;border-radius:2px;margin:3px 0;overflow:hidden;}
.bar-fill{height:100%;border-radius:2px;}
.n-range{font-size:8px;color:#7a95a8;}
.profile-row{display:flex;gap:10px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(44,74,94,0.06);}
.profile-label{font-size:11px;color:#7a95a8;flex:1;}
.profile-value{font-size:12px;font-weight:600;color:#2c4a5e;}
.profile-tag{padding:2px 8px;border-radius:99px;font-size:9px;font-weight:700;}
.tag-safe{background:rgba(76,175,80,0.12);color:#4caf50;}
.tag-limit{background:rgba(255,152,0,0.12);color:#ff9800;}
.tag-avoid{background:rgba(244,67,54,0.12);color:#f44336;}
.safety-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;}
.safety-col{border-radius:8px;padding:6px;background:#f5f8fa;}
.safety-col-title{font-size:9px;font-weight:800;text-align:center;margin-bottom:4px;}
.safety-col.eat .safety-col-title{color:#4caf50;}
.safety-col.limit .safety-col-title{color:#ff9800;}
.safety-col.avoid .safety-col-title{color:#f44336;}
.safety-item{font-size:8px;line-height:1.5;color:#4a6a7d;}
.protein-pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.protein-pick-item{display:flex;align-items:center;gap:6px;padding:6px 8px;background:#f5f8fa;border-radius:8px;border:2px solid transparent;cursor:pointer;}
.protein-pick-item.checked{border-color:#c8933a;background:rgba(200,147,58,0.06);}
.protein-pick-item input{width:14px;height:14px;accent-color:#c8933a;cursor:pointer;}
.protein-pick-name{font-size:10px;color:#2c4a5e;flex:1;}
.protein-pick-fish{font-size:8px;color:#64b5f6;}
.save-btn{width:100%;padding:10px;background:#c8933a;border:none;border-radius:10px;color:#0f1720;font-size:13px;font-weight:700;cursor:pointer;margin-top:8px;}
.usda-search-row{display:flex;gap:6px;margin-bottom:6px;}
.usda-search-input{flex:1;padding:8px 10px;background:#f5f8fa;border:1px solid rgba(200,147,58,0.2);border-radius:8px;font-size:12px;font-family:inherit;}
.usda-search-btn{padding:8px 14px;background:#c8933a;border:none;border-radius:8px;color:#0f1720;font-weight:700;font-size:12px;cursor:pointer;}
.usda-result-item{padding:6px 8px;background:#f5f8fa;border-radius:6px;margin-bottom:4px;cursor:pointer;}
.usda-result-name{font-size:11px;color:#2c4a5e;}
.usda-result-meta{font-size:8px;color:#7a95a8;}
.usda-status{font-size:10px;color:#7a95a8;margin:4px 0;}
.usda-status.err{color:#f44336;}
.usda-snippet{width:100%;min-height:60px;background:#f5f8fa;border:1px solid rgba(200,147,58,0.2);border-radius:8px;font-size:10px;padding:8px;resize:vertical;font-family:monospace;}
.export-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:11px;color:#4a6a7d;cursor:pointer;}
.export-row input{width:14px;height:14px;accent-color:#c8933a;cursor:pointer;}
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);z-index:200;display:flex;align-items:flex-end;justify-content:center;}
.modal{background:#ffffff;border-radius:18px 18px 0 0;width:100%;max-width:500px;padding:18px;max-height:80vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.modal-title{font-size:14px;font-weight:700;color:#c8933a;}
.modal-close{background:transparent;border:none;color:#7a95a8;font-size:20px;cursor:pointer;}
.modal-hint{font-size:10px;color:#7a95a8;margin-bottom:8px;}
.swap-option{padding:8px 12px;background:#f5f8fa;border-radius:8px;margin-bottom:4px;font-size:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.swap-option.active{border:1px solid #c8933a;background:rgba(200,147,58,0.06);font-weight:700;}
.ai-row{display:flex;align-items:center;padding:4px 0;gap:8px;}
.ai-name{font-size:12px;flex:1;}
.ai-input{width:50px;padding:4px 6px;background:#f5f8fa;border:1px solid rgba(200,147,58,0.2);border-radius:6px;font-size:13px;text-align:center;}
.onb-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:400;display:flex;align-items:center;justify-content:center;padding:20px;}
.onb-card{background:#ffffff;border-radius:20px;width:100%;max-width:340px;padding:22px;text-align:center;}
.onb-slide-wrap{position:relative;min-height:200px;}
.onb-slide{position:absolute;top:0;left:0;right:0;opacity:0;transform:translateX(20px);transition:all 0.35s;pointer-events:none;}
.onb-slide.active{opacity:1;transform:translateX(0);pointer-events:auto;}
.onb-icon{font-size:36px;margin-bottom:8px;}
.onb-title{font-size:15px;font-weight:800;color:#2c4a5e;margin-bottom:4px;}
.onb-desc{font-size:11px;color:#7a95a8;line-height:1.5;}
.onb-dots{display:flex;gap:4px;justify-content:center;margin:12px 0 10px;}
.onb-dot{width:6px;height:6px;border-radius:50%;background:#cfe0ea;}
.onb-dot.active{background:#c8933a;transform:scale(1.3);}
.onb-btn-next{padding:8px 24px;border:none;background:#c8933a;color:#0f1720;border-radius:9px;font-size:13px;font-weight:700;cursor:pointer;}
.onb-btn-skip{padding:8px 16px;border:1px solid rgba(44,74,94,0.15);background:transparent;color:#7a95a8;border-radius:9px;font-size:12px;cursor:pointer;margin-right:8px;}
@keyframes fadeUp{0%{opacity:0;transform:translateY(8px);}100%{opacity:1;transform:translateY(0);}}
.card{animation:fadeUp 0.3s ease both;}
.card:nth-child(2){animation-delay:0.04s;}
.card:nth-child(3){animation-delay:0.08s;}
.card:nth-child(4){animation-delay:0.12s;}
@media(max-width:400px){.grid-2{grid-template-columns:1fr;}.grid-3{grid-template-columns:1fr 1fr;}.meal-grid{grid-template-columns:1fr;}}
.step-num{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:#c8933a;color:#0f1720;font-size:8px;font-weight:700;flex-shrink:0;}
.prep-step{display:flex;gap:8px;margin-bottom:6px;font-size:12px;color:#2c4a5e;line-height:1.4;}
.prep-step .prep-num{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:#c8933a;color:#0f1720;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.calc-formula{font-size:10px;color:#7a95a8;text-align:center;background:#f5f8fa;border-radius:8px;padding:6px;margin-bottom:8px;font-family:monospace;}
.calc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;gap:8px;}
.calc-label{font-size:11px;color:#7a95a8;flex-shrink:0;}
.calc-input{width:70px;padding:4px 8px;background:#f5f8fa;border:1px solid rgba(200,147,58,0.2);border-radius:6px;font-size:13px;text-align:center;}
.calc-select{flex:1;padding:4px 8px;background:#f5f8fa;border:1px solid rgba(200,147,58,0.2);border-radius:6px;font-size:11px;}
.calc-result{margin-top:6px;background:#f5f8fa;border-radius:8px;padding:4px 10px;}
.calc-out{display:flex;justify-content:space-between;font-size:11px;color:#6f8ea0;padding:4px 0;border-bottom:1px solid rgba(44,74,94,0.06);}
.calc-out:last-child{border-bottom:none;}
.calc-out.highlight{color:#c8933a;font-weight:700;}
.calc-note{font-size:9px;color:#7a95a8;margin-top:6px;}
.footer-disclaimer{text-align:center;font-size:8px;color:#7a95a8;padding:10px 0 4px;line-height:1.5;}
.embedded-video-mount{border-radius:12px;overflow:hidden;background:#e7f1f7;margin-bottom:8px;}
.embedded-video-frame{width:100%;border:none;display:block;min-height:120px;}
.swap-note{font-size:8px;color:#ff9800;font-style:italic;}
.supp-check-row{display:flex;align-items:flex-start;gap:5px;font-size:9px;color:#6f8ea0;padding:2px 0;cursor:pointer;}
.supp-check-row input{margin-top:1px;width:12px;height:12px;accent-color:#c8933a;cursor:pointer;}
.ratio-note{font-size:9px;color:#6f8ea0;background:rgba(200,147,58,0.06);border-radius:6px;padding:4px 8px;margin-top:4px;line-height:1.4;}
.ratio-note strong{color:#c8933a;}
.protein-row{display:flex;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid rgba(44,74,94,0.05);}
.protein-name{font-size:11px;flex:1;}
.protein-tag{font-size:8px;padding:1px 6px;border-radius:99px;font-weight:700;}
.tag-lean{background:rgba(76,175,80,0.12);color:#4caf50;}
.tag-mod{background:rgba(200,147,58,0.12);color:#c8933a;}
.tag-high{background:rgba(244,67,54,0.12);color:#f44336;}
.addl-box{background:#f5f8fa;border-radius:8px;padding:8px;margin-top:6px;}
.addl-title{font-size:10px;font-weight:700;color:#c8933a;display:flex;align-items:center;gap:5px;margin-bottom:4px;}
.addl-item{font-size:10px;color:#2c4a5e;padding:2px 0;}
.addl-empty{font-size:10px;color:#7a95a8;}
.protein-pick-count{font-size:10px;color:#c8933a;font-weight:700;margin-bottom:6px;}
.usda-key-input{width:100%;padding:6px 8px;background:#f5f8fa;border:1px solid rgba(200,147,58,0.2);border-radius:6px;font-size:11px;}
.usda-key-hint{font-size:9px;color:#7a95a8;}
.usda-modal-toggle{font-size:10px;color:#c8933a;cursor:pointer;text-decoration:underline;display:inline-block;margin:4px 0;}
.usda-modal-panel{background:#f5f8fa;border-radius:8px;padding:8px;margin-bottom:6px;}
.usda-approx-note{font-size:8px;color:#7a95a8;margin-top:4px;}
.safety-alert-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px;}
.safety-alert-box{background:#fff;border-radius:16px;padding:20px;max-width:320px;width:100%;text-align:center;}
.safety-alert-box.limit-box{box-shadow:0 0 0 3px rgba(255,152,0,0.3);}
.safety-x{font-size:48px;margin-bottom:4px;}
.safety-alert-title{font-size:16px;font-weight:900;color:#f44336;margin-bottom:6px;}
.safety-alert-title.limit-title{color:#ff9800;}
.safety-alert-food{font-size:14px;font-weight:700;color:#2c4a5e;margin-bottom:4px;}
.safety-alert-reason{font-size:11px;color:#4a6a7d;line-height:1.5;margin-bottom:12px;}
.safety-alert-btns{display:flex;flex-direction:column;gap:6px;}
.safety-btn-cancel{padding:10px;background:#4caf50;border:none;border-radius:8px;color:#fff;font-size:13px;font-weight:700;cursor:pointer;}
.safety-btn-proceed{padding:8px;background:transparent;border:1px solid rgba(44,74,94,0.15);border-radius:8px;color:#7a95a8;font-size:10px;cursor:pointer;}
.disclaimer-card{border:1px solid rgba(244,67,54,0.2);background:rgba(244,67,54,0.03);}
.disclaimer-title{font-size:11px;font-weight:700;color:#f44336;display:flex;align-items:center;gap:6px;}
.disclaimer-body{font-size:10px;color:#4a6a7d;line-height:1.6;}
.replay-walkthrough-btn{font-size:10px;color:#c8933a;text-decoration:underline;cursor:pointer;}
.usda-type-chip{font-size:9px;padding:3px 8px;border-radius:99px;border:1px solid rgba(200,147,58,0.2);background:transparent;color:#5b7d90;cursor:pointer;}
.usda-type-chip.on{background:rgba(200,147,58,0.12);color:#c8933a;border-color:#c8933a;}
.usda-result-badge{display:inline-block;padding:1px 6px;border-radius:99px;font-size:7px;font-weight:700;background:rgba(100,181,246,0.12);color:#64b5f6;margin-left:4px;}
.usda-nutrient-row{display:flex;justify-content:space-between;font-size:10px;color:#6f8ea0;padding:3px 0;border-bottom:1px solid rgba(44,74,94,0.05);}
.week-addl-line{font-size:9px;color:#6f8ea0;padding:2px 0;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <div style="flex:1;min-width:0">
      <div class="app-title">🍲 Meal Planner <span class="version-tag">v2.0</span></div>
      <div class="pet-info-box">
        <input type="text" id="petNameInput" class="pet-name-input" placeholder="Your dog's name" oninput="savePetName(this.value)">
        <div class="app-sub" id="appSub">60 lb &bull; Moderate activity &bull; ~1,335 kcal/day</div>
      </div>
    </div>
    <label class="pet-photo-box" id="petPhotoBox">
      <input type="file" accept="image/*" id="petPhotoInput" onchange="handlePetPhotoUpload(this)">
      <span class="pet-photo-placeholder" id="petPhotoPlaceholder">📷</span>
      <img id="petPhotoImg" style="display:none">
    </label>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="showTab('guide')">📖 Guide</button>
    <button class="tab" onclick="showTab('plan')">📊 Plan</button>
    <button class="tab" onclick="showTab('calendar')">📅 Feed</button>
    <button class="tab" onclick="showTab('nutrition')">📈 Nutrition</button>
  </div>
</div>

<div class="page active" id="page-guide"></div>
<div class="page" id="page-plan"></div>
<div class="page" id="page-calendar"></div>
<div class="page" id="page-nutrition"></div>
<div id="modal-root"></div>
<div id="onboarding-root"></div>

function calcProductTotalNutrients(p){var t=zeroN();if(!p||!p.ingredients)return t;for(var i=0;i<p.ingredients.length;i++){var ing=p.ingredients[i];var src=getIngredientNutrients(ing.name);if(src)addFood(t,src,ing.oz||0);}return t;}

function calcMeal(m,addins,ds,slot,products){var t=zeroN();if(m){var pOz=(ds&&slot)?getEffectiveAmount(ds,slot,"protein"):DEFAULT_AMOUNTS.protein;var sOz=(ds&&slot)?getEffectiveAmount(ds,slot,"starch"):DEFAULT_AMOUNTS.starch;var vOz=(ds&&slot)?getEffectiveAmount(ds,slot,"veg"):DEFAULT_AMOUNTS.veg;var oOz=(ds&&slot)?getEffectiveAmount(ds,slot,"organ"):DEFAULT_AMOUNTS.organ;addFood(t,FOODS[m.protein],pOz);addFood(t,FOODS[m.starch],sOz);addFood(t,FOODS[m.veg],vOz);if(m.organ)addFood(t,FOODS[m.organ],oOz);if(ds&&slot){var sc=sumCheckedSupplements(ds,slot,isFishMeal(m.protein),m.protein);for(var i=0;i<KEYS.length;i++)t[KEYS[i]]+=(sc[KEYS[i]]||0);}else{for(var i2=0;i2<KEYS.length;i2++)t[KEYS[i2]]+=(SUPPS[KEYS[i2]]||0);}}if(addins){var ns=Object.keys(addins);for(var j=0;j<ns.length;j++){if(addins[ns[j]]>0)addFood(t,ADDINS[ns[j]],addins[ns[j]]);}}if(products){var ps=Object.keys(products);for(var k=0;k<ps.length;k++){var count=products[ps[k]];var prod=getProduct(ps[k]);if(count>0&&prod){var perServing=calcProductPerServing(prod);for(var i3=0;i3<KEYS.length;i3++)t[KEYS[i3]]+=(perServing[KEYS[i3]]||0)*count;}}}return t;}

function calcNutritionRange(startY,startM,startD,endY,endM,endD){var totals=zeroN();var sources={};var mealCount=0;var dayCount=0;var cursor=new Date(startY,startM,startD);var endDate=new Date(endY,endM,endD);while(cursor<=endDate){var y=cursor.getFullYear(),m=cursor.getMonth(),d=cursor.getDate();var ds=dateKey(y,m,d);var dow=cursor.getDay();var wk=getWK(y,m,d);var dn=DAYS_OF_WEEK[dow];var dm=(WEEKS[wk]||{})[dn]||{};var dayHasFed=false;var slots=["am","pm"];for(var s=0;s<2;s++){var key=ds+"_"+slots[s];if(fedLog[key]){mealCount++;dayHasFed=true;var effMeal=getEffectiveMeal(ds,slots[s],dm[slots[s]]);calcMealTracked(effMeal,addinsLog[key]||{},ds,slots[s],totals,sources,productsLog[key]||{});}}if(dayHasFed)dayCount++;cursor.setDate(cursor.getDate()+1);}return {totals:totals,sources:sources,mealCount:mealCount,dayCount:dayCount};}

function buildMonthView(){var y=histYear,m=histMonth;var first=getDOW(y,m,1);var days=new Date(y,m+1,0).getDate();var html='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px;">';["S","M","T","W","T","F","S"].forEach(function(d){html+='<div style="text-align:center;font-size:8px;color:#7a95a8;font-weight:700;">'+d+'</div>';});html+='</div><div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;">';for(var i=0;i<first;i++)html+='<div style="aspect-ratio:1;background:transparent;"></div>';for(var d=1;d<=days;d++){var ds=dateKey(y,m,d);var am=!!fedLog[ds+"_am"],pm=!!fedLog[ds+"_pm"];var hasNote=!!notesLog[ds];var isToday=(y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate());var fc=(am?1:0)+(pm?1:0);var bg=fc===2?"rgba(76,175,80,0.12)":fc===1?"rgba(255,152,0,0.08)":"#f5f8fa";html+='<div style="aspect-ratio:1;background:'+bg+';border-radius:4px;padding:2px;cursor:pointer;'+(isToday?'border:1px solid #c8933a;':'')+'" onclick="openDayDetail(\''+ds+'\')"><div style="font-size:9px;font-weight:600;color:#2c4a5e;">'+d+'</div><div style="display:flex;gap:2px;margin-top:1px;"><div style="width:4px;height:4px;border-radius:50%;background:'+(am?'#4caf50':'#c9d8e0')+';"></div><div style="width:4px;height:4px;border-radius:50%;background:'+(pm?'#4caf50':'#c9d8e0')+';"></div>'+(hasNote?'<div style="width:4px;height:4px;border-radius:50%;background:#c8933a;"></div>':'')+'</div></div>';}html+='</div>';return html;}

function openDayDetail(ds){var parts=ds.split("-");var y=parseInt(parts[0]),m=parseInt(parts[1]),d=parseInt(parts[2]);var dow=getDOW(y,m,d),wk=getWK(y,m,d),dn=DAYS_OF_WEEK[dow];var dm=(WEEKS[wk]||{})[dn]||{};var amFed=!!fedLog[ds+"_am"],pmFed=!!fedLog[ds+"_pm"];var note=notesLog[ds]||"";var label=fmtDate(y,m,d);var html='<div class="overlay" id="ddbg"><div class="modal"><div class="modal-head"><div class="modal-title">'+label+'</div><button class="modal-close" onclick="closeDayDetail()">✕</button></div>';var amEff=getEffectiveMeal(ds,"am",dm.am);html+='<div style="padding:4px 0;border-bottom:1px solid rgba(44,74,94,0.06);"><div style="font-size:9px;font-weight:700;color:#7a95a8;">AM'+(amFed?" ✅ Fed":" — not fed")+'</div>';if(!dm.am){html+='<div style="font-size:11px;color:#888;">No meal scheduled</div>';}else if(histMode==="actual"&&!amFed){html+='<div style="font-size:11px;color:#888;">Not fed</div>';}else{var amShown=(histMode==="actual")?amEff:dm.am;if(histMode==="actual"&&getProteinOverride(ds,"am"))html+='<div style="font-size:8px;color:#ff9800;">↺ swapped from '+dm.am.protein+'</div>';html+='<div style="font-size:13px;font-weight:700;">'+amShown.protein+'</div><div style="font-size:10px;color:#6f8ea0;">'+amShown.starch+' • '+amShown.veg+(amShown.organ?' • '+amShown.organ:'')+'</div>';}html+=buildAddlItemsLine(ds,"am");html+='</div>';var pmEff=getEffectiveMeal(ds,"pm",dm.pm);html+='<div style="padding:4px 0;"><div style="font-size:9px;font-weight:700;color:#7a95a8;">PM'+(pmFed?" ✅ Fed":" — not fed")+'</div>';if(!dm.pm){html+='<div style="font-size:11px;color:#888;">No meal scheduled</div>';}else if(histMode==="actual"&&!pmFed){html+='<div style="font-size:11px;color:#888;">Not fed</div>';}else{var pmShown=(histMode==="actual")?pmEff:dm.pm;if(histMode==="actual"&&getProteinOverride(ds,"pm"))html+='<div style="font-size:8px;color:#ff9800;">↺ swapped from '+dm.pm.protein+'</div>';html+='<div style="font-size:13px;font-weight:700;">'+pmShown.protein+'</div><div style="font-size:10px;color:#6f8ea0;">'+pmShown.starch+' • '+pmShown.veg+(pmShown.organ?' • '+pmShown.organ:'')+'</div>';}html+=buildAddlItemsLine(ds,"pm");html+='</div>';html+='<div style="margin-top:4px;"><div style="font-size:9px;font-weight:700;color:#7a95a8;">📝 Notes</div><textarea id="noteInput" style="width:100%;min-height:60px;background:#f5f8fa;border:1px solid rgba(200,147,58,0.15);border-radius:6px;font-size:11px;padding:6px;font-family:inherit;resize:vertical;">'+escapeHtml(note)+'</textarea><button style="width:100%;padding:6px;margin-top:3px;background:#c8933a;border:none;border-radius:6px;color:#0f1720;font-weight:700;font-size:12px;cursor:pointer;" onclick="saveDayNote(\''+ds+'\')">Save Note</button></div></div></div>';document.getElementById("modal-root").innerHTML=html;document.getElementById("ddbg").addEventListener("click",function(e){if(e.target===this)closeDayDetail();});}

function fetchUsdaSearch(q,types,onResults,onError){var url="https://api.nal.usda.gov/fdc/v1/foods/search?api_key="+encodeURIComponent(USDA_KEY);fetch(url,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({query:q,dataType:types,pageSize:15})}).then(function(res){if(res.status===401||res.status===403)throw new Error("Invalid API key.");if(res.status===429)throw new Error("Rate limit reached.");if(!res.ok)throw new Error("USDA error ("+res.status+").");return res.json();}).then(function(data){onResults(data.foods||[]);}).catch(function(err){onError(err.message||"Search failed.");});}

function getNutrientFields(e){if(e.nutrient){return {name:e.nutrient.name||"",unit:e.nutrient.unitName||"",value:(e.amount!=null?e.amount:e.value)};}return {name:e.nutrientName||"",unit:e.unitName||"",value:e.value};}
function extractPer100g(detail){var entries=detail.foodNutrients||[];var raw=zeroN();var found={};var map=[{key:"protein",match:["Protein"]},{key:"fat",match:["Total lipid (fat)"]},{key:"calcium",match:["Calcium, Ca"]},{key:"phosphorus",match:["Phosphorus, P"]},{key:"potassium",match:["Potassium, K"]},{key:"sodium",match:["Sodium, Na"]},{key:"chloride",match:["Chloride, Cl","Chloride"]},{key:"magnesium",match:["Magnesium, Mg"]},{key:"iron",match:["Iron, Fe"]},{key:"copper",match:["Copper, Cu"]},{key:"zinc",match:["Zinc, Zn"]},{key:"selenium",match:["Selenium, Se"]},{key:"vitK",match:["Vitamin K (phylloquinone)"]},{key:"vitB1",match:["Thiamin"]},{key:"vitB2",match:["Riboflavin"]},{key:"vitB3",match:["Niacin"]},{key:"vitB5",match:["Pantothenic acid"]},{key:"vitB6",match:["Vitamin B-6"]},{key:"vitB12",match:["Vitamin B-12"]},{key:"folate",match:["Folate, total"]},{key:"choline",match:["Choline, total"]}];for(var i=0;i<entries.length;i++){var f=getNutrientFields(entries[i]);if(!f.name||f.value==null)continue;for(var d=0;d<map.length;d++){if(found[map[d].key])continue;for(var mi=0;mi<map[d].match.length;mi++){if(f.name===map[d].match[mi]){raw[map[d].key]=f.value;found[map[d].key]=true;break;}}}if(!found.iodine&&f.name==="Iodine, I"){raw.iodine=f.value/1000;found.iodine=true;}if(!found.vitA&&f.name==="Vitamin A, IU"){raw.vitA=f.value;found.vitA=true;}if(!found.vitA&&f.name==="Vitamin A, RAE"){raw.vitA=f.value*3.33;}if(!found.vitD&&f.name.indexOf("Vitamin D")===0){if(f.unit==="IU"){raw.vitD=f.value;found.vitD=true;}else{raw.vitD=f.value*40;found.vitD=true;}}if(!found.vitE&&f.name==="Vitamin E (alpha-tocopherol)"){raw.vitE=f.value*1.49;found.vitE=true;}if(/18:3|20:5|22:6/.test(f.name)&&/n-3/i.test(f.name)){var mg3=(f.unit==="G")?f.value*1000:f.value;raw.omega3=(raw.omega3||0)+mg3;}if(/18:2|20:4/.test(f.name)&&/n-6/i.test(f.name)){var mg6=(f.unit==="G")?f.value*1000:f.value;raw.omega6=(raw.omega6||0)+mg6;}}return raw;}
function per100gToPerOz(per100){var oz=28.3495/100;var perOz={};for(var k=0;k<KEYS.length;k++)perOz[KEYS[k]]=+(((per100[KEYS[k]]||0))*oz).toFixed(4);return perOz;}

pan>Add any additional items</div><div class="prep-step"><span class="prep-num">8</span>Microwave 1 min, check temperature before feeding!</div></div></div>';

  // Card 7: Utilities

  html+='<div style="margin-bottom:6px;"><div style="font-size:10px;font-weight:700;color:#c8933a;">🔑 USDA API Key</div><input type="text" id="usdaKeyInput" class="usda-key-input" placeholder="Paste your free USDA FDC API key" value="'+escapeHtml(USDA_KEY)+'" oninput="saveUsdaKey(this.value)"><div class="usda-key-hint">Free key: <a href="https://fdc.nal.usda.gov/api-key-signup.html" target="_blank">fdc.nal.usda.gov/api-key-signup</a></div></div>';
  // Safe Food Reference
  html+='<div style="margin-bottom:6px;"><div style="font-size:10px;font-weight:700;color:#c8933a;">✅ Safe Dog Food Reference</div><div class="embedded-video-mount"><div class="embedded-video-frame" style="min-height:120px;">'+SAFE_FOOD_VIDEO_HTML+'</div></div><div class="safety-cols"><div class="safety-col eat"><div class="safety-col-title">✅ Eat</div>'+SAFETY_LIST.filter(function(x){return x.status==="safe";}).map(function(x){return '<div class="safety-item">'+x.name+'</div>';}).join('')+'</div><div class="safety-col limit"><div class="safety-col-title">⚠️ Limit</div>'+SAFETY_LIST.filter(function(x){return x.status==="limit";}).map(function(x){return '<div class="safety-item">'+x.name+'</div>';}).join('')+'</div><div class="safety-col avoid"><div class="safety-col-title">🚫 Avoid</div>'+SAFETY_LIST.filter(function(x){return x.status==="avoid";}).map(function(x){return '<div class="safety-item">'+x.name+'</div>';}).join('')+'</div></div></div>';
  // Recipe Box
  html+='<div style="margin-bottom:6px;"><div style="font-size:10px;font-weight:700;color:#c8933a;">🍪 My Recipe Box</div><div class="embedded-video-mount"><div class="embedded-video-frame" style="min-height:120px;">'+RECIPEBOX_VIDEO_HTML+'</div></div><div style="font-size:9px;color:#7a95a8;margin-bottom:4px;">Build a recipe once, log it by the serving from any meal\'s "+ Add Items".</div>'+buildRecipeBoxList()+'<button class="save-btn" onclick="openProductBuilder(null)">+ Add New Product</button></div>';
  // Export/Import
  html+='<div><div style="font-size:10px;font-weight:700;color:#c8933a;">💾 Export / Import Data</div><div style="font-size:9px;color:#7a95a8;margin-bottom:4px;">Back up or restore your data.</div><label class="export-row select-all-row"><input type="checkbox" id="catSelectAll" checked onchange="toggleSelectAllCategories(this.checked)"><span><strong>Select All</strong></span></label><div id="categoryCheckboxList">'+buildCategoryCheckboxRows()+'</div><button class="save-btn" onclick="doExport()">Export Selected Data</button><div id="exportOutputWrap" style="display:none;margin-top:6px;"><textarea id="exportOutput" class="usda-snippet" readonly></textarea><button class="addins-btn" onclick="copyExportOutput()">Copy</button><button class="addins-btn" onclick="downloadExportFile()">Download</button><div id="exportStatus" class="usda-status"></div></div><div style="margin-top:8px;"><div style="font-size:9px;font-weight:700;color:#7a95a8;">Import</div><textarea id="importInput" class="usda-snippet" placeholder="Paste exported data here..."></textarea><button class="save-btn" onclick="applyImport()">Import Selected Data</button><div id="importStatus" class="usda-status"></div></div></div></div>';

  html+='<div class="footer-disclaimer">⚠️ Nutritional information only. Not a substitute for veterinary advice. No liability assumed.</div>';

  runCalc();updateProteinPickCount();
  var healthNoteEl=document.getElementById("healthNotes");if(healthNoteEl){try{var hn=localStorage.getItem("mya_health_notes")||"";healthNoteEl.value=hn;}catch(e){}}

function saveHealthNotes(v){try{localStorage.setItem("mya_health_notes",v);}catch(e){}}

var ONBOARDING_STEPS=[
  {icon:"✏️",title:"First-Time Setup",desc:"Enter your dog's name, add a photo, and set weight & activity in the calculator."},
  {icon:"📚",title:"The Four Tabs",desc:"Guide, Plan, Feed, and Nutrition — everything's organized by what you need to do."},
  {icon:"🍲",title:"Logging Each Meal",desc:"Open the Feed tab — today's AM/PM meals are filled in. Prep it, tap Mark Fed."},
  {icon:"🔄",title:"Swapping Ingredients",desc:"Tap any Swap button — broth, starch, organ, veg, or protein — and pick what actually went in."},
  {icon:"📊",title:"Reviewing Nutrition",desc:"Check Day, Week, Month, or Year views. Tap any nutrient to see what contributed."},
  {icon:"💾",title:"Backing Up",desc:"Scroll to Utilities on the Guide tab for Export/Import."}
];
var _onbIndex=0;
function buildOnboardingHtml(){var s="";for(var i=0;i<ONBOARDING_STEPS.length;i++){var step=ONBOARDING_STEPS[i];s+='<div class="onb-slide'+(i===0?" active":"")+'" id="onbSlide-'+i+'"><div class="onb-icon">'+step.icon+'</div><div class="onb-title">'+step.title+'</div><div class="onb-desc">'+step.desc+'</div></div>';}var d="";for(var j=0;j<ONBOARDING_STEPS.length;j++){d+='<div class="onb-dot'+(j===0?" active":"")+'" id="onbDot-'+j+'"></div>';}return '<div class="onb-overlay" id="onbOverlay"><div class="onb-card"><div class="onb-slide-wrap">'+s+'</div><div class="onb-dots">'+d+'</div><div style="display:flex;justify-content:center;gap:8px;"><button class="onb-btn-skip" onclick="closeOnboarding()">Skip</button><button class="onb-btn-next" id="onbNextBtn" onclick="advanceOnboarding()">Next</button></div></div></div>';}
function openOnboarding(){_onbIndex=0;document.getElementById("onboarding-root").innerHTML=buildOnboardingHtml();updateOnbLabel();}
function showOnbStep(i){for(var k=0;k<ONBOARDING_STEPS.length;k++){var slide=document.getElementById("onbSlide-"+k);var dot=document.getElementById("onbDot-"+k);if(!slide)continue;if(k===i){slide.className="onb-slide active";dot.className="onb-dot active";}else{slide.className="onb-slide";dot.className="onb-dot";}}updateOnbLabel();}
function updateOnbLabel(){var btn=document.getElementById("onbNextBtn");if(btn)btn.textContent=(_onbIndex===ONBOARDING_STEPS.length-1)?"Got It!":"Next";}
function advanceOnboarding(){if(_onbIndex>=ONBOARDING_STEPS.length-1){closeOnboarding();return;}_onbIndex++;showOnbStep(_onbIndex);}
function closeOnboarding(){try{localStorage.setItem("mya_onboarded","1");}catch(e){}document.getElementById("onboarding-root").innerHTML="";}
function maybeShowOnboardingOnBoot(){try{if(localStorage.getItem("mya_onboarded")!=="1")setTimeout(openOnboarding,400);}catch(e){}}

function runCalc(){
  var lbEl=document.getElementById("calcWeight");var actEl=document.getElementById("calcActivity");if(!lbEl||!actEl)return;var lb=parseFloat(lbEl.value)||0;var factor=parseFloat(actEl.value)||1.6;var label=actEl.options[actEl.selectedIndex]?actEl.options[actEl.selectedIndex].text:"";var kg=lb/2.2046;var rer=70*Math.pow(kg,0.75);var mer=rer*factor;var kcalPerOz=42.2;var ozDay=mer/kcalPerOz;var ozMeal=ozDay/2;
  _calcState={weight:lb,factor:factor,activityLabel:label,rer:rer,mer:mer,ozPerDay:ozDay,ozPerMeal:ozMeal};try{localStorage.setItem("mya_calc_state",JSON.stringify(_calcState));}catch(e){}
  var res=document.getElementById("calcResult");if(res)res.innerHTML='<div class="calc-out"><span>RER</span><span>'+Math.round(rer)+' kcal/day</span></div><div class="calc-out highlight"><span>MER (daily calories)</span><span>'+Math.round(mer)+' kcal/day</span></div><div class="calc-out"><span>Total food</span><span>'+ozDay.toFixed(1)+' oz/day</span></div><div class="calc-out"><span>Per meal (2x/day)</span><span>'+ozMeal.toFixed(1)+' oz</span></div>';
  updateHeaderSub();
}

var EXPORT_CATEGORIES=[
  {id:"fed",label:"Feeding Log",keys:["mya_fed"]},
  {id:"addins",label:"Additional Items",keys:["mya_addins"]},
  {id:"notes",label:"Daily Notes",keys:["mya_notes"]},
  {id:"swaps",label:"Ingredient Swaps",keys:["mya_protein_swaps","mya_starch_swaps","mya_veg_swaps","mya_organ_swaps","mya_broth_swaps"]},
  {id:"amounts",label:"Amount Overrides",keys:["mya_amount_overrides"]},
  {id:"suppchecks",label:"Supplement Checkboxes",keys:["mya_supp_checks"]},
  {id:"customaddins",label:"Custom Ingredients",keys:["mya_custom_addins"]},
  {id:"products",label:"Recipe Box",keys:["mya_custom_products","mya_products_log"]},
  {id:"petsettings",label:"Pet Settings",keys:["mya_pet_name","mya_pet_photo","mya_calc_state"]},
  {id:"usdakey",label:"USDA API Key",keys:["mya_usda_key"]}
];
function buildCategoryCheckboxRows(){var r="";for(var i=0;i<EXPORT_CATEGORIES.length;i++){var c=EXPORT_CATEGORIES[i];r+='<label class="export-row"><input type="checkbox" id="cat_'+c.id+'" checked onchange="syncSelectAllCategories()"><span>'+c.label+'</span></label>';}return r;}
function toggleSelectAllCategories(checked){for(var i=0;i<EXPORT_CATEGORIES.length;i++){var el=document.getElementById("cat_"+EXPORT_CATEGORIES[i].id);if(el)el.checked=checked;}}
function syncSelectAllCategories(){var all=document.getElementById("catSelectAll");if(!all)return;var cnt=0;for(var i=0;i<EXPORT_CATEGORIES.length;i++){var el=document.getElementById("cat_"+EXPORT_CATEGORIES[i].id);if(el&&el.checked)cnt++;}all.checked=(cnt===EXPORT_CATEGORIES.length);}
function doExport(){var data={};var any=false;for(var i=0;i<EXPORT_CATEGORIES.length;i++){var c=EXPORT_CATEGORIES[i];var el=document.getElementById("cat_"+c.id);if(el&&el.checked){any=true;for(var j=0;j<c.keys.length;j++){var k=c.keys[j];var v=null;try{v=localStorage.getItem(k);}catch(e){}if(v!==null)data[k]=v;}}}if(!any){document.getElementById("exportStatus").innerHTML="Select at least one category.";document.getElementById("exportStatus").className="usda-status err";return;}var json=JSON.stringify(data,null,2);document.getElementById("exportOutput").value=json;document.getElementById("exportOutputWrap").style.display="block";document.getElementById("exportStatus").innerHTML="";}
function copyExportOutput(){var box=document.getElementById("exportOutput");if(!box||!box.value)return;var st=document.getElementById("exportStatus");if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(box.value).then(function(){st.className="usda-status";st.innerHTML="Copied!";}).catch(function(){box.select();});}else{box.select();try{document.execCommand("copy");st.className="usda-status";st.innerHTML="Copied!";}catch(e){}}}
function downloadExportFile(){var box=document.getElementById("exportOutput");if(!box||!box.value)return;var blob=new Blob([box.value],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="dog-meal-planner-backup.json";document.body.appendChild(a);a.click();document.body.removeChild(a);setTimeout(function(){URL.revokeObjectURL(url);},1000);document.getElementById("exportStatus").className="usda-status";document.getElementById("exportStatus").innerHTML="Downloaded!";}
function applyImport(){var ta=document.getElementById("importInput");var st=document.getElementById("importStatus");var raw=ta.value.trim();if(!raw){st.className="usda-status err";st.innerHTML="Paste exported data first.";return;}var data;try{data=JSON.parse(raw);}catch(e){st.className="usda-status err";st.innerHTML="Invalid data.";return;}var count=0;for(var i=0;i<EXPORT_CATEGORIES.length;i++){var c=EXPORT_CATEGORIES[i];var el=document.getElementById("cat_"+c.id);if(el&&el.checked){for(var j=0;j<c.keys.length;j++){var k=c.keys[j];if(data.hasOwnProperty(k)){try{localStorage.setItem(k,data[k]);count++;}catch(e){}}}}}if(count===0){st.className="usda-status err";st.innerHTML="Nothing matched.";return;}reloadAllStateFromStorage();renderGuide();var ns=document.getElementById("importStatus");if(ns){ns.className="usda-status";ns.innerHTML="Imported successfully!";}}
function reloadAllStateFromStorage(){try{fedLog=JSON.parse(localStorage.getItem("mya_fed")||"{}");}catch(e){}try{addinsLog=JSON.parse(localStorage.getItem("mya_addins")||"{}");}catch(e){}try{productsLog=JSON.parse(localStorage.getItem("mya_products_log")||"{}");}catch(e){}try{customProducts=JSON.parse(localStorage.getItem("mya_custom_products")||"{}");}catch(e){}try{notesLog=JSON.parse(localStorage.getItem("mya_notes")||"{}");}catch(e){}try{USDA_KEY=localStorage.getItem("mya_usda_key")||"";}catch(e){}try{customAddins=JSON.parse(localStorage.getItem("mya_custom_addins")||"{}");}catch(e){}try{suppChecks=JSON.parse(localStorage.getItem("mya_supp_checks")||"{}");}catch(e){}try{proteinOverrides=JSON.parse(localStorage.getItem("mya_protein_swaps")||"{}");}catch(e){}try{vegOverrides=JSON.parse(localStorage.getItem("mya_veg_swaps")||"{}");}catch(e){}try{organOverrides=JSON.parse(localStorage.getItem("mya_organ_swaps")||"{}");}catch(e){}try{brothOverrides=JSON.parse(localStorage.getItem("mya_broth_swaps")||"{}");}catch(e){}try{starchOverrides=JSON.parse(localStorage.getItem("mya_starch_swaps")||"{}");}catch(e){}try{amountOverrides=JSON.parse(localStorage.getItem("mya_amount_overrides")||"{}");}catch(e){}try{petName=localStorage.getItem("mya_pet_name")||"";}catch(e){}try{var sc=JSON.parse(localStorage.getItem("mya_calc_state")||"null");if(sc)_calcState=sc;}catch(e){}var n=Object.keys(customAddins);for(var i=0;i<n.length;i++)ADDINS[n[i]]=customAddins[n[i]];ADDIN_NAMES=Object.keys(ADDINS);var pi=document.getElementById("petNameInput");if(pi)pi.value=petName;try{var ph=localStorage.getItem("mya_pet_photo");if(ph)showPetPhoto(ph);}catch(e){}updateHeaderSub();}

var _productDraft=null;
function buildRecipeBoxList(){var ids=Object.keys(customProducts);if(ids.length===0)return '<div class="addl-empty">No products yet.</div>';var h="";for(var i=0;i<ids.length;i++){var p=customProducts[ids[i]];var per=calcProductPerServing(p);var totalOz=0;for(var j=0;j<p.ingredients.length;j++)totalOz+=(p.ingredients[j].oz||0);var ozPer=(p.servings>0)?(totalOz/p.servings):0;h+='<div class="usda-result-item" onclick="openProductBuilder(\''+ids[i]+'\')"><div class="usda-result-name">'+escapeHtml(p.name)+' <span class="usda-result-badge">'+p.servings+' servings</span></div><div class="usda-result-meta">'+p.ingredients.length+' ingredients • ~'+ozPer.toFixed(1)+' oz/serving</div></div>';}return h;}
function openProductBuilder(existingId){if(existingId&&customProducts[existingId]){var existing=customProducts[existingId];_productDraft={id:existing.id,name:existing.name,servings:existing.servings,ingredients:existing.ingredients.map(function(i){return {name:i.name,oz:i.oz};});};}else{_productDraft={id:null,name:"",servings:12,ingredients:[]};}renderProductBuilderModal();}
function buildDraftIngredientRows(){if(_productDraft.ingredients.length===0)return '<div class="addl-empty">No ingredients — search and add below</div>';var rows="";for(var i=0;i<_productDraft.ingredients.length;i++){var ing=_productDraft.ingredients[i];rows+='<div class="ai-row"><span class="ai-name">'+escapeHtml(ing.name)+'</span><input class="ai-input" type="number" step="0.1" min="0" value="'+(ing.oz||"")+'" placeholder="oz" onchange="updateDraftIngredientOz('+i+',this.value)"><span class="ai-unit">oz</span><button class="modal-close" style="font-size:14px;" onclick="removeDraftIngredient('+i+')">✕</button></div>';}return rows;}
function renderProductBuilderModal(){document.getElementById("modal-root").innerHTML='<div class="overlay" id="mbg"><div class="modal"><div class="modal-head"><div class="modal-title">'+(_productDraft.id?"Edit Product":"New Product")+'</div><button class="modal-close" onclick="closeModal()">✕</button></div><div class="modal-hint">Build a recipe — log it by the serving anytime.</div><div class="ai-row"><span class="ai-name">Product name</span></div><input type="text" id="prodNameInput" class="usda-key-input" placeholder="e.g. Peanut Butter Treats" value="'+escapeHtml(_productDraft.name)+'" oninput="updateDraftName(this.value)"><div class="ai-row" style="margin-top:6px;"><span class="ai-name">Batch yield (servings)</span><input class="ai-input" type="number" min="1" step="1" id="prodServingsInput" value="'+_productDraft.servings+'" onchange="updateDraftServings(this.value)"></div><div style="font-weight:700;font-size:10px;color:#c8933a;margin:6px 0;">Ingredients (by weight, oz)</div><div id="draftIngredientsContainer">'+buildDraftIngredientRows()+'</div><div class="usda-modal-toggle" onclick="toggleProductUsdaPanel()">🔍 Search & add ingredient</div><div class="usda-modal-panel" id="productUsdaPanel" style="display:none"><div class="usda-search-row"><input type="text" id="prodUsdaQuery" class="usda-search-input" placeholder="Search..." onkeydown="if(event.key==\'Enter\')searchUsdaForProduct()"><button class="usda-search-btn" onclick="searchUsdaForProduct()">Search</button></div>'+(USDA_KEY?"":'<div class="usda-status err">Paste a USDA API key first.</div>')+'<div class="usda-status" id="prodUsdaStatus"></div><div id="prodUsdaResults"></div></div><button class="save-btn" onclick="saveProductFromBuilder()">Save Product</button>'+( _productDraft.id?'<button class="usda-modal-toggle" style="color:#f44336" onclick="deleteProductFromBuilder(\''+_productDraft.id+'\')">Delete this product</button>':'')+'</div></div>';document.getElementById("mbg").addEventListener("click",function(e){if(e.target===this)closeModal();});}
function toggleProductUsdaPanel(){var p=document.getElementById("productUsdaPanel");p.style.display=p.style.display==="none"?"block":"none";}
function updateDraftName(v){_productDraft.name=v;}
function updateDraftServings(v){var n=parseInt(v,10);_productDraft.servings=(n>0)?n:1;}
function updateDraftIngredientOz(idx,v){var n=parseFloat(v);_productDraft.ingredients[idx].oz=(n>0)?n:0;}
function removeDraftIngredient(idx){_productDraft.ingredients.splice(idx,1);document.getElementById("draftIngredientsContainer").innerHTML=buildDraftIngredientRows();}
function prodUsdaStatus(msg,isErr){var el=document.getElementById("prodUsdaStatus");el.className="usda-status"+(isErr?" err":"");el.innerHTML=msg;}
function searchUsdaForProduct(){var q=document.getElementById("prodUsdaQuery").value.trim();if(!USDA_KEY){prodUsdaStatus("Paste a USDA API key first.",true);return;}if(!q){prodUsdaStatus("Type an ingredient to search.",true);return;}document.getElementById("prodUsdaResults").innerHTML="";prodUsdaStatus("Searching...",false);fetchUsdaSearch(q,["Foundation","SR Legacy","Survey (FNDDS)","Branded","Experimental"],function(foods){if(foods.length===0){prodUsdaStatus("No matches.",false);return;}prodUsdaStatus(foods.length+" results — tap to add",false);var html="";for(var i=0;i<foods.length;i++){var f=foods[i];var name=escapeHtml(f.description||"Unknown");var brand=f.brandOwner?" — "+escapeHtml(f.brandOwner):"";var desc=(f.description||"").replace(/'/g,"\\'").replace(/"/g,"&quot;");html+='<div class="usda-result-item" onclick="confirmAddUsdaIngredientToProduct('+f.fdcId+',\''+desc+'\')"><div class="usda-result-name">'+name+'<span class="usda-result-badge">'+escapeHtml(f.dataType||"")+'</span></div><div class="usda-result-meta">FDC #'+f.fdcId+brand+'</div></div>';}document.getElementById("prodUsdaResults").innerHTML=html;},function(msg){prodUsdaStatus(msg,true);});}
function confirmAddUsdaIngredientToProduct(fdcId,desc){var match=checkFoodSafety(desc);if(match){showFoodSafetyAlert(match,function(){addUsdaIngredientToProduct(fdcId);});}else{addUsdaIngredientToProduct(fdcId);}}
function addUsdaIngredientToProduct(fdcId){prodUsdaStatus("Adding ingredient...",false);fetchUsdaDetail(fdcId,function(detail){var perOz=per100gToPerOz(extractPer100g(detail));var name=detail.description;ADDINS[name]=perOz;customAddins[name]=perOz;try{localStorage.setItem("mya_custom_addins",JSON.stringify(customAddins));}catch(e){}ADDIN_NAMES=Object.keys(ADDINS);_productDraft.ingredients.push({name:name,oz:0});document.getElementById("draftIngredientsContainer").innerHTML=buildDraftIngredientRows();document.getElementById("prodUsdaResults").innerHTML="";document.getElementById("prodUsdaQuery").value="";prodUsdaStatus("✅ Added \""+escapeHtml(name)+"\" — enter its ounces above.",false);},function(msg){prodUsdaStatus(msg,true);});}
function saveProductFromBuilder(){if(!_productDraft.name||!_productDraft.name.trim()){alert("Give your product a name.");return;}if(_productDraft.ingredients.length===0){alert("Add at least one ingredient.");return;}var valid=_productDraft.ingredients.filter(function(i){return i.oz>0;});if(valid.length===0){alert("Enter an ounce amount for at least one ingredient.");return;}saveProduct({id:_productDraft.id,name:_productDraft.name.trim(),servings:_productDraft.servings,ingredients:valid});_productDraft=null;closeModal();renderGuide();}
function deleteProductFromBuilder(id){deleteProduct(id);_productDraft=null;closeModal();renderGuide();}

(function setupSwipe(){var sx=null,sy=null;var el=document.getElementById("page-calendar");if(!el)return;el.addEventListener("touchstart",function(e){var t=e.touches[0];sx=t.clientX;sy=t.clientY;},{passive:true});el.addEventListener("touchend",function(e){if(sx===null)return;var t=e.changedTouches[0];var dx=t.clientX-sx,dy=t.clientY-sy;if(Math.abs(dx)>50&&Math.abs(dx)>Math.abs(dy)*1.5){if(dx<0)changeDay(1);else changeDay(-1);}sx=null;sy=null;},{passive:true});})();
