        function calcMealNutrients(meal) {
            const totals = {};
            Object.keys(AAFCO).forEach(k => totals[k] = 0);
            
            const add = (ingredient, oz) => {
                const n = NUTRIENTS_PER_OZ[ingredient];
                if (!n) return;
                Object.keys(totals).forEach(k => totals[k] += (n[k] || 0) * oz);
            };
            
            add(meal.protein, 8);
            add(meal.starch, 2.5);
            add(meal.vegetable, 2.5);
            if (meal.organ) add(meal.organ, 0.5);
            
            totals.calcium += 800;
            totals.vitE += 15;
            totals.iodine += 0.05;
            
            return totals;
        }

        function NutrientBar({ value, min, max, color, label, unit }) {
            const belowMin = value < min;
            const aboveMax = value > max;
            let status = "✓";
            let barColor = color;
            if (belowMin) { status = "⚠ LOW"; barColor = "#e07b54"; }
            if (aboveMax) { status = "⚠ HIGH"; barColor = "#c8933a"; }
            const pct = Math.min((value / max) * 100, 100);
            
            return (
                <div style={{ marginBottom: 9 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", marginBottom: 2, fontSize: 10 }}>
                        <span style={{ color: "#9aabb8", fontWeight: 600 }}>{label}</span>
                        <span style={{ color: belowMin || aboveMax ? barColor : "#7ecb9f", fontWeight: 700, fontSize: 9 }}>
                            {value >= 10 ? Math.round(value) : value.toFixed(1)} / {min >= 10 ? Math.round(min) : min.toFixed(1)} {unit} {status}
                        </span>
                    </div>
                    <div style={{ background: "#1a2535", borderRadius: 3, height: 5, overflow:"hidden" }}>
                        <div style={{ width: `${pct}%`, height:"100%", background: barColor, borderRadius: 3 }} />
                    </div>
                </div>
            );
        }

            const saveFed = (newLog) => {

            };

            const dateStr = getDateStr(currentDate);
            const dayOfYear = Math.floor((currentDate - new Date(currentDate.getFullYear(), 0, 0)) / 86400000);
            const rotationDay = dayOfYear % 28;
            const weekIdx = Math.floor(rotationDay / 7);
            const dayIdx = rotationDay % 7;
            const day = MEAL_DATA.rotation_weeks[weekIdx].days[dayIdx];

            const { totals, mealsFed } = useMemo(() => {
                const t = {};
                Object.keys(AAFCO).forEach(k => t[k] = 0);
                let mf = 0;
                for (let i = -30; i <= 0; i++) {
                    const d = new Date(currentDate);
                    d.setDate(d.getDate() + i);
                    const ds = getDateStr(d);
                    ["am","pm"].forEach(slot => {
                        if (fedLog[`${ds}-${slot}`]) {
                            mf++;
                            const doy = Math.floor((d - new Date(d.getFullYear(), 0, 0)) / 86400000);
                            const rday = doy % 28;
                            const widx = Math.floor(rday / 7);
                            const didx = rday % 7;
                            const m = MEAL_DATA.rotation_weeks[widx].days[didx][slot];
                            const n = calcMealNutrients(m);
                            Object.keys(t).forEach(k => t[k] += n[k]);
                        }
                    });

                return { totals: t, mealsFed: mf };

                        <div style={{ padding:"12px 14px 0" }}>
                            <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:12 }}>
                                <button onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate()-1); setCurrentDate(d); }} style={{ padding:"4px 10px", borderRadius:6, border:"1px solid #2a3a4a", background:"#1a2535", color:"#f0e6d3", cursor:"pointer" }}>←</button>
                                <div style={{ flex:1, textAlign:"center", fontSize:14, fontWeight:800, color:"#f0e6d3" }}>
                                    {currentDate.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}
                                </div>
                                <button onClick={() => { const d = new Date(currentDate); d.setDate(d.getDate()+1); setCurrentDate(d); }} style={{ padding:"4px 10px", borderRadius:6, border:"1px solid #2a3a4a", background:"#1a2535", color:"#f0e6d3", cursor:"pointer" }}>→</button>
                            </div>

                            <div style={{ background:"#1a2535", border:"1px solid #2a3a4a", borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
                                <div style={{ fontSize:11, fontWeight:700, color:"#4a6fa5", marginBottom:8 }}>Week {weekIdx + 1} · {day.day}</div>
                                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8 }}>
                                    {["am","pm"].map(slot => {
                                        const meal = day[slot];
                                        const isChecked = !!fedLog[`${dateStr}-${slot}`];
                                        return (
                                            <div key={slot} onClick={() => saveFed({...fedLog, [`${dateStr}-${slot}`]: !isChecked})} style={{ background: isChecked ? (slot==="am" ? "#1a2e1a" : "#2e1a1a") : "#0f1a28", border: isChecked ? "2px solid #7ecb9f" : "2px solid #2a3a4a", borderRadius:8, padding:10, cursor:"pointer", transition:"all 0.2s" }}>
                                                {isChecked && <div style={{ fontSize:12, color:"#7ecb9f", fontWeight:900, marginBottom:4 }}>✓ Fed</div>}
                                                <div style={{ fontSize:13, fontWeight:700, color:"#f0e6d3", marginBottom:4 }}>{meal.protein}</div>
                                                <div style={{ fontSize:9, color:"#8a9bb0", lineHeight:1.6 }}>
                                                    <div>{meal.starch} · 2.5 oz</div>
                                                    <div>{meal.vegetable} · 2.5 oz</div>
                                                    {meal.organ && <div>{meal.organ} · 0.5 oz</div>}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTab === "nutrition" && (
                        <div style={{ padding:"12px 14px 0" }}>
                            {mealsFed === 0 ? (
                                <div style={{ textAlign:"center", padding:"60px 20px", color:"#4a6fa5" }}>
                                    <div style={{ fontSize:40, marginBottom:12 }}>🐾</div>
                                    <div style={{ fontSize:14, color:"#8a9bb0" }}>Mark meals as fed to see nutrition</div>
                                </div>
                            ) : (
                                <>
                                    <div style={{ background:"#1a2535", border:"1px solid #2a3a4a", borderRadius:10, padding:"10px 12px", marginBottom:12 }}>
                                        <div style={{ fontSize:12, fontWeight:800, color:"#f0e6d3", marginBottom:4 }}>30-Day Nutrition</div>
                                        <div style={{ fontSize:10, color:"#6b7a8d" }}>{mealsFed} meals · ~{Math.round(mealsFed/2)} days</div>
                                    </div>

                                    <div style={{ background:"#141e2b", border:"1px solid #2a3a4a", borderRadius:10, padding:"12px 12px 8px" }}>
                                        <div style={{ fontSize:10, fontWeight:700, color:"#4a6fa5", marginBottom:10, textTransform:"uppercase" }}>All 28 Nutrients</div>
                                        {Object.entries(AAFCO).map(([k, meta]) => (
                                            <NutrientBar key={k} value={dailyAvg[k]} min={meta.min} max={meta.max} color={meta.color} label={meta.label} unit={meta.unit} />
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>
                    )}

                    {activeTab === "recipes" && (
                        <div style={{ padding:"12px 14px 0" }}>
                            {Object.entries(RECIPES).map(([k, recipe]) => (
                                <div key={k} style={{ background:"#1a2535", border:"1px solid #2a3a4a", borderRadius:10, padding:12, marginBottom:12 }}>
                                    <div style={{ fontSize:12, fontWeight:800, color:"#c8933a", marginBottom:8 }}>{recipe.name}</div>
                                    <div style={{ fontSize:10, color:"#8a9bb0", marginBottom:8 }}>
                                        <div style={{ fontWeight:700, color:"#7ecb9f", marginBottom:4 }}>Base (16 oz):</div>
                                        <div>{recipe.base}</div>
                                    </div>
                                    <div style={{ fontSize:10, color:"#8a9bb0", marginBottom:8 }}>
                                        <div style={{ fontWeight:700, color:"#7ecb9f", marginBottom:4 }}>Supplements:</div>
                                        {recipe.supplements.map((s, i) => <div key={i}>• {s}</div>)}
                                    </div>
                                </div>
                            ))}

                            <div style={{ background:"#141e2b", border:"2px solid #e07b54", borderRadius:10, padding:12, marginTop:16, marginBottom:12 }}>
                                <div style={{ fontSize:11, fontWeight:800, color:"#e07b54", marginBottom:8, textTransform:"uppercase" }}>⚠️ Disclaimer</div>
                                <div style={{ fontSize:10, color:"#8a9bb0", lineHeight:1.7 }}>
                                    This meal planner is for informational purposes only. <strong style={{color:"#f0e6d3"}}>I assume no responsibility for any injury or illness to your pet.</strong> Always consult with your veterinarian before making dietary changes.
                                </div>
                            </div>
                        </div>
                    )}

                    <div style={{ padding:"16px 14px", textAlign:"center", fontSize:9, color:"#4a6fa5", borderTop:"1px solid #2a3a4a", marginTop:20 }}>
                        ⚠️ Nutritional information only. Always consult a veterinarian. No liability assumed.
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
