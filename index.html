// ── NUTRITION ─────────────────────────────────────────────────────────────────
function setNutView(v){ nutView=v; renderNutrition(); }

var _nutNavDir = 0;
function navNutrition(dir){
  _nutNavDir = dir;
  if(nutView==="day"){
    var nd=addDays(nutYear,nutMonth,nutDay,dir);
    nutYear=nd.y; nutMonth=nd.m; nutDay=nd.d;
  } else if(nutView==="week"){
    var nd2=addDays(nutYear,nutMonth,nutDay,dir*7);
    nutYear=nd2.y; nutMonth=nd2.m; nutDay=nd2.d;
  } else if(nutView==="month"){
    var dt=new Date(nutYear,nutMonth+dir,1);
    nutYear=dt.getFullYear(); nutMonth=dt.getMonth();
  } else {
    nutYear+=dir;
  }
  renderNutrition();
}

function renderNutrition(){
  var views=["day","week","month","year"];
  var toggle='<div class="view-toggle">';
  for(var i=0;i<views.length;i++){
    var v=views[i];
    var lbl=v==="day"?"Day":v==="week"?"Week":v==="month"?"Month":"Year";
    toggle+='<button class="view-btn'+(nutView===v?" active":"")+'" onclick="setNutView(\''+v+'\')">'+lbl+'</button>';
  }
  toggle+='</div>';

  var startY,startM,startD,endY,endM,endD,navLabel;
  if(nutView==="day"){
    startY=endY=nutYear; startM=endM=nutMonth; startD=endD=nutDay;
    navLabel=fmtDate(nutYear,nutMonth,nutDay);
  } else if(nutView==="week"){
    var st=startOfWeek(nutYear,nutMonth,nutDay);
    var en=addDays(st.y,st.m,st.d,6);
    startY=st.y; startM=st.m; startD=st.d;
    endY=en.y; endM=en.m; endD=en.d;
    navLabel=monthAbbrev(st.m)+" "+st.d+" &ndash; "+monthAbbrev(en.m)+" "+en.d+(en.y!==st.y?", "+en.y:"");
  } else if(nutView==="month"){
    startY=endY=nutYear; startM=endM=nutMonth;
    startD=1; endD=new Date(nutYear,nutMonth+1,0).getDate();
    navLabel=monthAbbrev(nutMonth)+" "+nutYear;
  } else {
    startY=endY=nutYear; startM=0; endM=11; startD=1; endD=31;
    navLabel=String(nutYear);
  }

  var nav='<div class="hist-nav-row">'
    +'<button class="nav-btn" onclick="navNutrition(-1)">&#8249;</button>'
    +'<div class="hist-period-label">'+navLabel+'</div>'
    +'<button class="nav-btn" onclick="navNutrition(1)">&#8250;</button>'
    +'</div>';

  var result=calcNutritionRange(startY,startM,startD,endY,endM,endD);
  var el=document.getElementById("page-nutrition");

  if(result.mealCount===0){
    var dirClassEmpty = _nutNavDir>0 ? "slide-in-right" : (_nutNavDir<0 ? "slide-in-left" : "");
    _nutNavDir = 0;
    el.innerHTML=toggle+nav+'<div class="'+("nut-content-anim "+dirClassEmpty).trim()+'"><div class="empty-state"><div style="font-size:40px;margin-bottom:14px">&#x1F43E;</div>'
      +'<div style="font-size:15px;color:#888">No meals logged for this period</div>'
      +'<div style="font-size:12px;color:#555;margin-top:8px">Mark meals as Fed in the Feeding Schedule tab</div></div></div>';
    return;
  }

  var divisor=(nutView==="day")?1:(result.dayCount||1);
  var avg={};
  for(var j=0;j<KEYS.length;j++) avg[KEYS[j]]=result.totals[KEYS[j]]/divisor;

  _nutSources=result.sources;
  _nutPeriodLabel=navLabel;

  var ok=0,low=0,high=0;
  for(var a=0;a<AAFCO.length;a++){
    var cfg=AAFCO[a],v=avg[cfg.k];
    if(v<cfg.min) low++; else if(cfg.max<999&&v>cfg.max) high++; else ok++;
  }

  var summaryTitle=(petName?escapeHtml(petName)+"'s ":"")+((nutView==="day")?"Daily Totals":"Daily Average");

  var caP=(avg.phosphorus>0) ? (avg.calcium/avg.phosphorus) : 0;
  var caPStatus=(caP>=1.0 && caP<=2.0) ? "ok" : "off";
  var caPColor=caPStatus==="ok" ? "#4caf50" : "#ff9800";
  var caPNote=caPStatus==="ok" ? "&#10003; within AAFCO range" : "&#9888; outside 1:1&ndash;2:1 range";

  var html='<div class="summary-box">'
    +'<div class="summary-title">'+summaryTitle+'</div>'
    +'<div class="summary-sub">'+result.mealCount+' meals &bull; '+result.dayCount+' day'+(result.dayCount===1?'':'s')+' logged</div>'
    +'<div class="pill-row">'
    +'<div class="s-pill" style="background:rgba(76,175,80,.15);color:#4caf50">&#10003; '+ok+' Optimal</div>'
    +(low>0?'<div class="s-pill" style="background:rgba(244,67,54,.15);color:#f44336">&#9888; '+low+' Low</div>':'')
    +(high>0?'<div class="s-pill" style="background:rgba(255,152,0,.15);color:#ff9800">&#9888; '+high+' High</div>':'')
    +'</div>'
    +'<div class="ratio-note" style="margin-top:10px"><strong style="color:'+caPColor+'">Ca:P ratio &mdash; '+caP.toFixed(2)+':1</strong> &middot; '+caPNote+' (target 1:1&ndash;2:1)</div>'
    +'</div>';
  for(var a=0;a<AAFCO.length;a++){
    var cfg=AAFCO[a],v=avg[cfg.k];
    var status=v<cfg.min?"low":(cfg.max<999&&v>cfg.max?"high":"ok");
    var pct=cfg.max<9000?Math.min((v/cfg.max)*100,100):Math.min((v/(cfg.min*1.5))*100,100);
    var disp=v>=10?Math.round(v):v.toFixed(2);
    var range=cfg.max<9000?cfg.min+"&ndash;"+cfg.max:cfg.min+"+";
    var bc=status==="ok"?"#4caf50":status==="low"?"#f44336":"#ff9800";
    var pb=status==="ok"?"rgba(76,175,80,.15)":status==="low"?"rgba(244,67,54,.15)":"rgba(255,152,0,.15)";
    var pt=status==="ok"?"&#10003; OK":status==="low"?"LOW":"HIGH";
    html+='<div class="n-card" onclick="openNutrientBreakdown(\''+cfg.k+'\')">'
      +'<div class="n-head"><span class="n-name">'+cfg.label+'</span>'
      +'<span class="n-val">'+disp+' '+cfg.unit
      +'<span class="n-pill" style="background:'+pb+';color:'+bc+'">'+pt+'</span></span></div>'
      +'<div class="bar-bg"><div class="bar-fill" style="width:'+pct+'%;background:'+bc+'"></div></div>'
      +'<div class="n-range">Target: '+range+' '+cfg.unit+' &middot; tap for breakdown</div></div>';
  }
  var dirClassNut = _nutNavDir>0 ? "slide-in-right" : (_nutNavDir<0 ? "slide-in-left" : "");
  _nutNavDir = 0;
  el.innerHTML = toggle+nav+'<div class="'+("nut-content-anim "+dirClassNut).trim()+'">'+html+'</div>';
}

function openNutrientBreakdown(key){
  var cfg=null;
  for(var i=0;i<AAFCO.length;i++){ if(AAFCO[i].k===key){ cfg=AAFCO[i]; break; } }
  if(!cfg) return;

  var srcMap=_nutSources[key]||{};
  var names=Object.keys(srcMap);
  names.sort(function(a,b){ return srcMap[b]-srcMap[a]; });
  var total=0;
  for(var i=0;i<names.length;i++) total+=srcMap[names[i]];

  var rows="";
  if(names.length===0){
    rows='<div class="dd-detail">No contributing sources in this period.</div>';
  } else {
    for(var i=0;i<names.length;i++){
      var amt=srcMap[names[i]];
      var pctOf=total>0?Math.round((amt/total)*100):0;
      var disp=amt>=10?Math.round(amt):amt.toFixed(2);
      rows+='<div class="usda-nutrient-row"><span>'+escapeHtml(names[i])+'</span><span>'+disp+' '+cfg.unit+' ('+pctOf+'%)</span></div>';
    }
  }

  document.getElementById("modal-root").innerHTML=
    '<div class="overlay" id="mbg"><div class="modal">'
    +'<div class="modal-head"><div class="modal-title">'+cfg.label+' Breakdown</div>'
    +'<button class="modal-close" onclick="closeModal()">&#10005;</button></div>'
    +'<div class="modal-hint">'+_nutPeriodLabel+' &mdash; what contributed</div>'
    +rows
    +'</div></div>';

  document.getElementById("mbg").addEventListener("click",function(e){if(e.target===this)closeModal();});
}

// ── PROTEIN PICKER (Guide tab) ────────────────────────────────────────────────
function shortProtLabel(n){
  return (n||"").replace(" (canned)","").replace("Ground ","");
}

// Draft selection lives here while the operator is checking/unchecking boxes;
// nothing is applied to the live rotation until they tap Save & Rebuild Rotation.
var _proteinDraft = null;

function buildProteinPickerRows(){
  if(_proteinDraft===null) _proteinDraft = selectedProteins.slice();
  var rows="";
  for(var i=0;i<PROTEIN_CATALOG.length;i++){
    var c=PROTEIN_CATALOG[i];
    var checked=_proteinDraft.indexOf(c.name)!==-1;
    var atMax=(_proteinDraft.length>=MAX_SELECTED_PROTEINS) && !checked;
    rows+='<label class="protein-pick-item'+(checked?" checked":"")+(atMax?" disabled":"")+'">'
      +'<input type="checkbox" '+(checked?"checked":"")+(atMax?" disabled":"")+' onchange="toggleProteinDraft(\''+c.name.replace(/'/g,"\\'")+'\',this.checked)">'
      +'<span class="protein-pick-name">'+shortProtLabel(c.name)+'</span>'
      +(c.category==="fish"?'<span class="protein-pick-fish">&#127991; fish</span>':'')
      +'</label>';
  }
  return rows;
}

function updateProteinPickCount(){
  var el=document.getElementById("proteinPickCount");
  if(el) el.innerHTML=_proteinDraft.length+" / "+MAX_SELECTED_PROTEINS+" selected";
}

function toggleProteinDraft(name,checked){
  if(_proteinDraft===null) _proteinDraft=selectedProteins.slice();
  if(checked){
    if(_proteinDraft.indexOf(name)===-1 && _proteinDraft.length<MAX_SELECTED_PROTEINS) _proteinDraft.push(name);
  } else {
    _proteinDraft = _proteinDraft.filter(function(n){return n!==name;});
  }
  var grid=document.getElementById("proteinPickGrid");
  if(grid) grid.innerHTML=buildProteinPickerRows();
  updateProteinPickCount();
}

function openOnboarding(){
  _onbIndex=0;
  document.getElementById("onboarding-root").innerHTML=buildOnboardingHtml();
  updateOnbNextLabel();

function showOnbStep(i){
  for(var k=0;k<ONBOARDING_STEPS.length;k++){
    var slide=document.getElementById("onbSlide-"+k);
    var dot=document.getElementById("onbDot-"+k);
    if(!slide) continue;
    if(k===i){ slide.className="onb-slide active"; dot.className="onb-dot active"; }
    else { slide.className="onb-slide"; dot.className="onb-dot"; }
  }
  updateOnbNextLabel();

function updateOnbNextLabel(){
  var btn=document.getElementById("onbNextBtn");
  if(btn) btn.textContent = (_onbIndex===ONBOARDING_STEPS.length-1) ? "Got It!" : "Next";

function advanceOnboarding(){
  if(_onbIndex>=ONBOARDING_STEPS.length-1){ closeOnboarding(); return; }
  _onbIndex++;
  showOnbStep(_onbIndex);
}

function closeOnboarding(){
  try{ localStorage.setItem("mya_onboarded","1"); }catch(e){}
  document.getElementById("onboarding-root").innerHTML="";
}

function maybeShowOnboardingOnBoot(){
  var seen=false;
  try{ seen = localStorage.getItem("mya_onboarded")==="1"; }catch(e){}

}

// ── AI ADVISOR ─────────────────────────────────────────────────────────────
// Builds a compact live summary of this specific dog's profile — weight,
// calorie target, active rotation proteins, today's scheduled meals, and
// whether recent logged nutrition is tracking on/off target — so the AI's
// answer is grounded in this dog's actual data rather than generic advice.
function buildDogProfileContext(){
  var parts=[];
  parts.push("Name: "+(petName||"Not set"));
  parts.push("Weight: "+Math.round(_calcState.weight||60)+" lb");
  parts.push("Activity level: "+(_calcState.activityLabel||"Not set"));
  parts.push("Daily calorie target: ~"+Math.round(_calcState.mer||1334)+" kcal/day (~"+(_calcState.ozPerDay||31.6).toFixed(1)+" oz/day across 2 meals)");
  parts.push("Active rotation proteins: "+(selectedProteins.length?selectedProteins.join(", "):"Beef, Ground Turkey, Pork Loin, Ground Chicken (default)"));

  try{
    var dow=getDOW(curYear,curMonth,curDay), wk=getWK(curYear,curMonth,curDay), dn=DAYS_OF_WEEK[dow];
    var dm=(WEEKS[wk]||{})[dn]||{};
    if(dm.am) parts.push("Today's AM meal: "+dm.am.protein+", "+dm.am.starch+", "+dm.am.veg+(dm.am.organ?", "+dm.am.organ:", no organ"));
    if(dm.pm) parts.push("Today's PM meal: "+dm.pm.protein+", "+dm.pm.starch+", "+dm.pm.veg+(dm.pm.organ?", "+dm.pm.organ:", no organ"));
  }catch(e){}

  try{
    var endD=new Date(curYear,curMonth,curDay);
    var startD=new Date(curYear,curMonth,curDay-6);
    var result=calcNutritionRange(startD.getFullYear(),startD.getMonth(),startD.getDate(),endD.getFullYear(),endD.getMonth(),endD.getDate());
    if(result.mealCount>0){
      var divisor=result.dayCount||1;
      var flagged=[];
      for(var i=0;i<AAFCO.length;i++){
        var cfg=AAFCO[i], v=result.totals[cfg.k]/divisor;
        if(v<cfg.min) flagged.push(cfg.label+" is trending low");
        else if(cfg.max<999 && v>cfg.max) flagged.push(cfg.label+" is trending high");
      }
      parts.push("Last 7 days: "+result.mealCount+" meals logged. "+(flagged.length?flagged.join("; ")+".":"All tracked nutrients within AAFCO range."));
    } else {
      parts.push("No meals logged in the last 7 days yet.");
    }
  }catch(e){}

  if(Object.keys(customProducts).length>0){
    var productNames=Object.keys(customProducts).map(function(id){return customProducts[id].name;});
    parts.push("Saved homemade products/treats: "+productNames.join(", "));
  }

  return parts.join("\n");
}

var _aiAdvisorBusy=false;

// Maps the words people actually type to the AAFCO keys used throughout the app.
var NUTRIENT_ALIASES = {
  protein:"protein", fat:"fat", calcium:"calcium", phosphorus:"phosphorus",
  potassium:"potassium", sodium:"sodium", salt:"sodium", chloride:"chloride",
  magnesium:"magnesium", iron:"iron", copper:"copper", zinc:"zinc",
  iodine:"iodine", selenium:"selenium",
  "omega 3":"omega3", "omega-3":"omega3", omega3:"omega3", "omega 6":"omega6", "omega-6":"omega6", omega6:"omega6",
  "vitamin a":"vitA", "vit a":"vitA", "vitamin d":"vitD", "vit d":"vitD",
  "vitamin e":"vitE", "vit e":"vitE", "vitamin k":"vitK", "vit k":"vitK",
  thiamine:"vitB1", "b1":"vitB1", riboflavin:"vitB2", "b2":"vitB2",
  niacin:"vitB3", "b3":"vitB3", pantothenic:"vitB5", "b5":"vitB5",
  pyridoxine:"vitB6", "b6":"vitB6", cobalamin:"vitB12", "b12":"vitB12",
  folate:"folate", choline:"choline", manganese:"manganese"
};

var SYMPTOM_WORDS = ["vomit","throwing up","diarrhea","lethargic","limping","seizure","blood in","bleeding","won't eat","not eating","collapsed","pain","swollen","swelling","fever","tremor","difficulty breathing","choking","poisoned","allergic reaction"];

function last7DayAverages(){
  var endD=new Date(curYear,curMonth,curDay);
  var startD=new Date(curYear,curMonth,curDay-6);
  var result=calcNutritionRange(startD.getFullYear(),startD.getMonth(),startD.getDate(),endD.getFullYear(),endD.getMonth(),endD.getDate());
  var divisor=result.dayCount||1;
  var avg={};
  for(var i=0;i<AAFCO.length;i++) avg[AAFCO[i].k]=result.totals[AAFCO[i].k]/divisor;
  return { avg:avg, mealCount:result.mealCount, dayCount:result.dayCount };
}

function generateAdvisorAnswer(q){
  var name = petName || "your dog";
  var lower = q.toLowerCase();

  // Symptom/medical questions get redirected, not answered — this advisor
  // reasons over feeding data, it doesn't diagnose.
  for(var s=0;s<SYMPTOM_WORDS.length;s++){
    if(lower.indexOf(SYMPTOM_WORDS[s])!==-1){
      return "That sounds like something a veterinarian needs to look at directly rather than something I can help with from feeding data. If "+name+" is showing symptoms like this, please contact your vet \u2014 especially if it's sudden, severe, or she seems distressed.";
    }
  }

  // Food safety questions
  var safetyMatch = checkFoodSafety(q);
  if(safetyMatch){
    var verb = safetyMatch.status==="avoid" ? "should NOT be fed to " : (safetyMatch.status==="limit" ? "can be fed to "+name+" only in careful moderation" : "is safe for "+name+" in normal amounts");
    if(safetyMatch.status==="avoid"){
      return "\u274C "+safetyMatch.name+" "+verb+name+". "+(safetyMatch.reason||"")+" If she's already eaten some, contact your vet or an animal poison control line right away, especially for a larger amount.";
    }
    if(safetyMatch.status==="limit"){
      return "\u26A0\uFE0F "+safetyMatch.name+" "+verb+". "+(safetyMatch.reason||"")+" A small amount occasionally is generally fine, but it shouldn't be a regular part of the rotation.";
    }
    return "\u2705 "+safetyMatch.name+" "+verb+". "+(safetyMatch.reason?safetyMatch.reason+".":"")+" Still, everything in moderation \u2014 treats and extras should stay under about 10% of her daily calories.";
  }

  // Ca:P ratio
  if(/calcium.*phosphorus|phosphorus.*calcium|ca[\s:\/]*p\b/.test(lower)){
    var la=last7DayAverages();
    if(la.mealCount===0) return "No meals logged yet in the last 7 days, so there's no Ca:P ratio to check. Mark some meals as fed on the Feeding Schedule tab and ask again.";
    var caP = la.avg.phosphorus>0 ? (la.avg.calcium/la.avg.phosphorus) : 0;
    var ok = caP>=1.0 && caP<=2.0;
    return "Over the last "+la.dayCount+" day"+(la.dayCount===1?"":"s")+", "+name+"'s calcium-to-phosphorus ratio has averaged "+caP.toFixed(2)+":1. "+(ok ? "That's within the AAFCO-recommended range of 1:1 to 2:1 \u2014 looking good." : "That's outside the recommended 1:1\u20132:1 range, which is worth a look. Check the eggshell powder (calcium) is being included consistently, and see the Nutrition tab for a full breakdown.");
  }

  // Specific nutrient status
  var nutrientKeys = Object.keys(NUTRIENT_ALIASES).sort(function(a,b){return b.length-a.length;});
  for(var n=0;n<nutrientKeys.length;n++){
    if(lower.indexOf(nutrientKeys[n])!==-1){
      var aafcoKey = NUTRIENT_ALIASES[nutrientKeys[n]];
      var cfg=null;
      for(var c=0;c<AAFCO.length;c++){ if(AAFCO[c].k===aafcoKey){ cfg=AAFCO[c]; break; } }
      if(!cfg) break;
      var la2=last7DayAverages();
      if(la2.mealCount===0) return "No meals logged yet in the last 7 days, so I can't check "+cfg.label.toLowerCase()+" levels. Mark some meals as fed on the Feeding Schedule tab and ask again.";
      var v=la2.avg[cfg.k];
      var status = v<cfg.min ? "running LOW" : (cfg.max<999 && v>cfg.max ? "running HIGH" : "on target");
      var disp = v>=10 ? Math.round(v) : v.toFixed(2);
      var range = cfg.max<9000 ? (cfg.min+"\u2013"+cfg.max) : (cfg.min+"+");
      return name+"'s "+cfg.label.toLowerCase()+" has averaged "+disp+" "+cfg.unit+"/day over the last "+la2.dayCount+" day"+(la2.dayCount===1?"":"s")+" \u2014 that's "+status+" against the AAFCO target of "+range+" "+cfg.unit+". Tap "+cfg.label+" on the Nutrition tab to see exactly which foods are contributing.";
    }
  }

  // Calorie / portion questions
  if(/how much|calorie|portion|feeding amount|oz per meal|ounces/.test(lower)){
    return name+" is set up for about "+Math.round(_calcState.mer||1334)+" kcal/day ("+(_calcState.activityLabel||"activity level not set")+"), which works out to roughly "+(_calcState.ozPerDay||31.6).toFixed(1)+" oz/day split across 2 meals \u2014 about "+(_calcState.ozPerMeal||15.8).toFixed(1)+" oz per meal. You can adjust weight and activity level in the calculator further down this tab if anything's changed.";
  }

  // Today's meal / rotation
  if(/today|tonight|dinner|breakfast|what.*eating|what.*for (am|pm|lunch)/.test(lower)){
    try{
      var dow=getDOW(curYear,curMonth,curDay), wk=getWK(curYear,curMonth,curDay), dn=DAYS_OF_WEEK[dow];
      var dm=(WEEKS[wk]||{})[dn]||{};
      var parts=[];
      if(dm.am) parts.push("AM: "+dm.am.protein+", "+dm.am.starch+", "+dm.am.veg+(dm.am.organ?", "+dm.am.organ:""));
      if(dm.pm) parts.push("PM: "+dm.pm.protein+", "+dm.pm.starch+", "+dm.pm.veg+(dm.pm.organ?", "+dm.pm.organ:""));
      if(parts.length===0) return "No meal is scheduled today \u2014 check the Feeding Schedule tab.";
      return "Today's rotation for "+name+": "+parts.join(" \u00b7 ")+".";
    }catch(e){ return "Couldn't read today's rotation \u2014 check the Feeding Schedule tab directly."; }
  }

  // Weight / activity
  if(/weight|how much does .*weigh|activity level/.test(lower)){
    return name+" is set up at "+Math.round(_calcState.weight||60)+" lb, "+(_calcState.activityLabel||"activity level not set")+". You can update this anytime in the calculator on this tab \u2014 it recalculates the daily calorie target automatically.";
  }

  // Products / treats
  if(/treat|product|recipe box/.test(lower)){
    var pnames=Object.keys(customProducts).map(function(id){return customProducts[id].name;});
    if(pnames.length===0) return "No products saved yet in the Recipe Box. Add one from the Guide tab, and it'll show up as a quick pick whenever you log a meal.";
    return "Saved in the Recipe Box right now: "+pnames.join(", ")+". Log any of these from a meal's \"+ Add Items\" \u2192 Your Products section, by number of servings fed.";
  }

  // Fallback — teach them what this can actually do
  return "I can help with things like feeding amounts, whether a specific food is safe, how a nutrient has been trending, today's rotation, or "+name+"'s saved treats \u2014 all based on her actual profile and logs. Try something like \u201cCan she have blueberries?\u201d, \u201cHow's her zinc been this week?\u201d, or \u201cWhat's she having tonight?\u201d";
}

function askAiAdvisor(){
  if(_aiAdvisorBusy) return;
  var inputEl=document.getElementById("aiAdvisorInput");
  var statusEl=document.getElementById("aiAdvisorStatus");
  var answerEl=document.getElementById("aiAdvisorAnswer");
  var q=inputEl?inputEl.value.trim():"";
  if(!q){ statusEl.className="usda-status err"; statusEl.textContent="Type a question first."; return; }

  _aiAdvisorBusy=true;
  statusEl.className="usda-status";
  statusEl.textContent="";
  answerEl.innerHTML="";

  // Local reasoning only — see the note above buildDogProfileContext() for why
  // this doesn't call out to a live AI model.
  setTimeout(function(){
    var answer=generateAdvisorAnswer(q);
    answerEl.innerHTML=escapeHtml(answer).replace(/\n/g,"<br>");
    _aiAdvisorBusy=false;
  }, 220);
}

function askAiAdvisorExample(text){
  var inputEl=document.getElementById("aiAdvisorInput");
  if(inputEl){ inputEl.value=text; }
  askAiAdvisor();
}

function styleTitleIcons(selector){
  var titles=document.querySelectorAll(selector);
  for(var i=0;i<titles.length;i++){
    var t=titles[i];
    if(t.getAttribute("data-iconized")==="1") continue;
    var text=t.textContent.trim();
    var parts=text.split(/\s+/);
    if(parts.length<2) continue; // nothing to split into icon + text
    var icon=parts.shift();
    var rest=parts.join(" ");
    t.innerHTML="";
    var row=document.createElement("span");
    row.className="title-icon-row";
    var chip=document.createElement("span");
    chip.className="icon-chip";
    chip.textContent=icon;
    var txt=document.createElement("span");
    txt.className="title-text";
    txt.textContent=rest;
    row.appendChild(chip);
    row.appendChild(txt);
    t.appendChild(row);
    t.setAttribute("data-iconized","1");
  }
}

function makeGuideCardsCollapsible(){
  var cards=document.querySelectorAll("#page-guide .guide-card");
  for(var i=0;i<cards.length;i++){
    var card=cards[i];
    var title=card.querySelector(".guide-title");
    if(!title || title.className.indexOf("collapsible-title")!==-1) continue; // already processed

    // Move every sibling after the title into one wrapper div
    var wrapper=document.createElement("div");
    wrapper.className="collapsible-content";
    var node=title.nextSibling;
    while(node){
      var next=node.nextSibling;
      wrapper.appendChild(node);
      node=next;
    }
    card.appendChild(wrapper);

    var arrow=document.createElement("span");
    arrow.className="collapse-arrow";
    arrow.innerHTML="&#9662;";
    title.appendChild(arrow);
    title.className+=" collapsible-title";

    title.addEventListener("click",(function(wrapperEl,arrowEl){
      return function(){
        var hidden=wrapperEl.className.indexOf("is-hidden")!==-1;
        if(hidden){
          wrapperEl.className=wrapperEl.className.replace(" is-hidden","");
          arrowEl.innerHTML="&#9662;";
        } else {
          wrapperEl.className+=" is-hidden";
          arrowEl.innerHTML="&#9656;";
        }
      };
    })(wrapper,arrow));
  }
}

function runCalc(){
  var lbEl=document.getElementById("calcWeight");
  var actEl=document.getElementById("calcActivity");
  if(!lbEl||!actEl) return;
  var lb=parseFloat(lbEl.value)||0;
  var factor=parseFloat(actEl.value)||1.6;
  var activityLabel=actEl.options[actEl.selectedIndex] ? actEl.options[actEl.selectedIndex].text : "";
  var kg=lb/2.2046;
  var rer=70*Math.pow(kg,0.75);
  var mer=rer*factor;
  var kcalPerOz=42.2; // derived from Mya's plan: ~1,350 kcal / 32 oz daily food
  var ozPerDay=mer/kcalPerOz;
  var ozPerMeal=ozPerDay/2;

  _calcState={weight:lb,factor:factor,activityLabel:activityLabel,rer:rer,mer:mer,ozPerDay:ozPerDay,ozPerMeal:ozPerMeal};
  try{localStorage.setItem("mya_calc_state",JSON.stringify(_calcState));}catch(e){}

  document.getElementById("calcResult").innerHTML=
    '<div class="calc-out"><span>RER (resting energy)</span><span>'+Math.round(rer)+' kcal/day</span></div>'
    +'<div class="calc-out highlight"><span>MER (daily calories)</span><span>'+Math.round(mer)+' kcal/day</span></div>'
    +'<div class="calc-out"><span>Est. total food</span><span>'+ozPerDay.toFixed(1)+' oz/day</span></div>'
    +'<div class="calc-out"><span>Per meal (2&times;/day)</span><span>'+ozPerMeal.toFixed(1)+' oz</span></div>';

  updateHeaderSub();
}

function buildCategoryCheckboxRows(){
  var rows="";
  for(var i=0;i<EXPORT_CATEGORIES.length;i++){
    var c=EXPORT_CATEGORIES[i];
    rows+='<label class="export-row"><input type="checkbox" id="cat_'+c.id+'" checked onchange="syncSelectAllCategories()"><span>'+c.label+'</span></label>';
  }
  return rows;
}

function toggleSelectAllCategories(checked){
  for(var i=0;i<EXPORT_CATEGORIES.length;i++){
    var el=document.getElementById("cat_"+EXPORT_CATEGORIES[i].id);
    if(el) el.checked=checked;
  }
}

function syncSelectAllCategories(){
  var all=document.getElementById("catSelectAll");
  if(!all) return;
  var checkedCount=0;
  for(var i=0;i<EXPORT_CATEGORIES.length;i++){
    var el=document.getElementById("cat_"+EXPORT_CATEGORIES[i].id);
    if(el && el.checked) checkedCount++;
  }
  all.checked=(checkedCount===EXPORT_CATEGORIES.length);
  all.indeterminate=(checkedCount>0 && checkedCount<EXPORT_CATEGORIES.length);
}

function doExport(){
  var data={};
  var anySelected=false;
  for(var i=0;i<EXPORT_CATEGORIES.length;i++){
    var c=EXPORT_CATEGORIES[i];
    var el=document.getElementById("cat_"+c.id);
    if(el && el.checked){
      anySelected=true;
      for(var j=0;j<c.keys.length;j++){
        var k=c.keys[j];
        var v=null;
        try{ v=localStorage.getItem(k); }catch(e){}
        if(v!==null) data[k]=v;
      }
    }
  }
  if(!anySelected){
    document.getElementById("exportStatus").innerHTML="Select at least one category first.";
    document.getElementById("exportStatus").className="usda-status err";
    return;
  }
  var json=JSON.stringify(data,null,2);
  document.getElementById("exportOutput").value=json;
  document.getElementById("exportOutputWrap").style.display="block";
  document.getElementById("exportStatus").innerHTML="";
}

function copyExportOutput(){
  var box=document.getElementById("exportOutput");
  if(!box || !box.value) return;
  var status=document.getElementById("exportStatus");
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(box.value).then(function(){
      status.className="usda-status"; status.innerHTML="Copied to clipboard!";
    }).catch(function(){ box.select(); });
  } else {
    box.select();
    try{ document.execCommand("copy"); status.className="usda-status"; status.innerHTML="Copied to clipboard!"; }catch(e){}
  }
}

function downloadExportFile(){
  var box=document.getElementById("exportOutput");
  if(!box || !box.value) return;
  var blob=new Blob([box.value],{type:"application/json"});
  var url=URL.createObjectURL(blob);
  var a=document.createElement("a");
  a.href=url;
  a.download="dog-meal-planner-backup.json";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); },1000);
  document.getElementById("exportStatus").className="usda-status";
  document.getElementById("exportStatus").innerHTML="Download started!";
}

function applyImport(){
  var ta=document.getElementById("importInput");
  var status=document.getElementById("importStatus");
  var raw=ta.value.trim();
  if(!raw){
    status.className="usda-status err"; status.innerHTML="Paste exported data first.";
    return;
  }
  var data;
  try{ data=JSON.parse(raw); }catch(e){
    status.className="usda-status err"; status.innerHTML="That doesn't look like valid exported data.";
    return;
  }

  var importedCount=0;
  for(var i=0;i<EXPORT_CATEGORIES.length;i++){
    var c=EXPORT_CATEGORIES[i];
    var el=document.getElementById("cat_"+c.id);
    if(el && el.checked){
      for(var j=0;j<c.keys.length;j++){
        var k=c.keys[j];
        if(data.hasOwnProperty(k)){
          try{ localStorage.setItem(k,data[k]); importedCount++; }catch(e){}
        }
      }
    }
  }

  if(importedCount===0){
    status.className="usda-status err"; status.innerHTML="Nothing matched the selected categories.";
    return;
  }

  reloadAllStateFromStorage();
  renderGuide();
  var newStatus=document.getElementById("importStatus");
  if(newStatus){ newStatus.className="usda-status"; newStatus.innerHTML="Imported successfully!"; }
}

function fetchUsdaSearch(q, types, onResults, onError){
  var url="https://api.nal.usda.gov/fdc/v1/foods/search?api_key="+encodeURIComponent(USDA_KEY);
  fetch(url,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({query:q,dataType:types,pageSize:15})
  })
  .then(function(res){
    if(res.status===401||res.status===403){ throw new Error("Invalid API key. Double-check the key you pasted."); }
    if(res.status===429){ throw new Error("Rate limit reached. Wait a bit and try again."); }
    if(!res.ok){ throw new Error("USDA server error ("+res.status+")."); }
    return res.json();
  })
  .then(function(data){ onResults(data.foods||[]); })
  .catch(function(err){ onError(err.message||"Search failed. Check your connection and API key."); });
}

function fetchUsdaDetail(fdcId, onDetail, onError){
  var url="https://api.nal.usda.gov/fdc/v1/food/"+fdcId+"?api_key="+encodeURIComponent(USDA_KEY);
  fetch(url)
    .then(function(res){
      if(!res.ok){ throw new Error("Couldn't load food details ("+res.status+")."); }
      return res.json();
    })
    .then(onDetail)
    .catch(function(err){ onError(err.message||"Couldn't load food details."); });
}

function getNutrientFields(entry){
  if(entry.nutrient){
    return { name: entry.nutrient.name||"", unit: entry.nutrient.unitName||"", value: (entry.amount!=null?entry.amount:entry.value) };
  }
  return { name: entry.nutrientName||"", unit: entry.unitName||"", value: entry.value };
}

function extractPer100g(foodDetail){
  var entries=foodDetail.foodNutrients||[];
  var raw=zeroN();
  var found={};

  var directMap=[
    {key:"protein",    match:["Protein"]},
    {key:"fat",        match:["Total lipid (fat)"]},
    {key:"calcium",    match:["Calcium, Ca"]},
    {key:"phosphorus", match:["Phosphorus, P"]},
    {key:"potassium",  match:["Potassium, K"]},
    {key:"sodium",     match:["Sodium, Na"]},
    {key:"chloride",   match:["Chloride, Cl","Chloride"]},
    {key:"magnesium",  match:["Magnesium, Mg"]},
    {key:"iron",       match:["Iron, Fe"]},
    {key:"copper",     match:["Copper, Cu"]},
    {key:"zinc",       match:["Zinc, Zn"]},
    {key:"selenium",   match:["Selenium, Se"]},
    {key:"vitK",       match:["Vitamin K (phylloquinone)"]},
    {key:"vitB1",      match:["Thiamin"]},
    {key:"vitB2",      match:["Riboflavin"]},
    {key:"vitB3",      match:["Niacin"]},
    {key:"vitB5",      match:["Pantothenic acid"]},
    {key:"vitB6",      match:["Vitamin B-6"]},
    {key:"vitB12",     match:["Vitamin B-12"]},
    {key:"folate",     match:["Folate, total"]},
    {key:"choline",    match:["Choline, total"]}
  ];

  for(var i=0;i<entries.length;i++){
    var f=getNutrientFields(entries[i]);
    if(!f.name || f.value==null) continue;

    for(var d=0;d<directMap.length;d++){
      if(found[directMap[d].key]) continue;
      for(var mi=0;mi<directMap[d].match.length;mi++){
        if(f.name===directMap[d].match[mi]){ raw[directMap[d].key]=f.value; found[directMap[d].key]=true; break; }
      }
    }

    if(!found.iodine && f.name==="Iodine, I"){ raw.iodine=f.value/1000; found.iodine=true; } // mcg -> mg

    if(!found.vitA && f.name==="Vitamin A, IU"){ raw.vitA=f.value; found.vitA=true; }
    if(!found.vitA && f.name==="Vitamin A, RAE"){ raw.vitA=f.value*3.33; }

    if(!found.vitD && f.name.indexOf("Vitamin D")===0){
      if(f.unit==="IU"){ raw.vitD=f.value; found.vitD=true; }
      else { raw.vitD=f.value*40; found.vitD=true; } // mcg -> IU
    }

    if(!found.vitE && f.name==="Vitamin E (alpha-tocopherol)"){ raw.vitE=f.value*1.49; found.vitE=true; } // mg -> IU approx

    if(/18:3|20:5|22:6/.test(f.name) && /n-3/i.test(f.name)){
      var mg3=(f.unit==="G")?f.value*1000:f.value;
      raw.omega3=(raw.omega3||0)+mg3;
    }
    if(/18:2|20:4/.test(f.name) && /n-6/i.test(f.name)){
      var mg6=(f.unit==="G")?f.value*1000:f.value;
      raw.omega6=(raw.omega6||0)+mg6;
    }
  }
  return raw;
}

function per100gToPerOz(per100){
  var ozFactor=28.3495/100;
  var perOz={};
  for(var k=0;k<KEYS.length;k++) perOz[KEYS[k]]=+(((per100[KEYS[k]]||0))*ozFactor).toFixed(4);
  return perOz;
}

// ── HISTORY (embedded under Calendar tab) ───────────────────────────────────
function setHistView(v){ histView=v; renderCalendarPage(); }

function setHistMode(checked){ histMode = checked ? "actual" : "scheduled"; renderCalendarPage(); }

var _histNavDir = 0;
function navHistory(dir){
  _histNavDir = dir;
  if(histView==="day"){
    var nd1=addDays(histYear,histMonth,histDay,dir);
    histYear=nd1.y; histMonth=nd1.m; histDay=nd1.d;
  } else if(histView==="week"){
    var nd=addDays(histYear,histMonth,histDay,dir*7);
    histYear=nd.y; histMonth=nd.m; histDay=nd.d;
  } else if(histView==="month"){
    var dt=new Date(histYear,histMonth+dir,1);
    histYear=dt.getFullYear(); histMonth=dt.getMonth();
  } else {
    histYear+=dir;
  }
  renderCalendarPage();
}

function jumpToMonth(y,m){ histYear=y; histMonth=m; histView="month"; renderCalendarPage(); }

function buildHistoryHtml(){
  var views=["day","week","month","year"];
  var toggle='<div class="view-toggle">';
  for(var i=0;i<views.length;i++){
    var v=views[i];
    var lbl=v==="day"?"Day":v==="week"?"Week":v==="month"?"Month":"Year";
    toggle+='<button class="view-btn'+(histView===v?" active":"")+'" onclick="setHistView(\''+v+'\')">'+lbl+'</button>';
  }
  toggle+='</div>';

  var checkbox='<label class="actual-toggle"><input type="checkbox" id="actualChk" onchange="setHistMode(this.checked)"'
    +(histMode==="actual"?" checked":"")+'> Show actual fed meals (hide scheduled)</label>';

  var navLabel="";
  if(histView==="day"){
    navLabel=fmtDate(histYear,histMonth,histDay);
  } else if(histView==="week"){
    var st=startOfWeek(histYear,histMonth,histDay);
    var en=addDays(st.y,st.m,st.d,6);
    navLabel=monthAbbrev(st.m)+" "+st.d+" &ndash; "+monthAbbrev(en.m)+" "+en.d+(en.y!==st.y?", "+en.y:"");
  } else if(histView==="month"){
    navLabel=monthAbbrev(histMonth)+" "+histYear;
  } else {
    navLabel=String(histYear);
  }

  var nav='<div class="hist-nav-row">'
    +'<button class="nav-btn" onclick="navHistory(-1)">&#8249;</button>'
    +'<div class="hist-period-label">'+navLabel+'</div>'
    +'<button class="nav-btn" onclick="navHistory(1)">&#8250;</button>'
    +'</div>';

  var content="";
  if(histView==="day")   content=buildDayView();
  if(histView==="week")  content=buildWeekView();
  if(histView==="month") content=buildMonthView();
  if(histView==="year")  content=buildYearView();

  var dirClass = _histNavDir>0 ? "slide-in-right" : (_histNavDir<0 ? "slide-in-left" : "");
  _histNavDir = 0;
  content = '<div class="'+("hist-content-anim "+dirClass).trim()+'">'+content+'</div>';

  return toggle+checkbox+nav+content;
}

function buildAddlItemsLine(ds,slot,prefix){
  var addins=addinsLog[ds+"_"+slot]||{};
  var items=Object.keys(addins).filter(function(k){return addins[k]>0;});
  var products=productsLog[ds+"_"+slot]||{};
  var productIds=Object.keys(products).filter(function(k){return products[k]>0;});
  if(items.length===0 && productIds.length===0) return "";
  var parts=[];
  for(var i=0;i<items.length;i++) parts.push(items[i]+" "+addins[items[i]]+"oz");
  for(var j=0;j<productIds.length;j++){
    var prod=getProduct(productIds[j]);
    parts.push((prod?prod.name:"(deleted)")+" x"+products[productIds[j]]);
  }
  return '<div class="week-addl-line">&#127857; '+(prefix?prefix+": ":"")+parts.join(", ")+'</div>';
}

function buildDayView(){
  var ds=dateKey(histYear,histMonth,histDay);
  var dow=getDOW(histYear,histMonth,histDay);
  var dn=DAYS_OF_WEEK[dow];
  var wk=getWK(histYear,histMonth,histDay);
  var dm=(WEEKS[wk]||{})[dn]||{};
  var amFed=!!fedLog[ds+"_am"], pmFed=!!fedLog[ds+"_pm"];
  var note=notesLog[ds]||"";

  var html='<div class="day-view-card">';

  // AM
  var amEff=getEffectiveMeal(ds,"am",dm.am);
  html+='<div class="day-detail-meal"><div class="dd-label">AM'+(amFed?" &#10003; Fed":" &mdash; not fed")+'</div>';
  if(!dm.am){
    html+='<div class="dd-detail">No meal scheduled</div>';
  } else if(histMode==="actual" && !amFed){
    html+='<div class="dd-detail">Not fed</div>';
  } else {
    var amShown=(histMode==="actual")?amEff:dm.am;
    if(histMode==="actual" && getProteinOverride(ds,"am")) html+='<div class="swap-note">&#8646; swapped from '+dm.am.protein+'</div>';
    html+='<div class="dd-protein">'+amShown.protein+'</div><div class="dd-detail">'+amShown.starch+' &middot; '+amShown.veg+(amShown.organ?' &middot; '+amShown.organ:'')+'</div>';
  }
  html+=buildAddlItemsLine(ds,"am");
  html+='</div>';

  // PM
  var pmEff=getEffectiveMeal(ds,"pm",dm.pm);
  html+='<div class="day-detail-meal"><div class="dd-label">PM'+(pmFed?" &#10003; Fed":" &mdash; not fed")+'</div>';
  if(!dm.pm){
    html+='<div class="dd-detail">No meal scheduled</div>';
  } else if(histMode==="actual" && !pmFed){
    html+='<div class="dd-detail">Not fed</div>';
  } else {
    var pmShown=(histMode==="actual")?pmEff:dm.pm;
    if(histMode==="actual" && getProteinOverride(ds,"pm")) html+='<div class="swap-note">&#8646; swapped from '+dm.pm.protein+'</div>';
    html+='<div class="dd-protein">'+pmShown.protein+'</div><div class="dd-detail">'+pmShown.starch+' &middot; '+pmShown.veg+(pmShown.organ?' &middot; '+pmShown.organ:'')+'</div>';
  }
  html+=buildAddlItemsLine(ds,"pm");
  html+='</div>';

  // Note (inline editable)
  html+='<div class="guide-section">Notes</div>'
    +'<textarea id="dayViewNote" class="note-textarea" placeholder="Add a note for this day...">'+escapeHtml(note)+'</textarea>'
    +'<button class="save-btn" onclick="saveDayViewNote(\''+ds+'\')">Save Note</button>';

  html+='</div>';
  return html;
}

function buildWeekView(){
  var st=startOfWeek(histYear,histMonth,histDay);
  var html="";
  for(var i=0;i<7;i++){
    var dt=addDays(st.y,st.m,st.d,i);
    var ds=dateKey(dt.y,dt.m,dt.d);
    var dow=getDOW(dt.y,dt.m,dt.d);
    var dn=DAYS_OF_WEEK[dow];
    var wk=getWK(dt.y,dt.m,dt.d);
    var dm=(WEEKS[wk]||{})[dn]||{};
    var amFed=!!fedLog[ds+"_am"];
    var pmFed=!!fedLog[ds+"_pm"];
    var note=notesLog[ds]||"";
    var isToday=(dt.y===today.getFullYear()&&dt.m===today.getMonth()&&dt.d===today.getDate());
    var notePreview = note ? ("&#128221; "+escapeHtml(note.length>70?note.slice(0,70)+"…":note)) : "+ Add note";

    var amText, pmText;
    if(histMode==="actual"){
      var amEff=getEffectiveMeal(ds,"am",dm.am);
      var pmEff=getEffectiveMeal(ds,"pm",dm.pm);
      amText = amFed ? ("&#10003; AM: "+(amEff?amEff.protein:"&mdash;")) : "AM: Not fed";
      pmText = pmFed ? ("&#10003; PM: "+(pmEff?pmEff.protein:"&mdash;")) : "PM: Not fed";
    } else {
      amText = (amFed?"&#10003; ":"")+"AM: "+(dm.am?dm.am.protein:"&mdash;");
      pmText = (pmFed?"&#10003; ":"")+"PM: "+(dm.pm?dm.pm.protein:"&mdash;");
    }

    html+='<div class="week-day-row'+(isToday?" today":"")+'">'
      +'<div class="week-day-name">'+dn+' &middot; '+monthAbbrev(dt.m)+' '+dt.d+'</div>'
      +'<div class="week-meals">'
      +'<div class="week-meal-pill'+(amFed?" fed":"")+'">'+amText+'</div>'
      +'<div class="week-meal-pill'+(pmFed?" fed":"")+'">'+pmText+'</div>'
      +'</div>'
      +buildAddlItemsLine(ds,"am","AM")
      +buildAddlItemsLine(ds,"pm","PM")
      +'<div class="week-note" onclick="openDayDetail(\''+ds+'\')">'+notePreview+'</div>'
      +'</div>';
  }
  return html;
}

function buildMonthView(){
  var y=histYear, m=histMonth;
  var firstDow=getDOW(y,m,1);
  var daysInMonth=new Date(y,m+1,0).getDate();

  var html='<div class="month-weekdays">';
  var wd=["S","M","T","W","T","F","S"];
  for(var i=0;i<7;i++) html+='<div class="month-weekday-cell">'+wd[i]+'</div>';
  html+='</div><div class="month-grid">';

  for(var i=0;i<firstDow;i++) html+='<div class="month-cell empty"></div>';

  for(var d=1; d<=daysInMonth; d++){
    var ds=dateKey(y,m,d);
    var amFed=!!fedLog[ds+"_am"];
    var pmFed=!!fedLog[ds+"_pm"];
    var hasNote=!!notesLog[ds];
    var isToday=(y===today.getFullYear()&&m===today.getMonth()&&d===today.getDate());
    var fc=(amFed?1:0)+(pmFed?1:0);
    var cls="month-cell"+(isToday?" today":"")+(fc===2?" full-fed":fc===1?" half-fed":"");
    html+='<div class="'+cls+'" onclick="openDayDetail(\''+ds+'\')">'
      +'<div class="month-cell-day">'+d+'</div>'
      +'<div class="month-cell-dots"><span class="m-dot'+(amFed?" on":"")+'"></span><span class="m-dot'+(pmFed?" on":"")+'"></span></div>'
      +(hasNote?'<div class="note-dot"></div>':'')
      +'</div>';
  }
  html+='</div>';
  return html;
}

function buildYearView(){
  var y=histYear;
  var html='<div class="year-grid">';
  for(var m=0;m<12;m++){
    var daysInMonth=new Date(y,m+1,0).getDate();
    var firstDow=getDOW(y,m,1);
    html+='<div class="mini-month" onclick="jumpToMonth('+y+','+m+')">'
      +'<div class="mini-month-label">'+monthAbbrev(m)+'</div>'
      +'<div class="mini-grid">';
    for(var i=0;i<firstDow;i++) html+='<span class="mini-cell empty"></span>';
    for(var d=1; d<=daysInMonth; d++){
      var ds=dateKey(y,m,d);
      var amFed=!!fedLog[ds+"_am"];
      var pmFed=!!fedLog[ds+"_pm"];
      var fc=(amFed?1:0)+(pmFed?1:0);
      var cls="mini-cell"+(fc===2?" full":fc===1?" half":"");
      html+='<span class="'+cls+'"></span>';
    }
    html+='</div></div>';
  }
  html+='</div>';
  return html;
}

function openDayDetail(ds){
  var parts=ds.split("-");
  var y=parseInt(parts[0],10), m=parseInt(parts[1],10), d=parseInt(parts[2],10);
  var dow=getDOW(y,m,d), wk=getWK(y,m,d), dn=DAYS_OF_WEEK[dow];
  var dm=(WEEKS[wk]||{})[dn]||{};
  var amFed=!!fedLog[ds+"_am"], pmFed=!!fedLog[ds+"_pm"];
  var note=notesLog[ds]||"";
  var label=fmtDate(y,m,d);

  var html='<div class="overlay" id="ddbg"><div class="modal">'
    +'<div class="modal-head"><div class="modal-title">'+label+'</div>'
    +'<button class="modal-close" onclick="closeDayDetail()">&#10005;</button></div>';

  // AM block — in "actual" mode, hide scheduled details unless it was actually fed, and show the swap if any
  var amDetail;
  var amEff=getEffectiveMeal(ds,"am",dm.am);
  if(!dm.am){
    amDetail='<div class="dd-detail">No meal scheduled</div>';
  } else if(histMode==="actual" && !amFed){
    amDetail='<div class="dd-detail">Not fed</div>';
  } else {
    var amShown=(histMode==="actual")?amEff:dm.am;
    var amSwapNote=(histMode==="actual" && getProteinOverride(ds,"am")) ? '<div class="swap-note">&#8646; swapped from '+dm.am.protein+'</div>' : '';
    amDetail='<div class="dd-protein">'+amShown.protein+'</div>'+amSwapNote+'<div class="dd-detail">'+amShown.starch+' &middot; '+amShown.veg+(amShown.organ?' &middot; '+amShown.organ:'')+'</div>';
  }
  html+='<div class="day-detail-meal"><div class="dd-label">AM'+(amFed?" &#10003; Fed":" &mdash; not fed")+'</div>'+amDetail+'</div>';

  // PM block — same logic
  var pmDetail;
  var pmEff=getEffectiveMeal(ds,"pm",dm.pm);
  if(!dm.pm){
    pmDetail='<div class="dd-detail">No meal scheduled</div>';
  } else if(histMode==="actual" && !pmFed){
    pmDetail='<div class="dd-detail">Not fed</div>';
  } else {
    var pmShown=(histMode==="actual")?pmEff:dm.pm;
    var pmSwapNote=(histMode==="actual" && getProteinOverride(ds,"pm")) ? '<div class="swap-note">&#8646; swapped from '+dm.pm.protein+'</div>' : '';
    pmDetail='<div class="dd-protein">'+pmShown.protein+'</div>'+pmSwapNote+'<div class="dd-detail">'+pmShown.starch+' &middot; '+pmShown.veg+(pmShown.organ?' &middot; '+pmShown.organ:'')+'</div>';
  }
  html+='<div class="day-detail-meal"><div class="dd-label">PM'+(pmFed?" &#10003; Fed":" &mdash; not fed")+'</div>'+pmDetail+'</div>';

  html+='<div class="modal-hint" style="margin-top:10px">Notes</div>'
    +'<textarea id="noteInput" class="note-textarea" placeholder="Add a note for this day...">'+escapeHtml(note)+'</textarea>'
    +'<button class="save-btn" onclick="saveDayNote(\''+ds+'\')">Save Note</button>';

  html+='</div></div>';

  document.getElementById("modal-root").innerHTML=html;
  document.getElementById("ddbg").addEventListener("click",function(e){ if(e.target===this) closeDayDetail(); });
}

function closeDayDetail(){ document.getElementById("modal-root").innerHTML=""; }

function saveDayNote(ds){
  var el=document.getElementById("noteInput");
  var v=el?el.value.trim():"";
  if(v) notesLog[ds]=v; else delete notesLog[ds];
  try{localStorage.setItem("mya_notes",JSON.stringify(notesLog));}catch(e){}
  closeDayDetail();
  renderCalendarPage();
}

// Swipe left/right on the Feeding Schedule tab to move between days —
// mirrors the Prev/Next buttons but feels native on a touch screen.
(function setupCalendarSwipe(){
  var startX=null, startY=null;
  var el=document.getElementById("page-calendar");
  if(!el) return;
  el.addEventListener("touchstart", function(e){
    var t=e.touches[0]; startX=t.clientX; startY=t.clientY;
  }, {passive:true});
  el.addEventListener("touchend", function(e){
    if(startX===null) return;
    var t=e.changedTouches[0];
    var dx=t.clientX-startX, dy=t.clientY-startY;
    if(Math.abs(dx)>55 && Math.abs(dx)>Math.abs(dy)*1.5){
      if(dx<0) changeDay(1); else changeDay(-1);
    }
    startX=null; startY=null;
  }, {passive:true});
})();
