<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mya's Meal Planner 🐾</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:linear-gradient(180deg,#dfeaf1,#cfe0ea);background-attachment:fixed;color:#2c4a5e;font-family:'Baloo 2',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;}
.header{background:#ffffff;padding:14px 20px 0;border-bottom:1px solid rgba(200,147,58,0.25);position:sticky;top:0;z-index:100;}
.header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;gap:12px;}
.pet-photo-box{flex-shrink:0;width:76px;height:76px;border-radius:16px;background:#ffffff;border:1px solid rgba(200,147,58,0.35);display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;}
.pet-photo-box input[type="file"]{display:none;}
.pet-photo-placeholder{font-size:30px;opacity:0.5;}
.pet-photo-box img{width:100%;height:100%;object-fit:cover;}
.app-title{font-size:38px;font-weight:700;color:#c8933a;line-height:1.15;margin-bottom:6px;}
.version-tag{font-size:10px;font-weight:400;color:#7a95a8;vertical-align:middle;}
.pet-info-box{background:#eaf4fa;border:1px solid rgba(200,147,58,0.25);border-radius:12px;padding:8px 12px 6px;margin-bottom:2px;}
.pet-name-input{display:block;width:100%;background:transparent;border:none;border-bottom:1px solid rgba(200,147,58,0.3);color:#c8933a;font-size:13px;font-weight:600;padding:3px 0 5px;margin-bottom:4px;}
.pet-name-input::placeholder{color:#7a95a8;opacity:0.7;}
.app-sub{font-size:10px;color:#7a95a8;margin-bottom:2px;}
.tabs{display:flex;}
.tab{flex:1;padding:9px 2px;font-size:11px;font-weight:600;color:#7a95a8;background:transparent;border:none;border-bottom:2px solid transparent;cursor:pointer;letter-spacing:.2px;}
.tab.active{color:#c8933a;border-bottom-color:#c8933a;}
.page{padding:14px;padding-bottom:80px;display:none;}
.page.active{display:block;}
/* Plan tab */
.section-title{font-size:13px;font-weight:700;color:#c8933a;margin-bottom:10px;margin-top:4px;}
.aafco-group{margin-bottom:14px;}
.ratio-note{font-size:10px;color:#6f8ea0;background:rgba(200,147,58,0.08);border-radius:8px;padding:9px 10px;margin-top:6px;line-height:1.5;}
.ratio-note strong{color:#c8933a;}
.aafco-group-label{font-size:10px;font-weight:700;color:#4a6a7d;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px;}
.aafco-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;}
.aafco-cell{background:#ffffff;border-radius:7px;padding:7px 9px;}
.aafco-cell-name{font-size:10px;color:#5b7d90;margin-bottom:2px;}
.aafco-cell-val{font-size:12px;font-weight:700;color:#2c4a5e;}
/* Rotation */
.rotation-week{background:#ffffff;border-radius:12px;padding:12px;margin-bottom:10px;}
.rotation-week-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.rotation-week-title{font-size:13px;font-weight:700;color:#2c4a5e;}
.fish-badge{font-size:10px;font-weight:700;padding:3px 8px;border-radius:99px;background:rgba(33,150,243,0.2);color:#64b5f6;}
.rotation-row{display:flex;gap:5px;overflow-x:auto;padding-bottom:4px;}
.day-cell{flex-shrink:0;width:44px;border-radius:8px;padding:6px 4px;text-align:center;}
.day-cell.land{background:#eef4f8;}
.day-cell.fish{background:rgba(33,150,243,0.15);border:1px solid rgba(100,181,246,0.3);}
.day-cell-name{font-size:9px;font-weight:700;color:#5b7d90;margin-bottom:4px;}
.day-cell-am{font-size:9px;color:#2c4a5e;line-height:1.3;margin-bottom:2px;}
.day-cell-pm{font-size:9px;color:#5b7d90;line-height:1.3;}
.fish-icon{font-size:11px;}
/* Calendar */
.date-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:#ffffff;border-radius:12px;padding:11px 14px;}
.nav-btn{background:rgba(200,147,58,0.15);border:1px solid rgba(200,147,58,0.3);color:#c8933a;border-radius:8px;padding:7px 16px;font-size:20px;cursor:pointer;line-height:1;}
.date-center{text-align:center;}
.date-main{font-size:15px;font-weight:700;}
.date-sub{font-size:10px;color:#5b7d90;margin-top:2px;}
.meal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.meal-card{background:#ffffff;border:1px solid rgba(200,147,58,0.2);border-radius:12px;padding:11px;}
.meal-card.fed{background:#e3f5e6;border-color:rgba(76,175,80,0.4);}
.slot-label{font-size:9px;font-weight:700;color:#7a95a8;letter-spacing:1px;text-transform:uppercase;margin-bottom:5px;}
.meal-protein{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.3;display:flex;justify-content:space-between;align-items:baseline;gap:8px;}
.meal-details{font-size:10px;color:#5b7d90;line-height:1.6;}
.oz-tag{font-size:11px;color:#7a95a8;font-weight:400;}
.amt-tag{cursor:pointer;border-bottom:1px dotted #c8933a;color:#c8933a;padding-bottom:1px;}
.recipe-list{margin-top:4px;}
.recipe-line{font-size:10px;color:#6f8ea0;line-height:1.7;display:flex;justify-content:space-between;}
.recipe-line.supp{color:#7a95a8;font-style:italic;}
.supp-check-row{display:flex;align-items:flex-start;gap:7px;font-size:10px;color:#6f8ea0;font-style:italic;line-height:1.5;padding:3px 0;cursor:pointer;}
.supp-check-row input{margin-top:1px;width:13px;height:13px;accent-color:#c8933a;flex-shrink:0;cursor:pointer;}
.recipe-divider{height:1px;background:rgba(44,74,94,0.10);margin:6px 0;}
.addl-box{background:#ffffff;border:1px solid rgba(200,147,58,0.2);border-radius:12px;padding:13px;margin-top:10px;}
.addl-title{font-size:11px;font-weight:700;color:#c8933a;letter-spacing:.3px;margin-bottom:8px;display:flex;align-items:center;gap:7px;}
.step-num{flex-shrink:0;width:16px;height:16px;border-radius:50%;background:#c8933a;color:#0f1720;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;}
.addl-title .step-num{background:#c8933a;color:#0f1720;}
.addl-list{margin-bottom:8px;}
.addl-item{font-size:11px;color:#2c4a5e;padding:4px 0;border-bottom:1px solid rgba(44,74,94,0.10);}
.addl-empty{font-size:11px;color:#4a6a7d;margin-bottom:8px;}
.addins-btn{width:100%;margin-top:7px;padding:6px 0;background:transparent;border:1px solid rgba(200,147,58,0.35);color:#c8933a;border-radius:7px;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;}
.swap-note{font-size:9px;color:#ff9800;margin-bottom:4px;font-style:italic;}
.swap-option{padding:12px 14px;background:#eaf4fa;border-radius:8px;margin-bottom:6px;font-size:13px;color:#2c4a5e;cursor:pointer;display:flex;justify-content:space-between;align-items:center;}
.swap-option.active{border:1px solid #c8933a;background:rgba(200,147,58,0.1);color:#c8933a;font-weight:700;}
.swap-sched-tag{font-size:9px;color:#7a95a8;font-weight:400;}
.fed-btn{width:100%;margin-top:7px;padding:8px 0;border:none;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;background:#c8933a;color:#0f1720;}
.fed-btn.active{background:#4caf50;color:#fff;}
/* Nutrition */
.summary-box{background:#ffffff;border-radius:12px;padding:13px;margin-bottom:10px;}
.summary-title{font-size:13px;font-weight:700;margin-bottom:3px;}
.summary-sub{font-size:10px;color:#5b7d90;margin-bottom:8px;}
.pill-row{display:flex;gap:7px;flex-wrap:wrap;}
.s-pill{padding:3px 10px;border-radius:99px;font-size:11px;font-weight:700;}
.n-card{background:#ffffff;border-radius:9px;padding:11px;margin-bottom:7px;cursor:pointer;}
.n-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;}
.n-name{font-size:12px;font-weight:700;}
.n-val{font-size:10px;}
.n-pill{display:inline-block;padding:2px 6px;border-radius:99px;font-size:9px;font-weight:700;margin-left:5px;}
.bar-bg{height:5px;background:#e7f1f7;border-radius:3px;margin-bottom:3px;overflow:hidden;}
.bar-fill{height:100%;border-radius:3px;}
.n-range{font-size:9px;color:#4a6a7d;}
/* Guide */
.guide-card{background:#ffffff;border-radius:12px;padding:14px;margin-bottom:10px;}
.guide-title{font-size:14px;font-weight:700;color:#c8933a;margin-bottom:10px;}
.guide-title.collapsible-title{cursor:pointer;display:flex;justify-content:space-between;align-items:center;margin-bottom:0;}
.guide-title.collapsible-title.is-collapsed{margin-bottom:0;}
.collapse-arrow{font-size:11px;color:#5b7d90;margin-left:10px;flex-shrink:0;transition:transform 0.2s;}
.collapsible-content{margin-top:10px;}
.collapsible-content.is-hidden{display:none;}
.guide-section{font-size:9px;font-weight:700;color:#4a6a7d;letter-spacing:1px;text-transform:uppercase;margin-top:10px;margin-bottom:5px;}
.guide-item{font-size:12px;color:#4a6a7d;line-height:1.9;padding-left:4px;}
.guide-item.warn{color:#ff9800;}
.guide-item.avoid{color:#f44336;}
.guide-item.opt{color:#7a95a8;}
.guide-item.safe{color:#4caf50;}
.safety-cols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-top:4px;}
.safety-col{border-radius:9px;padding:8px 7px;}
.safety-col.eat{background:rgba(76,175,80,0.10);}
.safety-col.limit{background:rgba(255,152,0,0.10);}
.safety-col.avoid{background:rgba(244,67,54,0.10);}
.safety-col-title{font-size:10px;font-weight:800;letter-spacing:.5px;text-align:center;margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid rgba(44,74,94,0.12);}
.safety-col.eat .safety-col-title{color:#4caf50;}
.safety-col.limit .safety-col-title{color:#ff9800;}
.safety-col.avoid .safety-col-title{color:#f44336;}
.safety-item{font-size:9.5px;line-height:1.7;color:#4a6a7d;}
/* Protein picker */
.protein-pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px;}
.protein-pick-item{display:flex;align-items:center;gap:8px;padding:9px 10px;background:#eaf4fa;border-radius:8px;border:1px solid rgba(200,147,58,0.15);cursor:pointer;}
.protein-pick-item.checked{border-color:#c8933a;background:rgba(200,147,58,0.1);}
.protein-pick-item input{width:15px;height:15px;accent-color:#c8933a;flex-shrink:0;cursor:pointer;}
.protein-pick-item.disabled{opacity:0.35;cursor:not-allowed;}
.protein-pick-name{font-size:11px;color:#2c4a5e;flex:1;}
.protein-pick-fish{font-size:9px;color:#64b5f6;}
.protein-pick-count{font-size:11px;color:#c8933a;font-weight:700;margin-bottom:8px;}
/* Food safety alert modal (Family-Feud style) */
.safety-alert-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.88);z-index:300;display:flex;align-items:center;justify-content:center;padding:24px;}
.safety-alert-box{background:#ffffff;border-radius:18px;padding:26px 22px;max-width:340px;width:100%;text-align:center;box-shadow:0 0 0 3px rgba(244,67,54,0.4);}
.safety-alert-box.limit-box{box-shadow:0 0 0 3px rgba(255,152,0,0.4);}
.safety-x{font-size:64px;line-height:1;margin-bottom:6px;animation:safetyPop 0.35s ease;}
@keyframes safetyPop{0%{transform:scale(0.3);opacity:0;}60%{transform:scale(1.15);opacity:1;}100%{transform:scale(1);}}
.safety-alert-title{font-size:19px;font-weight:900;color:#f44336;letter-spacing:1px;margin-bottom:10px;text-transform:uppercase;}
.safety-alert-title.limit-title{color:#ff9800;}
.safety-alert-food{font-size:15px;font-weight:700;color:#2c4a5e;margin-bottom:8px;}
.safety-alert-reason{font-size:12px;color:#4a6a7d;line-height:1.6;margin-bottom:18px;}
.safety-alert-btns{display:flex;flex-direction:column;gap:8px;}
.safety-btn-cancel{width:100%;padding:12px;background:#4caf50;border:none;border-radius:10px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;}
.safety-btn-proceed{width:100%;padding:10px;background:transparent;border:1px solid rgba(44,74,94,0.22);border-radius:10px;color:#5b7d90;font-size:11px;cursor:pointer;}
.protein-row{display:flex;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(44,74,94,0.10);}
.protein-name{font-size:12px;flex:1;}
.protein-tag{font-size:9px;padding:2px 6px;border-radius:99px;font-weight:700;}
.tag-lean{background:rgba(76,175,80,0.15);color:#4caf50;}
.tag-mod{background:rgba(200,147,58,0.15);color:#c8933a;}
.tag-high{background:rgba(244,67,54,0.15);color:#f44336;}
.organ-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid rgba(44,74,94,0.10);}
.organ-name{font-size:12px;}
.organ-freq{font-size:10px;color:#5b7d90;text-align:right;}
.organ-note{font-size:9px;color:#4a6a7d;text-align:right;}
.calc-formula{font-size:11px;color:#5b7d90;text-align:center;background:#eaf4fa;border-radius:8px;padding:9px;margin-bottom:14px;font-family:'SF Mono',Menlo,monospace;line-height:1.6;}
.prep-step{display:flex;align-items:flex-start;gap:11px;margin-bottom:11px;font-size:13px;color:#2c4a5e;line-height:1.45;}
.prep-step:last-child{margin-bottom:0;}
.prep-num{flex-shrink:0;width:23px;height:23px;border-radius:50%;background:#c8933a;color:#0f1720;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:1px;}
.calc-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;gap:10px;}
.calc-label{font-size:12px;color:#7a95a8;flex-shrink:0;}
.calc-input{width:80px;padding:8px 10px;background:#eaf4fa;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#2c4a5e;font-size:14px;text-align:center;}
.calc-select{flex:1;max-width:230px;padding:8px 10px;background:#eaf4fa;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#2c4a5e;font-size:12px;}
.calc-result{margin-top:10px;background:#eaf4fa;border-radius:10px;padding:4px 12px;}
.calc-out{display:flex;justify-content:space-between;font-size:12px;color:#6f8ea0;padding:7px 0;border-bottom:1px solid rgba(44,74,94,0.10);}
.calc-out:last-child{border-bottom:none;}
.calc-out.highlight{color:#c8933a;font-weight:700;font-size:13px;}
.calc-note{font-size:10px;color:#4a6a7d;margin-top:10px;line-height:1.5;}
.usda-key-row{margin-bottom:12px;}
.usda-key-input{width:100%;padding:9px 10px;background:#eaf4fa;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#2c4a5e;font-size:12px;margin-bottom:5px;}
.usda-key-hint{font-size:10px;color:#7a95a8;}
.export-row{display:flex;align-items:center;gap:9px;padding:7px 0;font-size:12px;color:#4a6a7d;cursor:pointer;border-bottom:1px solid rgba(44,74,94,0.10);}
.export-row input{width:16px;height:16px;accent-color:#c8933a;flex-shrink:0;cursor:pointer;}
.select-all-row{border-bottom:1px solid rgba(200,147,58,0.25);margin-bottom:4px;padding-bottom:9px;}
.select-all-row span{color:#c8933a;}
.usda-key-hint a{color:#c8933a;}
.usda-search-row{display:flex;gap:8px;margin-bottom:10px;}
.usda-search-input{flex:1;padding:10px 12px;background:#eaf4fa;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#2c4a5e;font-size:13px;}
.usda-search-btn{padding:10px 16px;background:#c8933a;border:none;border-radius:8px;color:#0f1720;font-weight:700;font-size:13px;cursor:pointer;}
.usda-types-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;}
.usda-type-chip{font-size:10px;padding:5px 10px;border-radius:99px;border:1px solid rgba(200,147,58,0.3);background:transparent;color:#5b7d90;cursor:pointer;}
.usda-type-chip.on{background:rgba(200,147,58,0.18);color:#c8933a;border-color:#c8933a;}
.usda-status{font-size:11px;color:#5b7d90;margin-bottom:8px;}
.usda-status.err{color:#f44336;}
.usda-result-item{padding:9px 10px;background:#eaf4fa;border-radius:8px;margin-bottom:6px;cursor:pointer;}
.usda-result-name{font-size:12px;color:#2c4a5e;margin-bottom:3px;}
.usda-result-meta{font-size:10px;color:#7a95a8;}
.usda-result-badge{display:inline-block;padding:1px 7px;border-radius:99px;font-size:9px;font-weight:700;background:rgba(100,181,246,0.15);color:#64b5f6;margin-left:6px;}
.usda-detail{margin-top:12px;border-top:1px solid rgba(44,74,94,0.12);padding-top:12px;}
.usda-detail-title{font-size:13px;font-weight:700;color:#c8933a;margin-bottom:8px;}
.usda-nutrient-table{margin-bottom:12px;}
.usda-nutrient-row{display:flex;justify-content:space-between;font-size:11px;color:#6f8ea0;padding:4px 0;border-bottom:1px solid rgba(44,74,94,0.10);}
.usda-snippet{width:100%;min-height:70px;background:#eaf4fa;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#4caf50;font-size:11px;font-family:'SF Mono',Menlo,monospace;padding:10px;resize:vertical;margin-bottom:8px;}
.usda-approx-note{font-size:9px;color:#7a95a8;margin-top:6px;line-height:1.5;}
.usda-modal-toggle{font-size:11px;color:#c8933a;cursor:pointer;margin:12px 0 10px;text-decoration:underline;display:inline-block;}
.usda-modal-panel{background:#eaf4fa;border-radius:10px;padding:12px;margin-bottom:14px;}
/* Disclaimer */
.disclaimer-card{background:#ffffff;border:1px solid rgba(244,67,54,0.35);border-radius:12px;padding:14px;margin-bottom:10px;}
.disclaimer-title{font-size:12px;font-weight:700;color:#f44336;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:7px;}
.disclaimer-body{font-size:11px;color:#4a6a7d;line-height:1.7;}
.disclaimer-body strong{color:#2c4a5e;}
.footer-disclaimer{text-align:center;font-size:9px;color:#4a6a7d;padding:14px 20px 24px;line-height:1.6;}
/* Modal */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:200;display:flex;align-items:flex-end;}
.modal{background:#ffffff;border-radius:16px 16px 0 0;width:100%;padding:20px;max-height:78vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.modal-title{font-size:15px;font-weight:700;color:#c8933a;}
.modal-close{background:transparent;border:none;color:#5b7d90;font-size:22px;cursor:pointer;line-height:1;}
.modal-hint{font-size:11px;color:#7a95a8;margin-bottom:12px;}
.ai-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid rgba(44,74,94,0.10);}
.ai-name{font-size:13px;flex:1;}
.ai-input{width:56px;padding:6px 8px;background:#eaf4fa;border:1px solid rgba(200,147,58,0.3);border-radius:7px;color:#2c4a5e;font-size:14px;text-align:center;}
.ai-unit{font-size:10px;color:#7a95a8;margin-left:5px;}
.save-btn{width:100%;padding:13px;background:#c8933a;border:none;border-radius:10px;color:#0f1720;font-size:15px;font-weight:700;cursor:pointer;margin-top:14px;}
.empty-state{text-align:center;padding-top:60px;}
/* History */
.view-toggle{display:flex;gap:6px;margin-bottom:12px;}
.view-btn{flex:1;padding:9px 0;border-radius:9px;border:1px solid rgba(200,147,58,0.3);background:transparent;color:#5b7d90;font-size:12px;font-weight:700;cursor:pointer;}
.view-btn.active{background:#c8933a;color:#0f1720;border-color:#c8933a;}
.hist-nav-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;background:#ffffff;border-radius:12px;padding:10px 14px;}
.hist-period-label{font-size:14px;font-weight:700;text-align:center;flex:1;}
.week-day-row{background:#ffffff;border-radius:10px;padding:10px 12px;margin-bottom:8px;}
.week-day-row.today{border:1px solid rgba(200,147,58,0.5);}
.week-day-name{font-size:12px;font-weight:700;color:#2c4a5e;}
.week-meals{display:flex;gap:8px;margin-top:7px;}
.week-meal-pill{flex:1;font-size:10px;padding:6px 8px;border-radius:7px;background:#eaf4fa;color:#5b7d90;}
.week-meal-pill.fed{background:rgba(76,175,80,0.15);color:#4caf50;}
.week-note{margin-top:8px;font-size:11px;color:#c8933a;padding:7px 9px;background:rgba(200,147,58,0.06);border-radius:7px;cursor:pointer;word-break:break-word;}
.week-addl-line{margin-top:7px;font-size:11px;color:#6f8ea0;padding:6px 9px;background:rgba(44,74,94,0.06);border-radius:7px;}
.day-view-card{background:#ffffff;border-radius:12px;padding:14px;}
.month-weekdays{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:6px;}
.month-weekday-cell{text-align:center;font-size:10px;color:#7a95a8;font-weight:700;}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.month-cell{aspect-ratio:1;background:#ffffff;border-radius:8px;padding:4px;position:relative;cursor:pointer;}
.month-cell.empty{background:transparent;cursor:default;}
.month-cell.today{border:1px solid #c8933a;}
.month-cell.full-fed{background:rgba(76,175,80,0.12);}
.month-cell.half-fed{background:rgba(255,152,0,0.10);}
.month-cell-day{font-size:11px;font-weight:600;color:#2c4a5e;}
.month-cell-dots{display:flex;gap:3px;margin-top:4px;}
.m-dot{width:5px;height:5px;border-radius:50%;background:#c9d8e0;}
.m-dot.on{background:#4caf50;}
.note-dot{position:absolute;top:4px;right:4px;width:5px;height:5px;border-radius:50%;background:#c8933a;}
.year-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mini-month{background:#ffffff;border-radius:10px;padding:8px;cursor:pointer;}
.mini-month-label{font-size:11px;font-weight:700;color:#c8933a;margin-bottom:5px;text-align:center;}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
.mini-cell{aspect-ratio:1;border-radius:2px;background:#eaf4fa;}
.mini-cell.empty{background:transparent;}
.mini-cell.full{background:#4caf50;}
.mini-cell.half{background:#ff9800;}
.dd-label{font-size:10px;font-weight:700;color:#5b7d90;letter-spacing:1px;text-transform:uppercase;margin-bottom:3px;}
.dd-protein{font-size:14px;font-weight:700;margin-bottom:2px;}
.dd-detail{font-size:11px;color:#5b7d90;margin-bottom:4px;}
.day-detail-meal{padding:9px 0;border-bottom:1px solid rgba(44,74,94,0.10);}
.note-textarea{width:100%;min-height:90px;background:#eaf4fa;border:1px solid rgba(200,147,58,0.3);border-radius:8px;color:#2c4a5e;font-size:13px;padding:10px;font-family:inherit;resize:vertical;margin-top:8px;}
.hist-divider{height:1px;background:rgba(200,147,58,0.15);margin:22px 0 16px;}
.actual-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:#7a95a8;margin-bottom:14px;cursor:pointer;}
.actual-toggle input{width:16px;height:16px;accent-color:#c8933a;}

/* ── App-wide motion polish ─────────────────────────────────────────────── */
@keyframes pageIn{
  0%{ opacity:0; transform:translateY(10px); }
  100%{ opacity:1; transform:translateY(0); }
}
.page.active{ animation:pageIn .32s cubic-bezier(.25,.8,.35,1); }

@keyframes cardPop{
  0%{ opacity:0; transform:translateY(8px) scale(0.98); }
  100%{ opacity:1; transform:translateY(0) scale(1); }
}
.guide-card, .meal-card, .n-card, .rotation-week, .day-view-card,
.week-day-row, .month-cell, .addl-box, .summary-box, .disclaimer-card{
  animation:cardPop .3s cubic-bezier(.25,.8,.35,1) both;
}
.guide-card:nth-of-type(2){ animation-delay:.03s; }
.guide-card:nth-of-type(3){ animation-delay:.06s; }
.guide-card:nth-of-type(4){ animation-delay:.09s; }
.guide-card:nth-of-type(5){ animation-delay:.12s; }
.meal-grid .meal-card:nth-child(2){ animation-delay:.05s; }

/* tap feedback across interactive elements */
.tab, .addins-btn, .save-btn, .fed-btn, .nav-btn, .view-btn, .swap-option,
.protein-pick-item, .month-cell, .week-note, .n-card, .usda-result-item,
.export-row, .day-cell{
  transition:transform .15s ease, background .2s ease, border-color .2s ease;
}
.tab:active, .addins-btn:active, .save-btn:active, .fed-btn:active,
.nav-btn:active, .view-btn:active, .swap-option:active, .protein-pick-item:active,
.month-cell:active, .n-card:active, .usda-result-item:active{
  transform:scale(0.96);
}
.fed-btn.active{ animation:fedPulse .4s ease; }
@keyframes fedPulse{
  0%{ transform:scale(1); }
  40%{ transform:scale(1.06); }
  100%{ transform:scale(1); }
}
.tab.active{ animation:tabPop .3s ease; }
@keyframes tabPop{
  0%{ transform:scale(0.92); }
  60%{ transform:scale(1.04); }
  100%{ transform:scale(1); }
}

/* modal entrance */
@keyframes modalUp{
  0%{ transform:translateY(100%); opacity:0.4; }
  100%{ transform:translateY(0); opacity:1; }
}
@keyframes overlayFade{
  0%{ opacity:0; }
  100%{ opacity:1; }
}
.overlay{ animation:overlayFade .2s ease; }
.overlay .modal{ animation:modalUp .32s cubic-bezier(.25,.8,.35,1); }

/* checkbox / bar-fill micro-motion */
.bar-fill{ transition:width .5s cubic-bezier(.25,.8,.35,1); }
.supp-check-row input, .export-row input, .protein-pick-item input{ transition:transform .15s ease; }
.supp-check-row input:active, .export-row input:active{ transform:scale(1.15); }

/* ── Onboarding walkthrough (first-launch carousel) ────────────────────── */
.onb-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.75);
  z-index:400;
  display:flex;align-items:center;justify-content:center;
  padding:20px;
  animation:overlayFade .25s ease;
}
.onb-card{
  background:#ffffff;
  border:1px solid rgba(200,147,58,0.3);
  border-radius:20px;
  width:100%;
  max-width:360px;
  padding:26px 22px 22px;
  text-align:center;
  animation:modalUp .35s cubic-bezier(.25,.8,.35,1);
}
.onb-slide-wrap{ position:relative; min-height:230px; }
.onb-slide{
  position:absolute; top:0;left:0;right:0;
  opacity:0; transform:translateX(24px);
  transition:opacity .35s ease, transform .35s ease;
  pointer-events:none;
  display:flex; flex-direction:column; align-items:center;
}
.onb-slide.active{ opacity:1; transform:translateX(0); pointer-events:auto; }
.onb-badge{
  width:34px;height:34px;border-radius:50%;
  background:#c8933a;color:#0f1720;font-weight:800;font-size:14px;
  display:flex;align-items:center;justify-content:center;margin-bottom:12px;
}
.onb-icon{
  width:80px;height:80px;border-radius:22px;
  background:rgba(200,147,58,0.12);
  display:flex;align-items:center;justify-content:center;
  font-size:38px;margin-bottom:14px;
}
.onb-title{ font-size:16px;font-weight:800;color:#2c4a5e;margin-bottom:8px; }
.onb-desc{ font-size:12.5px;color:#5b7d90;line-height:1.6;max-width:280px; }
.onb-dots{ display:flex;gap:6px;justify-content:center;margin-top:18px;margin-bottom:16px; }
.onb-dot{ width:7px;height:7px;border-radius:50%;background:#cfe0ea;transition:background .25s ease, transform .25s ease; }
.onb-dot.active{ background:#c8933a;transform:scale(1.3); }
.onb-btns{ display:flex;gap:8px; }
.onb-btn-skip{ flex:1;padding:11px;border-radius:9px;border:1px solid rgba(44,74,94,0.18);background:transparent;color:#5b7d90;font-size:12px;font-weight:700;cursor:pointer; }
.onb-btn-next{ flex:2;padding:11px;border-radius:9px;border:none;background:#c8933a;color:#0f1720;font-size:13px;font-weight:800;cursor:pointer; }
.replay-walkthrough-btn{ font-size:11px;color:#c8933a;text-decoration:underline;cursor:pointer;margin-top:10px;display:inline-block; }

/* ── Directional slide transitions (day/history/nutrition navigation) ───── */
@keyframes slideInFromRight{
  0%{ opacity:0; transform:translateX(26px); }
  100%{ opacity:1; transform:translateX(0); }
}
@keyframes slideInFromLeft{
  0%{ opacity:0; transform:translateX(-26px); }
  100%{ opacity:1; transform:translateX(0); }
}
.slide-in-right{ animation:slideInFromRight .32s cubic-bezier(.25,.8,.35,1); }
.slide-in-left{ animation:slideInFromLeft .32s cubic-bezier(.25,.8,.35,1); }

/* ── Feeding tab extra polish ─────────────────────────────────────────────
   Meal cards get a smooth color wash when Fed toggles, and everything that
   pops into a card on swap/amount-change (swap notes, add-item lines) gets
   its own little entrance instead of just appearing. */
.meal-card{ transition:background .3s ease, border-color .3s ease; }
.swap-note, .addl-item{ animation:cardPop .28s cubic-bezier(.25,.8,.35,1) both; }
.recipe-line, .supp-check-row{ animation:cardPop .25s cubic-bezier(.25,.8,.35,1) both; }
.recipe-line:nth-of-type(2){ animation-delay:.02s; }
.supp-check-row:nth-of-type(2){ animation-delay:.03s; }
.supp-check-row:nth-of-type(3){ animation-delay:.06s; }
.supp-check-row:nth-of-type(4){ animation-delay:.09s; }
.supp-check-row:nth-of-type(5){ animation-delay:.12s; }

@keyframes checkPop{
  0%{ transform:scale(1); }
  50%{ transform:scale(1.35); }
  100%{ transform:scale(1); }
}
.supp-check-row input:checked, .export-row input:checked{ animation:checkPop .25s ease; }

@keyframes ozTagPulse{
  0%{ color:#c8933a; }
  50%{ color:#f0c060; }
  100%{ color:#c8933a; }
}
.amt-tag:active{ animation:ozTagPulse .3s ease; }

/* ── Onboarding-style visual pass, applied app-wide ───────────────────────
   Rounder, softer cards everywhere (matching the onboarding card's 20px
   radius) plus a reusable "icon chip" treatment — the same rounded amber
   icon box used in the onboarding steps — for card titles across the app. */
.guide-card, .meal-card, .n-card, .summary-box, .addl-box, .rotation-week,
.day-view-card, .week-day-row, .disclaimer-card, .month-cell, .usda-modal-panel,
.aafco-cell, .protein-pick-item, .usda-result-item, .day-cell{
  border-radius:16px;
}
.overlay .modal{ border-radius:22px 22px 0 0; }
.save-btn, .fed-btn, .addins-btn{ border-radius:13px; }
.nav-btn, .view-btn{ border-radius:12px; }
.swap-option{ border-radius:12px; }
.calc-input, .calc-select, .usda-key-input, .usda-search-input{ border-radius:11px; }

.title-icon-row{ display:flex; align-items:center; gap:10px; }
.icon-chip{
  width:34px;height:34px;flex-shrink:0;
  border-radius:11px;
  background:rgba(200,147,58,0.14);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;
}
.title-text{ color:inherit; font-weight:inherit; }

.slot-icon-chip{
  width:22px;height:22px;border-radius:8px;
  background:rgba(200,147,58,0.16);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:12px;margin-right:6px;vertical-align:middle;
}

.embedded-video-mount{ margin-bottom:14px; border-radius:14px; overflow:hidden; background:#e7f1f7; }
.embedded-video-frame{ width:100%; border:none; display:block; }

</style>

<div class="header">
  <div class="header-top">
    <div style="flex:1;min-width:0">
      <div class="app-title">Human Grade Dog Food Meal Planner <span class="version-tag">v.87</span></div>

<script>
// Embedded illustrative videos (self-contained HTML docs, rendered via iframe srcdoc)

<style>

<div class="scene">
  <div class="title">🐾 Cubes Into The Bowl</div>
  <div class="subtitle">The 8 steps to a finished meal, straight from the freezer</div>

  function buildCubes(){
    cubeRow.innerHTML = "";
    for(var i=1;i<=TOTAL;i++){

      }, 480);

  }

  var PROTEINS = [{"icon": "🫛", "name": "Green Beans"}, {"icon": "🥒", "name": "Zucchini"}, {"icon": "🫑", "name": "Bell Peppers"}, {"icon": "🥕", "name": "Carrots"}, {"icon": "🟢", "name": "Peas"}, {"icon": "🥬", "name": "Spinach"}, {"icon": "🥗", "name": "Romaine"}];
  var TOTAL = PROTEINS.length;

  var cubeRow = document.getElementById("cubeRow");
  var hand = document.getElementById("hand");
  var heldIcon = document.getElementById("heldIcon");
  var progressLabel = document.getElementById("progressLabel");
  var allSet = document.getElementById("allSet");
  var shelfArea = document.getElementById("shelfArea");
  var bowlInside = document.getElementById("bowlInside");
  var legendGrid = document.getElementById("legendGrid");

  function buildCubes(){
    cubeRow.innerHTML = "";
    for(var i=1;i<=TOTAL;i++){
      var c = document.createElement("div");
      c.className = "cube";
      c.textContent = PROTEINS[i-1].icon;
      c.id = "cube-"+i;
      cubeRow.appendChild(c);
    }
  }
  function buildBowlChips(){
    bowlInside.innerHTML = "";
    for(var i=1;i<=TOTAL;i++){
      var chip = document.createElement("div");
      chip.className = "bowl-chip";
      chip.textContent = PROTEINS[i-1].icon;
      chip.id = "chip-"+i;
      bowlInside.appendChild(chip);
    }
  }
  function buildLegend(){
    legendGrid.innerHTML = "";
    for(var i=1;i<=TOTAL;i++){
      var item = document.createElement("div");
      item.className = "legend-item";
      item.id = "legend-"+i;
      item.innerHTML = '<span class="legend-icon">'+PROTEINS[i-1].icon+'</span><span class="legend-name">'+PROTEINS[i-1].name+'</span>';
      legendGrid.appendChild(item);
    }
  }
  function setLegendActive(n){
    for(var i=1;i<=TOTAL;i++){
      var item=document.getElementById("legend-"+i);
      if(!item) continue;
      item.className = "legend-item"+(i===n?" active":"")+(i<n?" done":"");
    }
  }
  buildCubes();
  buildBowlChips();
  buildLegend();

  function scatterFrost(){
    for(var i=0;i<10;i++){
      var d = document.createElement("div");
      d.className = "frost-dot";
      var size = 3 + Math.random()*4;
      d.style.width = size+"px"; d.style.height = size+"px";
      d.style.left = (Math.random()*100)+"%";
      d.style.top = (Math.random()*-100)+"px";
      d.style.animationDuration = (8+Math.random()*6)+"s";
      d.style.animationDelay = (Math.random()*6)+"s";
      shelfArea.appendChild(d);
    }
    var flakes = ["❄","❆","✻"];
    for(var j=0;j<6;j++){
      var f = document.createElement("div");
      f.className = "snowflake";
      f.textContent = flakes[Math.floor(Math.random()*flakes.length)];
      f.style.left = (Math.random()*100)+"%";
      f.style.top = (Math.random()*-200)+"px";
      f.style.animationDuration = (11+Math.random()*8)+"s";
      f.style.animationDelay = (Math.random()*8)+"s";
      shelfArea.appendChild(f);
    }
  }
  scatterFrost();

  function cubeCenterPercent(n){
    var cube = document.getElementById("cube-"+n);
    if(!cube) return 50;
    var boxRect = document.querySelector(".box-wrap").getBoundingClientRect();
    var cubeRect = cube.getBoundingClientRect();
    var centerX = (cubeRect.left + cubeRect.width/2) - boxRect.left;
    return (centerX / boxRect.width) * 100;
  }

  var BOX_HOVER_TOP = 56;
  var BOX_GRAB_TOP  = 118;
  var BOWL_HOVER_TOP = 440;
  var BOWL_DROP_TOP  = 480;

  var current = 1;

  function setHand(topPx,leftPct,cb,delay){
    hand.style.top = topPx+"px";
    hand.style.left = leftPct+"%";
    setTimeout(cb, delay);
  }

  function runStep(){
    var n = current;
    var p = PROTEINS[n-1];
    progressLabel.textContent = p.name+" ("+n+" of "+TOTAL+")";
    setLegendActive(n);
    var cube = document.getElementById("cube-"+n);
    var cubeX = cubeCenterPercent(n);

    setHand(BOX_HOVER_TOP, cubeX, function(){
      if(cube) cube.classList.add("active-glow");

      setHand(BOX_GRAB_TOP, cubeX, function(){
        if(cube){ cube.classList.add("taken"); cube.classList.remove("active-glow"); }
        heldIcon.textContent = p.icon;
        heldIcon.classList.add("show");

        setHand(BOX_HOVER_TOP, cubeX, function(){
          setHand(BOWL_HOVER_TOP, 50, function(){
            hand.classList.add("tilt");
            setHand(BOWL_DROP_TOP, 50, function(){
              heldIcon.classList.remove("show");
              var chip=document.getElementById("chip-"+n);
              if(chip) chip.classList.add("show");

              hand.classList.remove("tilt");
              setHand(BOWL_HOVER_TOP, 50, function(){
                current++;
                if(current > TOTAL){
                  allSet.classList.add("show");
                  setTimeout(function(){
                    allSet.classList.remove("show");
                    buildCubes();
                    buildBowlChips();
                    setLegendActive(0);
                    current = 1;
                    setHand(BOX_HOVER_TOP, 50, runStep, 500);
                  }, 1800);
                } else {
                  runStep();
                }
              }, 420);
            }, 380);
          }, 460);
        }, 350);
      }, 440);
    }, 420);
  }

  setTimeout(runStep, 500);
<\/script>

  var FOODS = [
    {name:"Carrots",     icon:"🥕", status:"safe",  reason:"Crunchy, low-cal, great for teeth"},
    {name:"Blueberries", icon:"🫐", status:"safe",  reason:"Antioxidant-rich, dog-approved"},

    {name:"Bacon",       icon:"🥓", status:"limit", reason:"High in salt & fat — sparingly only"},
    {name:"Liver",       icon:"🍖", status:"limit", reason:"Very high in Vitamin A — moderation matters"},
    {name:"Chocolate",   icon:"🍫", status:"avoid", reason:"Toxic — contains theobromine"},
    {name:"Grapes",      icon:"🍇", status:"avoid", reason:"Can cause acute kidney failure"},
    {name:"Onions",      icon:"🧅", status:"avoid", reason:"Damages red blood cells"}
  ];

  var stage = document.getElementById("stage");
  var statusPill = document.getElementById("statusPill");
  var foodCard = document.getElementById("foodCard");
  var foodIcon = document.getElementById("foodIcon");
  var foodName = document.getElementById("foodName");
  var reasonLine = document.getElementById("reasonLine");
  var qmark = document.getElementById("qmark");
  var bigX = document.getElementById("bigX");
  var dogZone = document.getElementById("dogZone");
  var dogJumpWrap = document.getElementById("dogJumpWrap");
  var tail = document.getElementById("tail");
  var eyesHappy = document.getElementById("eyesHappy");
  var eyesNeutral = document.getElementById("eyesNeutral");
  var eyesWorried = document.getElementById("eyesWorried");
  var tongue = document.getElementById("tongue");

  function setEyes(mode){
    eyesHappy.style.display = mode==="happy" ? "block" : "none";
    eyesNeutral.style.display = mode==="neutral" ? "block" : "none";
    eyesWorried.style.display = mode==="worried" ? "block" : "none";
  }

  function spawnSparkles(){
    var positions = [[60,60],[100,60],[80,40]];
    for(var i=0;i<positions.length;i++){
      var s = document.createElement("div");
      s.className = "sparkle";
      s.textContent = "✨";
      s.style.left = positions[i][0]+"px";
      s.style.top = positions[i][1]+"px";
      stage.appendChild(s);
      (function(el){
        setTimeout(function(){ el.classList.add("pop"); }, 20);
        setTimeout(function(){ if(el.parentNode) el.parentNode.removeChild(el); }, 1100);
      })(s);
    }
  }

  var current = 0;

  function resetState(){
    dogZone.className = "dog-zone";
    tail.className = "tail wag-slow";
    tongue.style.display = "block";
    bigX.className = "big-x";
    qmark.className = "qmark";
    statusPill.className = "status-pill";
    foodCard.className = "food-card";
    reasonLine.className = "reason-line";
    setEyes("neutral");
  }

  function runStep(){
    var f = FOODS[current];
    resetState();

    foodIcon.textContent = f.icon;
    foodName.textContent = f.name;
    reasonLine.textContent = f.reason;

    setTimeout(function(){
      foodCard.classList.add("show");
      reasonLine.classList.add("show");
    }, 150);

    setTimeout(function(){
      statusPill.textContent = f.status.toUpperCase();
      statusPill.classList.add(f.status, "show");

      if(f.status==="safe"){
        dogZone.classList.add("safe");
        tail.className = "tail wag-fast";
        setEyes("happy");
        tongue.style.display = "block";
        dogJumpWrap.style.animation = "none";
        void dogJumpWrap.offsetWidth;
        dogJumpWrap.style.animation = "";
        dogZone.classList.add("safe");
        spawnSparkles();
      } else if(f.status==="limit"){
        dogZone.classList.add("limit");
        tail.className = "tail wag-slow";
        setEyes("neutral");
        tongue.style.display = "none";
        qmark.classList.add("show");
      } else {
        dogZone.classList.add("avoid","recoil");
        tail.className = "tail wag-none";
        setEyes("worried");
        tongue.style.display = "none";
        setTimeout(function(){ bigX.classList.add("pop"); }, 120);
      }
    }, 500);

    setTimeout(function(){
      current = (current+1) % FOODS.length;
      runStep();
    }, 3400);
  }

  setTimeout(runStep, 400);
<\/script>

function checkFoodSafety(queryText){
  if(!queryText) return null;
  var q=queryText.toLowerCase();
  for(var i=0;i<SAFETY_LIST.length;i++){
    var item=SAFETY_LIST[i];
    if(item.status==="safe") continue;
    var key=item.name.toLowerCase();
    if(q.indexOf(key)!==-1) return item;
  }
  return null;
}

var _pendingSafetyProceed=null;
function showFoodSafetyAlert(item,onProceed){
  var isAvoid=item.status==="avoid";
  var html='<div class="safety-alert-overlay" id="safetyOverlay">'
    +'<div class="safety-alert-box'+(isAvoid?"":" limit-box")+'">'
    +'<div class="safety-x">'+(isAvoid?"&#10060;":"&#9888;&#65039;")+'</div>'
    +'<div class="safety-alert-title'+(isAvoid?"":" limit-title")+'">'+(isAvoid?"Unsafe For Dogs":"Feed With Caution")+'</div>'
    +'<div class="safety-alert-food">'+escapeHtml(item.name)+'</div>'
    +'<div class="safety-alert-reason">'+(item.reason||"")+'</div>'
    +'<div class="safety-alert-btns">'
    +'<button class="safety-btn-cancel" onclick="closeSafetyAlert()">'+(isAvoid?"Don&rsquo;t Add It":"Got It, Go Back")+'</button>'
    +'<button class="safety-btn-proceed" onclick="proceedPastSafetyAlert()">Add anyway'+(isAvoid?" (not recommended)":"")+'</button>'
    +'</div></div></div>';
  var wrap=document.createElement("div");
  wrap.innerHTML=html;
  document.body.appendChild(wrap.firstChild);
  _pendingSafetyProceed=onProceed;
}
function closeSafetyAlert(){
  var el=document.getElementById("safetyOverlay");
  if(el) el.parentNode.removeChild(el);
  _pendingSafetyProceed=null;
}
function proceedPastSafetyAlert(){
  var fn=_pendingSafetyProceed;
  closeSafetyAlert();
  if(fn) fn();
}

// WEEKS is the live, generated schedule that the rest of the app reads from.
// It's rebuilt by regenerateRotation() whenever the operator changes their
// selected proteins (and once at boot).
var WEEKS = {};

function regenerateRotation(){
  var mains = getActiveMainProteins();
  while(mains.length && mains.length<4) mains = mains.concat(mains);
  mains = mains.slice(0,4);
  if(mains.length<4){ mains=DEFAULT_SELECTED_PROTEINS.slice(); } // ultimate fallback
  var fish = getActiveFishProteins();

  var weekMainA = {1:mains[0], 2:mains[2], 3:mains[1], 4:mains[3]};
  var weekMainB = {1:mains[1], 2:mains[3], 3:mains[0], 4:mains[2]};
  var weekAlt   = {
    1: fish.length ? fish[0] : mains[0],
    2: fish.length ? (fish[1]||fish[0]) : mains[2],
    3: fish.length ? fish[0] : mains[1],
    4: fish.length ? (fish[1]||fish[0]) : mains[3]
  };

  var newWeeks = {};
  [1,2,3,4].forEach(function(wk){
    newWeeks[wk] = {};
    DAYS_OF_WEEK.forEach(function(dn){
      var base = (WEEKS_BASE[wk]||{})[dn];
      if(!base) return;
      var isAltDay = (dn==="Thu" || dn==="Sun");
      newWeeks[wk][dn] = {
        am: meal(isAltDay?weekAlt[wk]:weekMainA[wk], base.am.starch, base.am.veg, base.am.organ),
        pm: meal(weekMainB[wk], base.pm.starch, base.pm.veg, base.pm.organ)
      };
    });
  });
  WEEKS = newWeeks;

  var pages=["guide","plan","calendar","nutrition"];
  for(var i=0;i<pages.length;i++){
    var el=document.getElementById("page-"+pages[i]);
    if(el && el.className.indexOf("active")!==-1){
      if(pages[i]==="plan") renderPlan();
      if(pages[i]==="calendar") renderCalendarPage();
      if(pages[i]==="nutrition") renderNutrition();
      if(pages[i]==="guide") renderGuide();
    }
  }
}

function showPetPhoto(dataUrl){

  imgEl.src=dataUrl;
  imgEl.style.display="block";

function handlePetPhotoUpload(input){
  var file=input.files && input.files[0];
  if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var maxDim=300;
      var w=img.width, h=img.height;
      var scale=Math.min(1, maxDim/Math.max(w,h));
      var canvas=document.createElement("canvas");
      canvas.width=Math.round(w*scale);
      canvas.height=Math.round(h*scale);
      var ctx=canvas.getContext("2d");
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
      var dataUrl=canvas.toDataURL("image/jpeg",0.85);
      try{ localStorage.setItem("mya_pet_photo",dataUrl); }catch(err){}
      showPetPhoto(dataUrl);
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

  return (amountOverrides[key]!==undefined) ? amountOverrides[key] : null;
}

function setAmountOverride(ds,slot,category,oz){
  var key=ds+"_"+slot+"_"+category;

function getEffectiveAmount(ds,slot,category){
  var override=getAmountOverride(ds,slot,category);

function dateKey(y,m,d){ return y+"-"+(m<10?"0"+m:m)+"-"+(d<10?"0"+d:d); }
function getDOW(y,m,d){ return new Date(y,m,d).getDay(); }
function getWK(y,m,d){
  var jan1 = new Date(y,0,1);
  var doy  = Math.round((new Date(y,m,d)-jan1)/86400000);
  return (Math.floor(doy/7)%4)+1;
}
function fmtDate(y,m,d){
  var wdays=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  var mons=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return wdays[getDOW(y,m,d)]+", "+mons[m]+" "+d;
}
function advDay(n){
  var dt=new Date(curYear,curMonth,curDay+n);
  curYear=dt.getFullYear(); curMonth=dt.getMonth(); curDay=dt.getDate();
}
function addDays(y,m,d,n){ var dt=new Date(y,m,d+n); return {y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()}; }
function monthAbbrev(m){ var mons=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"]; return mons[m]; }
function escapeHtml(s){
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function startOfWeek(y,m,d){
  var dow=getDOW(y,m,d);
  var dt=new Date(y,m,d-dow);
  return {y:dt.getFullYear(),m:dt.getMonth(),d:dt.getDate()};
}

// ── NUTRITION CALC ────────────────────────────────────────────────────────────
function zeroN(){ var t={}; for(var i=0;i<KEYS.length;i++) t[KEYS[i]]=0; return t; }
function addFood(t,src,oz){
  if(!src) return;
  for(var i=0;i<KEYS.length;i++) t[KEYS[i]]+=(src[KEYS[i]]||0)*oz;
}

// ── CUSTOM PRODUCTS (homemade treats/recipes made of several ingredients) ────
// A product is a recipe (e.g. "Peanut Butter Oat Treats") made from a list of
// ingredients in ounces, baked/assembled into a batch that yields N servings.
// Nutrition per serving = (sum of all ingredient nutrients) / servings — the
// same "look the ingredient up, get its per-oz profile" mechanism the USDA
// search already uses, just totaled across a recipe instead of a single meal.
function getIngredientNutrients(name){
  return FOODS[name] || ADDINS[name] || null;
}

function calcProductTotalNutrients(product){
  var t=zeroN();
  if(!product || !product.ingredients) return t;
  for(var i=0;i<product.ingredients.length;i++){
    var ing=product.ingredients[i];
    var src=getIngredientNutrients(ing.name);
    if(src) addFood(t,src,ing.oz||0);
  }
  return t;
}

function calcProductPerServing(product){
  var total=calcProductTotalNutrients(product);
  var servings=(product && product.servings>0) ? product.servings : 1;
  var t=zeroN();
  for(var i=0;i<KEYS.length;i++) t[KEYS[i]]=total[KEYS[i]]/servings;
  return t;
}

function getProduct(id){ return customProducts[id] || null; }

function saveProduct(product){
  if(!product.id) product.id = "prod_"+Date.now()+"_"+Math.floor(Math.random()*1000);
  customProducts[product.id]=product;
  try{ localStorage.setItem("mya_custom_products",JSON.stringify(customProducts)); }catch(e){}
  return product.id;
}

function deleteProduct(id){
  delete customProducts[id];
  try{ localStorage.setItem("mya_custom_products",JSON.stringify(customProducts)); }catch(e){}
}

function calcMeal(m,addins,ds,slot,products){
  var t=zeroN();
  if(m){
    var pOz=(ds&&slot)?getEffectiveAmount(ds,slot,"protein"):DEFAULT_AMOUNTS.protein;
    var sOz=(ds&&slot)?getEffectiveAmount(ds,slot,"starch"):DEFAULT_AMOUNTS.starch;
    var vOz=(ds&&slot)?getEffectiveAmount(ds,slot,"veg"):DEFAULT_AMOUNTS.veg;
    var oOz=(ds&&slot)?getEffectiveAmount(ds,slot,"organ"):DEFAULT_AMOUNTS.organ;
    addFood(t,FOODS[m.protein],pOz);
    addFood(t,FOODS[m.starch],sOz);
    addFood(t,FOODS[m.veg],vOz);
    if(m.organ) addFood(t,FOODS[m.organ],oOz);
    if(ds && slot){
      var sc=sumCheckedSupplements(ds,slot,isFishMeal(m.protein),m.protein);
      for(var i=0;i<KEYS.length;i++) t[KEYS[i]]+=(sc[KEYS[i]]||0);
    } else {
      for(var i2=0;i2<KEYS.length;i2++) t[KEYS[i2]]+=(SUPPS[KEYS[i2]]||0);
    }
  }
  if(addins){
    var ns=Object.keys(addins);
    for(var j=0;j<ns.length;j++){ if(addins[ns[j]]>0) addFood(t,ADDINS[ns[j]],addins[ns[j]]); }
  }
  if(products){
    var ps=Object.keys(products);
    for(var k=0;k<ps.length;k++){
      var count=products[ps[k]];
      var prod=getProduct(ps[k]);
      if(count>0 && prod){
        var perServing=calcProductPerServing(prod);
        for(var i3=0;i3<KEYS.length;i3++) t[KEYS[i3]]+=(perServing[KEYS[i3]]||0)*count;
      }
    }
  }
  return t;
}

// ── SOURCE-TRACKED NUTRITION (powers the "tap a nutrient to see contributors" feature) ────
function accumulateNutrients(totals,sources,sourceLabel,foodObj,oz){
  if(!foodObj) return;
  for(var k=0;k<KEYS.length;k++){
    var key=KEYS[k];
    var contribution=(foodObj[key]||0)*oz;
    if(!contribution) continue;
    totals[key]=(totals[key]||0)+contribution;
    if(!sources[key]) sources[key]={};
    sources[key][sourceLabel]=(sources[key][sourceLabel]||0)+contribution;
  }
}

function calcMealTracked(m,addins,ds,slot,totals,sources,products){
  if(m){
    var pOz=(ds&&slot)?getEffectiveAmount(ds,slot,"protein"):DEFAULT_AMOUNTS.protein;
    var sOz=(ds&&slot)?getEffectiveAmount(ds,slot,"starch"):DEFAULT_AMOUNTS.starch;
    var vOz=(ds&&slot)?getEffectiveAmount(ds,slot,"veg"):DEFAULT_AMOUNTS.veg;
    var oOz=(ds&&slot)?getEffectiveAmount(ds,slot,"organ"):DEFAULT_AMOUNTS.organ;
    accumulateNutrients(totals,sources,m.protein,FOODS[m.protein],pOz);
    accumulateNutrients(totals,sources,m.starch,FOODS[m.starch],sOz);
    accumulateNutrients(totals,sources,m.veg,FOODS[m.veg],vOz);
    if(m.organ) accumulateNutrients(totals,sources,m.organ,FOODS[m.organ],oOz);
    if(ds && slot){
      var isFish=isFishMeal(m.protein);
      var items=getSupplementItems(isFish,ds,slot,m.protein);
      for(var i=0;i<items.length;i++){
        if(isSuppChecked(ds,slot,items[i].id)){
          if(items[i].id==="herbcube"){
            var comps=getHerbCubeComponents(isFish);
            for(var c=0;c<comps.length;c++) accumulateNutrients(totals,sources,comps[c].name,comps[c].nutr,1);
          } else {
            var label=SUPP_SHORT_LABELS[items[i].id]||items[i].id;
            accumulateNutrients(totals,sources,label,items[i].nutr,1);
          }
        }
      }
    }
  }
  if(addins){
    var ns=Object.keys(addins);
    for(var j=0;j<ns.length;j++){
      if(addins[ns[j]]>0) accumulateNutrients(totals,sources,ns[j],ADDINS[ns[j]],addins[ns[j]]);
    }
  }
  if(products){
    var ps=Object.keys(products);
    for(var k=0;k<ps.length;k++){
      var count=products[ps[k]];
      var prod=getProduct(ps[k]);
      if(count>0 && prod){
        var perServing=calcProductPerServing(prod);
        var label=prod.name+" (serving)";
        accumulateNutrients(totals,sources,label,perServing,count);
      }
    }
  }
}

function calcNutritionRange(startY,startM,startD,endY,endM,endD){
  var totals=zeroN();
  var sources={};
  var mealCount=0;
  var dayCount=0;

  var cursor=new Date(startY,startM,startD);
  var endDate=new Date(endY,endM,endD);

  while(cursor<=endDate){
    var y=cursor.getFullYear(), m=cursor.getMonth(), d=cursor.getDate();
    var ds=dateKey(y,m,d);
    var dow=cursor.getDay();
    var wk=getWK(y,m,d);
    var dn=DAYS_OF_WEEK[dow];
    var dm=(WEEKS[wk]||{})[dn]||{};
    var dayHasFed=false;
    var slots=["am","pm"];
    for(var s=0;s<2;s++){
      var key=ds+"_"+slots[s];
      if(fedLog[key]){
        mealCount++; dayHasFed=true;
        var effMeal=getEffectiveMeal(ds,slots[s],dm[slots[s]]);
        calcMealTracked(effMeal,addinsLog[key]||{},ds,slots[s],totals,sources,productsLog[key]||{});
      }
    }
    if(dayHasFed) dayCount++;
    cursor.setDate(cursor.getDate()+1);
  }

  return { totals:totals, sources:sources, mealCount:mealCount, dayCount:dayCount };
}

function renderPlan(){
  var html = "";

  // AAFCO Targets
  html += '<div class="section-title">AAFCO Daily Nutritional Targets</div>';
  html += '<div style="font-size:10px;color:#666;margin-bottom:12px">For Mya &bull; 60 lb adult &bull; ~1,350 kcal/day</div>';

  var groups = ["Macros","Minerals","Fatty Acids","Vitamins"];
  for(var gi=0;gi<groups.length;gi++){
    var g=groups[gi];
    var items=AAFCO.filter(function(a){return a.group===g;});
    html+='<div class="aafco-group"><div class="aafco-group-label">'+g+'</div><div class="aafco-grid">';
    for(var ai=0;ai<items.length;ai++){
      var a=items[ai];
      var range = a.max<9000 ? a.min+" &ndash; "+a.max+" "+a.unit : a.min+"+ "+a.unit;
      html+='<div class="aafco-cell"><div class="aafco-cell-name">'+a.label+'</div><div class="aafco-cell-val">'+range+'</div></div>';
    }
    html+='</div>';
    if(g==="Minerals"){
      html+='<div class="ratio-note">&#9878; <strong>Calcium : Phosphorus ratio</strong> &mdash; AAFCO requires between <strong>1:1 and 2:1</strong> (ideal ~1.2&ndash;1.4:1). This is the only nutrient ratio AAFCO specifically regulates, since imbalance affects bone development regardless of how much of each mineral is present individually.</div>';
    }
    html+='</div>';
  }

  // 4-Week Rotation — reads live from WEEKS, which regenerateRotation() builds
  // from whatever proteins the operator selected in the Guide tab.
  html += '<div class="section-title" style="margin-top:6px">4-Week Meal Rotation</div>';

  var dayOrderDisp=["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];
  var dayLabels=["M","T","W","Th","F","Sa","Su"];

  function shortProt(n){ return (n||"").replace("(85/15)","").replace(" (canned)","").replace("Ground ","").trim(); }

  for(var wk=1; wk<=4; wk++){
    var wkDays=WEEKS[wk]||{};
    var mondayMeal=wkDays["Mon"];
    var mainTitle = mondayMeal ? (shortProt(mondayMeal.am.protein)+" &amp; "+shortProt(mondayMeal.pm.protein)) : ("Week "+wk);

    html+='<div class="rotation-week">'
      +'<div class="rotation-week-header">'
      +'<div class="rotation-week-title">Week '+wk+' &mdash; '+mainTitle+'</div>'
      +'</div>'
      +'<div class="rotation-row">';

    for(var di=0;di<7;di++){
      var dn=dayOrderDisp[di];
      var dm=wkDays[dn];
      if(!dm){ html+='<div class="day-cell land"></div>'; continue; }
      var amIsFish=isFishMeal(dm.am.protein);
      var amProt=shortProt(dm.am.protein);
      var pmProt=shortProt(dm.pm.protein);
      html+='<div class="day-cell '+(amIsFish?"fish":"land")+'">'
        +'<div class="day-cell-name">'+dayLabels[di]+'</div>'
        +(amIsFish?'<div class="fish-icon">&#127997;</div>':'')
        +'<div class="day-cell-am">'+amProt+'</div>'
        +'<div class="day-cell-pm" style="color:'+(amIsFish?"#64b5f6":"#888")+'">'+pmProt+'</div>'
        +'</div>';
    }
    html+='</div></div>';
  }

  html+='<div style="font-size:10px;color:#555;margin-top:6px;margin-bottom:16px">&#8635; Rotation repeats every 4 weeks &bull; AM on Thu &amp; Sun is the variety/alt protein &bull; Change proteins on the Guide tab</div>';

  document.getElementById("page-plan").innerHTML=html;
}

}

  else { delete brothOverrides[key]; }

function getEffectiveMeal(ds,slot,scheduledMeal){
  if(!scheduledMeal) return scheduledMeal;
  var pOverride=getProteinOverride(ds,slot);
  var sOverride=getStarchOverride(ds,slot);
  var vOverride=getVegOverride(ds,slot);
  var oOverride=getOrganOverride(ds,slot);
  return {
    protein: pOverride || scheduledMeal.protein,
    starch: sOverride || scheduledMeal.starch,
    veg: vOverride || scheduledMeal.veg,
    organ: (oOverride!==null) ? (oOverride||null) : scheduledMeal.organ
  };
}

function isFishMeal(proteinName){
  return proteinName==="Sardines (canned)" || proteinName==="Salmon (canned)";
}

function suppNutr(overrides){
  var t=zeroN();
  for(var k in overrides){ if(overrides.hasOwnProperty(k)) t[k]=overrides[k]; }
  return t;
}

function getBrothNutrients(brothChoice,brothOz){
  var base=FOODS[brothChoice];
  if(!base) return zeroN();
  // Broth is a diluted liquid extract, not the solid meat — roughly 8% of the protein's
  // per-oz nutrient density, applied to the actual serving size used.
  var t=zeroN();
  var factor=0.08*(brothOz!=null?brothOz:DEFAULT_AMOUNTS.broth);
  for(var k=0;k<KEYS.length;k++) t[KEYS[k]]=(base[KEYS[k]]||0)*factor;
  return t;
}

// The herb cube is one premade item, but it's made of 3 real ingredients — each gets its
// own small, realistic nutrient estimate so the breakdown can show them individually,
// rather than lumping everything under one generic "Herb Cube" label.
function getHerbCubeComponents(isFish){
  var vitESource = isFish
    ? { name:"Vitamin E Oil",       nutr:suppNutr({vitE:200}) }
    : { name:"Mixed Tocopherols",   nutr:suppNutr({vitE:3.4}) };
  var herbSource = isFish
    ? { name:"Spearmint",           nutr:suppNutr({vitA:10,vitK:2,calcium:0.5}) }
    : { name:"Ginger",              nutr:suppNutr({potassium:1,magnesium:0.1,iron:0.02}) };
  return [
    { name:"Parsley", nutr:suppNutr({vitK:4,vitA:15,calcium:1,iron:0.1}) },
    vitESource,
    herbSource
  ];
}

function sumNutrList(list){
  var t=zeroN();
  for(var i=0;i<list.length;i++){
    for(var k=0;k<KEYS.length;k++) t[KEYS[k]]+=(list[i].nutr[KEYS[k]]||0);
  }
  return t;
}

function getSupplementItems(isFish,ds,slot,effectiveProtein){
  var fallbackProtein=effectiveProtein||PROTEIN_OPTIONS[0];
  var brothChoice=(ds&&slot) ? (getBrothOverride(ds,slot)||fallbackProtein) : fallbackProtein;
  var brothOz=(ds&&slot) ? getEffectiveAmount(ds,slot,"broth") : DEFAULT_AMOUNTS.broth;
  var herbCubeLabel = isFish
    ? "Herb cube &rarr; &#188; tsp parsley + 200 IU Vitamin E oil + 1 pinch spearmint"
    : "Herb cube &rarr; &#188; tsp parsley + &#188; tsp mixed tocopherols (Vit E) + &#8539; tsp ginger";
  var herbCubeNutr = sumNutrList(getHerbCubeComponents(isFish));
  var brothLabel = (brothOz===DEFAULT_AMOUNTS.broth)
    ? "1&#189; tbsp "+brothChoice+" broth"
    : brothOz+" oz "+brothChoice+" broth";
  return [
    { id:"eggshell", label:"&#189; tsp eggshell powder &rarr; calcium ~800mg", nutr:suppNutr({calcium:800}) },
    { id:"salt",     label:"1 small pinch iodized salt &rarr; iodine + sodium", nutr:suppNutr({sodium:115,chloride:175,iodine:0.10}) },
    { id:"psyllium", label:"&#188; tsp psyllium husk powder &rarr; fiber", nutr:zeroN() },
    { id:"herbcube", label:herbCubeLabel, nutr:herbCubeNutr },
    { id:"broth",    label:brothLabel, nutr:getBrothNutrients(brothChoice,brothOz) }
  ];
}

function isSuppChecked(ds,slot,itemId){
  var key=ds+"_"+slot;
  if(!suppChecks[key] || suppChecks[key][itemId]===undefined) return true; // default: checked
  return !!suppChecks[key][itemId];
}

function setSuppChecked(ds,slot,itemId,checked){
  var key=ds+"_"+slot;
  if(!suppChecks[key]) suppChecks[key]={};
  suppChecks[key][itemId]=checked;
  try{localStorage.setItem("mya_supp_checks",JSON.stringify(suppChecks));}catch(e){}
}

function toggleSuppCheck(ds,slot,itemId,checked){
  setSuppChecked(ds,slot,itemId,checked);
}

function sumCheckedSupplements(ds,slot,isFish,effectiveProtein){
  var t=zeroN();
  var items=getSupplementItems(isFish,ds,slot,effectiveProtein);
  for(var i=0;i<items.length;i++){
    if(isSuppChecked(ds,slot,items[i].id)){
      for(var k=0;k<KEYS.length;k++) t[KEYS[k]]+=(items[i].nutr[KEYS[k]]||0);
    }
  }
  return t;
}

function buildCard(ds,slot,label,scheduledMeal){
  var key=ds+"_"+slot;
  var fed=!!fedLog[key];
  var pOverride=getProteinOverride(ds,slot);
  var sOverride=getStarchOverride(ds,slot);
  var vOverride=getVegOverride(ds,slot);
  var oOverride=getOrganOverride(ds,slot);
  var bOverride=getBrothOverride(ds,slot);
  var m=getEffectiveMeal(ds,slot,scheduledMeal);

  var h='<div class="meal-card'+(fed?" fed":"")+'">'
    +'<div class="slot-label">'+label+'</div>';

  if(m){
    var isFish=isFishMeal(m.protein);
    var pOz=getEffectiveAmount(ds,slot,"protein");
    var sOz=getEffectiveAmount(ds,slot,"starch");
    var vOz=getEffectiveAmount(ds,slot,"veg");
    var oOz=getEffectiveAmount(ds,slot,"organ");
    h+='<div class="meal-protein"><span>'+m.protein+'</span><span class="oz-tag amt-tag" onclick="openAmountModal(\''+ds+'\',\''+slot+'\',\'protein\')">'+pOz+' oz &#9998;</span></div>';
    if(pOverride) h+='<div class="swap-note">&#8646; protein swapped from '+scheduledMeal.protein+'</div>';
    if(getAmountOverride(ds,slot,"protein")!==null) h+='<div class="swap-note">&#8646; amount adjusted from '+DEFAULT_AMOUNTS.protein+' oz</div>';
    h+='<div class="recipe-list">'
      +'<div class="recipe-line"><span>'+m.starch+'</span><span class="oz-tag amt-tag" onclick="openAmountModal(\''+ds+'\',\''+slot+'\',\'starch\')">'+sOz+' oz &#9998;</span></div>';
    if(sOverride) h+='<div class="swap-note">&#8646; starch swapped from '+scheduledMeal.starch+'</div>';
    if(getAmountOverride(ds,slot,"starch")!==null) h+='<div class="swap-note">&#8646; amount adjusted from '+DEFAULT_AMOUNTS.starch+' oz</div>';
    if(m.organ){
      h+='<div class="recipe-line"><span>'+m.organ+'</span><span class="oz-tag amt-tag" onclick="openAmountModal(\''+ds+'\',\''+slot+'\',\'organ\')">'+oOz+' oz &#9998;</span></div>';
      if(getAmountOverride(ds,slot,"organ")!==null) h+='<div class="swap-note">&#8646; amount adjusted from '+DEFAULT_AMOUNTS.organ+' oz</div>';
    } else if(oOverride!==null){
      h+='<div class="recipe-line"><span style="color:#555">No organ</span></div>';
    }
    if(oOverride!==null) h+='<div class="swap-note">&#8646; organ swapped from '+(scheduledMeal.organ||"no organ")+'</div>';
    h+='<div class="recipe-line"><span>'+m.veg+'</span><span class="oz-tag amt-tag" onclick="openAmountModal(\''+ds+'\',\''+slot+'\',\'veg\')">'+vOz+' oz &#9998;</span></div>';
    if(vOverride) h+='<div class="swap-note">&#8646; veg swapped from '+scheduledMeal.veg+'</div>';
    if(getAmountOverride(ds,slot,"veg")!==null) h+='<div class="swap-note">&#8646; amount adjusted from '+DEFAULT_AMOUNTS.veg+' oz</div>';
    var supps=getSupplementItems(isFish,ds,slot,m.protein);
    h+='<div class="recipe-divider"></div>';
    for(var i=0;i<supps.length;i++){
      var checked=isSuppChecked(ds,slot,supps[i].id);
      var numBadge=(supps[i].id==="herbcube") ? '<span class="step-num">5</span>' : '';
      var amtEdit=(supps[i].id==="broth") ? ' <span class="amt-tag" onclick="event.preventDefault();event.stopPropagation();openAmountModal(\''+ds+'\',\''+slot+'\',\'broth\')">&#9998;</span>' : '';
      h+='<label class="supp-check-row">'
        +'<input type="checkbox" '+(checked?"checked":"")+' onchange="toggleSuppCheck(\''+ds+'\',\''+slot+'\',\''+supps[i].id+'\',this.checked)">'
        +numBadge
        +'<span>'+supps[i].label+amtEdit+'</span>'
        +'</label>';
    }
    if(bOverride) h+='<div class="swap-note">&#8646; broth swapped to '+bOverride+'</div>';
    if(getAmountOverride(ds,slot,"broth")!==null) h+='<div class="swap-note">&#8646; broth amount adjusted from '+DEFAULT_AMOUNTS.broth+' oz</div>';
    h+='</div>';

    h+=buildAdditionalItemsBox(ds,slot);

    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'broth\')"><span class="step-num">1</span>&#8646; Swap Broth</button>';
    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'starch\')"><span class="step-num">2</span>&#8646; Swap Starch</button>';
    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'organ\')"><span class="step-num">3</span>&#8646; Swap Organ</button>';
    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'veg\')"><span class="step-num">4</span>&#8646; Swap Vegetable</button>';
    h+='<button class="addins-btn" onclick="openSwapModal(\''+ds+'\',\''+slot+'\',\'protein\')"><span class="step-num">6</span>&#8646; Swap Protein</button>';
    h+='<button class="fed-btn'+(fed?" active":"")+'" onclick="toggleFed(\''+key+'\')">'
      +(fed?"&#10003; Fed!":"Mark Fed")+'</button>';
  } else {
    h+='<div style="color:#3a3a4a;font-size:11px;margin-top:8px">No meal scheduled</div>';
  }
  return h+'</div>';
}

var SWAP_CONFIG = {
  protein: { title:"Swap Protein",    options:PROTEIN_OPTIONS, allowNone:false, getOverride:getProteinOverride, setOverride:setProteinOverride, field:"protein" },
  starch:  { title:"Swap Starch",     options:STARCH_OPTIONS,  allowNone:false, getOverride:getStarchOverride,  setOverride:setStarchOverride,  field:"starch" },
  veg:     { title:"Swap Vegetable",  options:VEG_OPTIONS,     allowNone:false, getOverride:getVegOverride,     setOverride:setVegOverride,     field:"veg" },
  organ:   { title:"Swap Organ",      options:ORGAN_OPTIONS,   allowNone:true,  getOverride:getOrganOverride,   setOverride:setOrganOverride,   field:"organ" },
  broth:   { title:"Swap Broth",      options:BROTH_OPTIONS,   allowNone:false, getOverride:getBrothOverride,   setOverride:setBrothOverride,   field:null,
             hintWord:"Default (matches today's protein)", schedTag:"default",
             dynamicDefault:function(ds,slot,scheduledMeal){ return getProteinOverride(ds,slot) || scheduledMeal.protein; } }
};

function getSwapScheduledValue(cfg,ds,slot,scheduledMeal){
  if(cfg.dynamicDefault) return cfg.dynamicDefault(ds,slot,scheduledMeal);
  return cfg.field ? scheduledMeal[cfg.field] : cfg.defaultValue;
}

function openSwapModal(ds,slot,category){
  var cfg=SWAP_CONFIG[category];
  var dow=getDOW(curYear,curMonth,curDay);
  var wk=getWK(curYear,curMonth,curDay);
  var dn=DAYS_OF_WEEK[dow];
  var dm=(WEEKS[wk]||{})[dn]||{};
  var scheduledMeal=dm[slot];
  if(!scheduledMeal) return;
  var scheduledValue=getSwapScheduledValue(cfg,ds,slot,scheduledMeal); // may be null for organ
  var current=cfg.getOverride(ds,slot); // null = no override (organ: "" = explicit none)
  var tagWord=cfg.schedTag||"scheduled";

  var rows="";
  for(var i=0;i<cfg.options.length;i++){
    var p=cfg.options[i];
    var isScheduled=(p===scheduledValue);
    var isActive=(current!==null) ? (p===current) : isScheduled;
    rows+='<div class="swap-option'+(isActive?" active":"")+'" onclick="applySwap(\''+ds+'\',\''+slot+'\',\''+category+'\',\''+p+'\')">'
      +p+(isScheduled?' <span class="swap-sched-tag">'+tagWord+'</span>':'')
      +'</div>';
  }
  if(cfg.allowNone){
    var isSchedNone=(scheduledValue===null||scheduledValue===undefined);
    var isActiveNone=(current!==null) ? (current==="") : isSchedNone;
    rows+='<div class="swap-option'+(isActiveNone?" active":"")+'" onclick="applySwap(\''+ds+'\',\''+slot+'\',\''+category+'\',\'\')">'
      +'No organ'+(isSchedNone?' <span class="swap-sched-tag">'+tagWord+'</span>':'')
      +'</div>';
  }

  var schedLabel=scheduledValue||"No organ";
  var hintWord=cfg.hintWord||"Scheduled";

  document.getElementById("modal-root").innerHTML=
    '<div class="overlay" id="mbg"><div class="modal">'
    +'<div class="modal-head"><div class="modal-title">'+cfg.title+'</div>'
    +'<button class="modal-close" onclick="closeModal()">&#10005;</button></div>'
    +'<div class="modal-hint">'+hintWord+': '+schedLabel+'. Pick what you actually fed:</div>'
    +rows
    +(current!==null ? '<button class="usda-modal-toggle" onclick="resetSwap(\''+ds+'\',\''+slot+'\',\''+category+'\')" style="margin-top:14px">Reset to '+tagWord+' (remove swap)</button>' : '')
    +'</div></div>';

  document.getElementById("mbg").addEventListener("click",function(e){if(e.target===this)closeModal();});
}

function applySwap(ds,slot,category,value){
  var cfg=SWAP_CONFIG[category];
  var dow=getDOW(curYear,curMonth,curDay);
  var wk=getWK(curYear,curMonth,curDay);
  var dn=DAYS_OF_WEEK[dow];
  var dm=(WEEKS[wk]||{})[dn]||{};
  var scheduledMeal=dm[slot];
  var scheduledValue=getSwapScheduledValue(cfg,ds,slot,scheduledMeal)||""; // normalize null/undefined to ""

  if(value===scheduledValue){
    // picking the same as scheduled/default is the same as removing the override
    cfg.setOverride(ds,slot,null);
  } else {
    cfg.setOverride(ds,slot,value); // value may be "" for explicit "no organ"
  }
  closeModal();
  renderCalendarPage();
}

function resetSwap(ds,slot,category){
  SWAP_CONFIG[category].setOverride(ds,slot,null);
  closeModal();
  renderCalendarPage();
}

var AMOUNT_LABELS = {protein:"Protein",starch:"Starch",veg:"Vegetable",organ:"Organ",broth:"Broth"};

function openAmountModal(ds,slot,category){
  var current=getEffectiveAmount(ds,slot,category);
  var defaultAmt=DEFAULT_AMOUNTS[category];
  var label=AMOUNT_LABELS[category]||category;
  var hasOverride=getAmountOverride(ds,slot,category)!==null;

  document.getElementById("modal-root").innerHTML=
    '<div class="overlay" id="mbg"><div class="modal">'
    +'<div class="modal-head"><div class="modal-title">Adjust '+label+' Amount</div>'
    +'<button class="modal-close" onclick="closeModal()">&#10005;</button></div>'
    +'<div class="modal-hint">Default is '+defaultAmt+' oz. Enter what was actually fed:</div>'
    +'<div class="ai-row"><span class="ai-name">Amount (oz)</span>'
    +'<input class="ai-input" type="number" step="0.25" min="0" id="amtInput" value="'+current+'">'
    +'</div>'
    +'<button class="save-btn" onclick="saveAmountAdjustment(\''+ds+'\',\''+slot+'\',\''+category+'\')">Save Amount</button>'
    +(hasOverride ? '<button class="usda-modal-toggle" onclick="resetAmount(\''+ds+'\',\''+slot+'\',\''+category+'\')" style="margin-top:12px">Reset to default ('+defaultAmt+' oz)</button>' : '')
    +'</div></div>';

  document.getElementById("mbg").addEventListener("click",function(e){if(e.target===this)closeModal();});
}

function saveAmountAdjustment(ds,slot,category){
  var el=document.getElementById("amtInput");
  var v=parseFloat(el.value);
  if(isNaN(v) || v<0) v=DEFAULT_AMOUNTS[category];
  setAmountOverride(ds,slot,category,v);
  closeModal();
  renderCalendarPage();
}

function resetAmount(ds,slot,category){
  setAmountOverride(ds,slot,category,null);
  closeModal();
  renderCalendarPage();
}

function buildAdditionalItemsBox(ds,slot){
  var key=ds+"_"+slot;
  var addins=addinsLog[key]||{};
  var items=Object.keys(addins).filter(function(k){return addins[k]>0;});
  var products=productsLog[key]||{};
  var productIds=Object.keys(products).filter(function(k){return products[k]>0;});

  var html='<div class="addl-box">'
    +'<div class="addl-title"><span class="step-num">7</span>Additional Items</div>';

  if(items.length>0 || productIds.length>0){
    html+='<div class="addl-list">';
    for(var i=0;i<items.length;i++) html+='<div class="addl-item">'+items[i]+': '+addins[items[i]]+' oz</div>';
    for(var j=0;j<productIds.length;j++){
      var prod=getProduct(productIds[j]);
      var pname=prod?prod.name:"(deleted product)";
      html+='<div class="addl-item">&#127850; '+pname+': '+products[productIds[j]]+' serving'+(products[productIds[j]]==1?'':'s')+'</div>';
    }
    html+='</div>';
  } else {
    html+='<div class="addl-empty">No additional items logged</div>';
  }

  html+='<button class="addins-btn" onclick="openDayAddinsModal(\''+ds+'\',\''+slot+'\')">+ Add Items</button>'
    +'</div>';
  return html;
}

function changeDay(n){ _calNavDir=n; advDay(n); renderCalendarPage(); }

function toggleFed(key){
  fedLog[key]=!fedLog[key];
  try{localStorage.setItem("mya_fed",JSON.stringify(fedLog));}catch(e){}
  renderCalendarPage();
}

function toggleUsdaModalPanel(){
  var panel=document.getElementById("usdaModalPanel");
  panel.style.display = (panel.style.display==="none") ? "block" : "none";
}

function modalUsdaStatus(msg,isErr){
  var el=document.getElementById("usdaModalStatus");
  el.className="usda-status"+(isErr?" err":"");
  el.innerHTML=msg;
}

function searchUsdaModal(){
  var q=document.getElementById("usdaModalQuery").value.trim();
  if(!USDA_KEY){ modalUsdaStatus("Paste your free USDA API key on the Guide tab first.",true); return; }
  if(!q){ modalUsdaStatus("Type a food name to search.",true); return; }

  var types=[];
  for(var i=0;i<USDA_DATA_TYPES.length;i++){ if(usdaSelectedTypes[USDA_DATA_TYPES[i]]) types.push(USDA_DATA_TYPES[i]); }
  if(types.length===0){ modalUsdaStatus("Select at least one data type.",true); return; }

  document.getElementById("usdaModalResults").innerHTML="";
  modalUsdaStatus("Searching USDA FoodData Central&hellip;",false);

  fetchUsdaSearch(q, types, function(foods){
    if(foods.length===0){ modalUsdaStatus("No matches found. Try a simpler search term.",false); return; }
    modalUsdaStatus(foods.length+" results &mdash; tap one to add it", false);
    renderUsdaModalResults(foods);

var _productDraft = null; // {id, name, servings, ingredients:[{name,oz}]}

function buildRecipeBoxList(){
  var ids=Object.keys(customProducts);
  if(ids.length===0){
    return '<div class="addl-empty" style="margin-bottom:10px">No products yet &mdash; add your first recipe below</div>';
  }
  var html='';
  for(var i=0;i<ids.length;i++){

    var perServing=calcProductPerServing(p);
    var totalOz=0;
    for(var j=0;j<p.ingredients.length;j++) totalOz+=(p.ingredients[j].oz||0);
    var ozPerServing=(p.servings>0)?(totalOz/p.servings):0;
    html+='<div class="usda-result-item" onclick="openProductBuilder(\''+ids[i]+'\')">'
      +'<div class="usda-result-name">'+escapeHtml(p.name)+'<span class="usda-result-badge">'+p.servings+' servings</span></div>'
      +'<div class="usda-result-meta">'+p.ingredients.length+' ingredients &middot; ~'+ozPerServing.toFixed(1)+' oz/serving &middot; '+Math.round(perServing.protein*10)/10+'g protein, '+Math.round(perServing.fat*10)/10+'g fat per serving</div>'
      +'</div>';
  }
  return html;
}

];

function openProductBuilder(existingId){
  if(existingId && customProducts[existingId]){
    var existing=customProducts[existingId];
    _productDraft={ id:existing.id, name:existing.name, servings:existing.servings, ingredients:existing.ingredients.map(function(i){return {name:i.name,oz:i.oz};}) };

function updateDraftName(v){ _productDraft.name=v; }

function updateDraftIngredientOz(idx,v){ var n=parseFloat(v); _productDraft.ingredients[idx].oz=(n>0)?n:0; }

function prodUsdaStatus(msg,isErr){
  var el=document.getElementById("prodUsdaStatus");
  el.className="usda-status"+(isErr?" err":"");
  el.innerHTML=msg;
}

function searchUsdaForProduct(){
  var q=document.getElementById("prodUsdaQuery").value.trim();
  if(!USDA_KEY){ prodUsdaStatus("Paste your free USDA API key on the Guide tab first.",true); return; }
  if(!q){ prodUsdaStatus("Type an ingredient to search.",true); return; }

  document.getElementById("prodUsdaResults").innerHTML="";
  prodUsdaStatus("Searching USDA FoodData Central&hellip;",false);

  var types=["Foundation","SR Legacy","Survey (FNDDS)","Branded","Experimental"];
  fetchUsdaSearch(q, types, function(foods){
    if(foods.length===0){ prodUsdaStatus("No matches found. Try a simpler search term.",false); return; }
    prodUsdaStatus(foods.length+" results &mdash; tap one to add it", false);
    var html="";
    for(var i=0;i<foods.length;i++){
      var f=foods[i];
      var name=escapeHtml(f.description||"Unknown");
      var brand=f.brandOwner?(" &mdash; "+escapeHtml(f.brandOwner)):"";
      var descForJs=(f.description||"").replace(/'/g,"\\'").replace(/"/g,"&quot;");
      html+='<div class="usda-result-item" onclick="confirmAddUsdaIngredientToProduct('+f.fdcId+',\''+descForJs+'\')">'
        +'<div class="usda-result-name">'+name+'<span class="usda-result-badge">'+escapeHtml(f.dataType||"")+'</span></div>'
        +'<div class="usda-result-meta">FDC #'+f.fdcId+brand+'</div>'
        +'</div>';
    }
    document.getElementById("prodUsdaResults").innerHTML=html;
  }, function(msg){ prodUsdaStatus(msg,true); });

function confirmAddUsdaIngredientToProduct(fdcId,description){
  var match=checkFoodSafety(description);
  if(match){
    showFoodSafetyAlert(match,function(){ addUsdaIngredientToProduct(fdcId); });
  } else {
    addUsdaIngredientToProduct(fdcId);
  }
}

function addUsdaIngredientToProduct(fdcId){
  prodUsdaStatus("Adding ingredient&hellip;",false);

  fetchUsdaDetail(fdcId, function(detail){
    var perOz=per100gToPerOz(extractPer100g(detail));
    var name=detail.description;

    // cache it in the shared ingredient tables so it's reusable in other
    // products or as a regular meal add-in without searching again
    ADDINS[name]=perOz;
    customAddins[name]=perOz;
    try{localStorage.setItem("mya_custom_addins",JSON.stringify(customAddins));}catch(e){}
    ADDIN_NAMES=Object.keys(ADDINS);

    _productDraft.ingredients.push({name:name, oz:0});
    document.getElementById("draftIngredientsContainer").innerHTML=buildDraftIngredientRows();
    document.getElementById("prodUsdaResults").innerHTML="";
    document.getElementById("prodUsdaQuery").value="";
    prodUsdaStatus("&#10003; Added \""+escapeHtml(name)+"\" &mdash; enter its ounces above.",false);
  }, function(msg){
    prodUsdaStatus(msg,true);
  });
}

function saveProductFromBuilder(){
  if(!_productDraft.name || !_productDraft.name.trim()){
    alert("Give your product a name first.");
    return;
  }
  if(_productDraft.ingredients.length===0){
    alert("Add at least one ingredient first.");
    return;
  }
  var validIngredients=_productDraft.ingredients.filter(function(i){return i.oz>0;});
  if(validIngredients.length===0){
    alert("Enter an ounce amount for at least one ingredient.");
    return;
  }
  saveProduct({ id:_productDraft.id, name:_productDraft.name.trim(), servings:_productDraft.servings, ingredients:validIngredients });
  _productDraft=null;
  closeModal();
  renderGuide();
}

function deleteProductFromBuilder(id){
  deleteProduct(id);
  _productDraft=null;
  closeModal();
  renderGuide();
}
